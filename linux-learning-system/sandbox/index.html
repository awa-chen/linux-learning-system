<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🖥️ Penguin Path · 交互沙盒</title>
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="sandbox-page">
<div class="sandbox-shell">
  <header class="sandbox-top">
    <a class="btn" href="../index.html">← 返回主页</a>
    <h1 id="sandbox-title">交互沙盒</h1>
    <div class="sandbox-actions">
      <select id="lesson-select" class="btn"></select>
      <button class="btn" id="reset-btn">↺ 重置环境</button>
    </div>
  </header>

  <div class="sandbox-body">
    <aside class="sandbox-guide" id="guide">
      <div class="guide-empty">选择左侧课程进入引导式练习。</div>
    </aside>

    <section class="terminal-wrap">
      <div class="terminal-bar">
        <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
        <span class="term-title">guest@penguin-path: ~</span>
      </div>
      <div class="terminal" id="terminal" tabindex="0">
        <div class="term-output" id="term-output"></div>
        <div class="term-input-line">
          <span class="prompt">guest@penguin:~$</span>
          <input class="term-input" id="term-input" autocomplete="off" spellcheck="false" placeholder="在此输入命令，回车执行">
        </div>
      </div>
    </section>
  </div>
</div>

<!-- 启动自检：任何脚本加载失败都会明确提示，而不是空白 -->
<script src="../assets/js/boot-check.js"></script>
<!-- 先加载模拟器内核与各伙伴的步骤分片 -->
<script src="../assets/js/emulator.js"></script>
<script src="../partner-workspace/xiaomage/steps.js"></script>
<script src="../partner-workspace/yanmishu/steps.js"></script>
<script src="../partner-workspace/xiaozhengge/steps.js"></script>
<script src="../partner-workspace/shaonianpai/steps.js"></script>
<script src="../assets/js/sandbox.js"></script>
</body>
</html>
