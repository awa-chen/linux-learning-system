<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🖥️ Penguin Path · 交互沙盒</title>
<style>
/* === inlined: assets/css/style.css === */
/* ============================================================================
 * Penguin Path · 企鹅之路  —  全局样式表 (assets/css/style.css)
 * 作者: 言秘书  |  零框架依赖, 纯原生 CSS
 * ----------------------------------------------------------------------------
 * 【配色思路】
 *   暗色极客风，参考 linux-learning.html 的观感，统一一套 CSS 变量。
 *   背景为近黑的深蓝 (#0a0e14)，卡片表面略亮 (#131820)，描边用低饱和蓝灰。
 *   主强调色青绿 --accent:#39c981（成功/完成/主操作），信息色青蓝 #5ccfe6，
 *   警告橙 #ffb454，错误红 #ff6b6b；命令文本用亮蓝 #73d0ff，输出用 #8b9dc3。
 *   所有颜色集中在 :root，改一处即可换肤。
 *
 * 【栅格思路】
 *   .app-shell 用 CSS Grid: 左侧固定 264px 侧栏 + 右侧自适应主区；
 *   课程阅读面板 .reader 以固定定位从右侧滑入（不破坏栅格）。
 *   沙盒页 .sandbox-shell 用 flex 纵向拆成顶栏 + (引导栏 | 终端) 两栏。
 *   窄屏 (<=860px) 侧栏转为顶部横向导航；沙盒两栏堆叠为单栏。
 *   间距统一用 --gap(12px)，圆角 --radius(6px)，字号偏好等宽字体。
 * ========================================================================== */

:root {
  --bg: #0a0e14;
  --surface: #131820;
  --surface-2: #1a2332;
  --border: #1e293b;
  --text: #bfc7d5;
  --text-dim: #6b7280;
  --accent: #39c981;        /* 青绿：成功/主操作 */
  --accent-dim: #1a4a2f;
  --warn: #ffb454;          /* 橙：警告 */
  --error: #ff6b6b;         /* 红：错误 */
  --info: #5ccfe6;          /* 青蓝：信息/提示 */
  --cmd: #73d0ff;           /* 命令文本 */
  --output: #8b9dc3;        /* 命令输出 */
  --highlight: #ffd580;     /* 用户输入高亮 */
  --prompt: #39c981;        /* 终端提示符 */
  --step-bg: #1a2332;
  --step-done: #0f1e15;
  --step-active: #1a2e44;
  --gap: 12px;
  --radius: 6px;
  --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, 'Courier New', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; }

body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
}

a { color: var(--info); text-decoration: none; }
a:hover { text-decoration: underline; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #2d3a4f; }

/* ============================================================================
 * 布局骨架: .app-shell (侧栏 + 主区) + .reader 滑入面板
 * ========================================================================== */
.app-shell {
  display: grid;
  grid-template-columns: 264px minmax(0, 1fr);
  min-height: 100vh;
  background: var(--bg);
}

/* ---- 侧边栏 ---- */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  gap: var(--gap);
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1.15rem;
  font-weight: bold;
  color: var(--accent);
  padding: 4px 6px 10px;
  border-bottom: 1px solid var(--border);
}
.brand-logo { font-size: 1.4rem; }
.brand-name { letter-spacing: .5px; }

.side-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.side-nav a {
  display: block;
  padding: 9px 12px;
  border-radius: var(--radius);
  color: var(--text-dim);
  font-size: 0.85rem;
  border: 1px solid transparent;
  border-left: 3px solid transparent;
  transition: background .15s, border-color .15s, color .15s;
}
.side-nav a:hover {
  background: var(--step-bg);
  color: var(--text);
  text-decoration: none;
}
.side-nav a.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: bold;
}

.side-foot {
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.72rem;
  line-height: 1.5;
}

/* ---- 主区 ---- */
.main {
  padding: 22px 26px 60px;
  overflow: auto;
  min-width: 0;
}
.topbar {
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
  margin-bottom: 22px;
}
.topbar h1 { font-size: 1.4rem; color: var(--text); }
.subtitle { color: var(--text-dim); font-size: 0.85rem; margin-top: 6px; }

/* ---- 课程阅读面板 (从右滑入) ---- */
.reader {
  position: fixed;
  top: 0;
  right: 0;
  width: min(580px, 94vw);
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: -12px 0 40px rgba(0,0,0,.45);
  transform: translateX(102%);
  transition: transform .25s ease;
  z-index: 50;
  overflow-y: auto;
  padding: 18px 22px 40px;
}
.reader.open { transform: translateX(0); }
.reader-head {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
  margin-bottom: 14px;
}
.reader-head h2 { font-size: 1.05rem; color: var(--accent); flex: 1 1 auto; }
.reader-body { font-size: 0.9rem; }
.reader-sandbox { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 16px; }

/* ============================================================================
 * 通用组件: 卡片 / 按钮 / 徽章 / 标签 / 提示
 * ========================================================================== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 22px;
}
.panel h2 { font-size: 1.1rem; margin-bottom: 12px; color: var(--text); }

/* 视图互斥：被 showView 隐藏的区块强制不显示（覆盖 .panel 的 display） */
[hidden] { display: none !important; }

/* 主页 in-page 交互沙盒：复用沙盒页同一套样式，但嵌入正文主区 */
#sandbox-sec {
  display: flex;
  flex-direction: column;
  min-height: 64vh;
  padding: 0;
  overflow: hidden;
}
#sandbox-sec .sandbox-top {
  border-radius: var(--radius) var(--radius) 0 0;
  margin: 0;
}
#sandbox-sec .sandbox-body { flex: 1; }

.btn {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.82rem;
  padding: 7px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
}
.btn:hover { border-color: var(--info); color: var(--text); }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
  font-weight: bold;
}
.btn-primary:hover { background: #2fb574; border-color: #2fb574; }
.btn.mini { padding: 4px 10px; font-size: 0.72rem; }

/* 级别徽章 (L1~L12) */
.level-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 38px;
  padding: 3px 8px;
  border-radius: var(--radius);
  background: var(--accent-dim);
  color: var(--accent);
  font-weight: bold;
  font-size: 0.8rem;
  border: 1px solid var(--accent);
}
.tag {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 0.68rem;
  background: var(--step-bg);
  color: var(--info);
  border: 1px solid var(--border);
}
.alert {
  border-radius: var(--radius);
  padding: 10px 14px;
  margin: 12px 0;
  font-size: 0.82rem;
  border: 1px solid var(--border);
  background: var(--surface-2);
}
.alert.warn  { border-color: var(--warn);  color: var(--warn); }
.alert.error { border-color: var(--error); color: var(--error); }
.alert.info  { border-color: var(--info);  color: var(--info); }

/* ============================================================================
 * 进度看板 + 雷达
 * ========================================================================== */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-track {
  flex: 1;
  height: 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--accent-dim), var(--accent));
  border-radius: 8px;
  transition: width .4s ease;
}
.progress-text { color: var(--text-dim); font-size: 0.8rem; white-space: nowrap; }

.radar-wrap {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.radar { display: block; }
#radar { display: block; }
.radar-legend { color: var(--text-dim); font-size: 0.72rem; }

.stage-legend { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 12px; }
.stage-legend .dot {
  display: inline-block;
  width: 9px; height: 9px;
  border-radius: 50%;
  margin: 0 4px 0 12px;
  vertical-align: middle;
}
.dot.stage-入门 { background: #5ccfe6; }
.dot.stage-初级 { background: #39c981; }
.dot.stage-中级 { background: #ffb454; }
.dot.stage-高级 { background: #ff6b6b; }

/* 路线等级徽章按阶段着色（与顶部图例四色一致） */
.level-col.stage-入门 .level-badge { background: #5ccfe6; border-color: #5ccfe6; color: #06222a; }
.level-col.stage-初级 .level-badge { background: #39c981; border-color: #39c981; color: #053524; }
.level-col.stage-中级 .level-badge { background: #ffb454; border-color: #ffb454; color: #3a2600; }
.level-col.stage-高级 .level-badge { background: #ff6b6b; border-color: #ff6b6b; color: #3a0d0d; }
/* 列容器左缘同步着色，强化阶段辨识 */
.level-col.stage-入门 { border-left: 3px solid #5ccfe6; }
.level-col.stage-初级 { border-left: 3px solid #39c981; }
.level-col.stage-中级 { border-left: 3px solid #ffb454; }
.level-col.stage-高级 { border-left: 3px solid #ff6b6b; }
/* 等级名文字同步着色，与图例四色呼应 */
.level-col.stage-入门 .level-stage { color: #5ccfe6; }
.level-col.stage-初级 .level-stage { color: #39c981; }
.level-col.stage-中级 .level-stage { color: #ffb454; }
.level-col.stage-高级 .level-stage { color: #ff6b6b; }

/* ============================================================================
 * 路线图: .roadmap > .level-col > .course-list > .course-item(.done)
 * ========================================================================== */
.roadmap {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 14px;
}
.level-col {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
}
.level-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 8px;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.level-stage { font-size: 0.78rem; color: var(--text-dim); }
.level-prog { margin-left: auto; font-size: 0.74rem; color: var(--accent); }

.course-list { display: flex; flex-direction: column; gap: 6px; }
.course-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 11px;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s, border-color .15s;
  font-size: 0.82rem;
}
.course-item:hover { background: var(--step-bg); border-color: var(--info); }
.course-item.done { background: var(--step-done); border-color: var(--accent-dim); }
.course-item.done .ci-title { color: var(--accent); }
.course-item.empty { color: var(--text-dim); cursor: default; font-style: italic; }
.ci-check { color: var(--text-dim); width: 14px; text-align: center; }
.course-item.done .ci-check { color: var(--accent); }
.ci-title { flex: 1; }
.ci-meta { font-size: 0.68rem; color: var(--text-dim); white-space: nowrap; }

/* ============================================================================
 * 正文排版 (课程 Markdown 渲染后的标签)
 * ========================================================================== */
/* 参考文档阅读区（方案 A：主页正文区呈现，不跳离、不弹右边小框） */
#doc-sec .doc-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
#doc-sec .doc-head h2 { margin: 0; flex: 1; }
#doc-sec .doc-head .btn { white-space: nowrap; }

.reader-body h1, .reader-body h2, .reader-body h3,
.reader-body h4, .reader-body h5, .reader-body h6 {
  color: var(--accent);
  margin: 18px 0 10px;
  line-height: 1.3;
}
.reader-body h1 { font-size: 1.25rem; }
.reader-body h2 { font-size: 1.08rem; }
.reader-body h3 { font-size: 0.98rem; color: var(--info); }
.reader-body p { margin: 10px 0; }
.reader-body ul, .reader-body ol { margin: 10px 0 10px 22px; }
.reader-body li { margin: 4px 0; }
.reader-body code {
  font-family: var(--mono);
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--cmd);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 0.85em;
}
.reader-body pre.code-block {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  overflow-x: auto;
  margin: 12px 0;
}
.reader-body pre.code-block code {
  background: none;
  border: none;
  color: var(--output);
  padding: 0;
}
.reader-body strong { color: var(--highlight); }
.reader-body em { color: var(--info); }
.reader-body a { color: var(--accent); text-decoration: underline; }
.reader-body a:hover { color: var(--info); }
.reader-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.reader-body blockquote {
  border-left: 3px solid var(--accent);
  background: var(--surface-2);
  margin: 12px 0;
  padding: 8px 14px;
  color: var(--text-dim);
  border-radius: 0 var(--radius) var(--radius) 0;
}
.reader-body blockquote p { margin: 4px 0; }
.reader-body .table-wrap { overflow-x: auto; margin: 12px 0; }
.reader-body table.md-table {
  border-collapse: collapse;
  width: 100%;
  font-size: 0.85rem;
}
.reader-body table.md-table th,
.reader-body table.md-table td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
  vertical-align: top;
}
.reader-body table.md-table th {
  background: var(--surface-2);
  color: var(--text);
  font-weight: 600;
}
.reader-body table.md-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
.reader-tag {
  font-size: 0.7rem;
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2px 10px;
  white-space: nowrap;
}
.reader-body em { color: var(--info); }

/* ============================================================================
 * 沙盒页: .sandbox-shell > (.sandbox-top + .sandbox-body)
 * ========================================================================== */
.sandbox-page { background: var(--bg); }
.sandbox-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.sandbox-top {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sandbox-top h1 { font-size: 1rem; color: var(--accent); flex: 1; }
.sandbox-actions { display: flex; align-items: center; gap: 8px; }
.sandbox-actions select.btn { font-family: var(--mono); }

.sandbox-body {
  flex: 1;
  display: grid;
  grid-template-columns: 320px minmax(0, 1fr);
  min-height: 0;
}
.sandbox-guide {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 14px;
}
.guide-empty, .guide-note { color: var(--text-dim); font-size: 0.82rem; line-height: 1.6; }
.guide-title {
  font-weight: bold;
  color: var(--info);
  font-size: 0.85rem;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

/* 引导步骤 */
.step {
  display: flex;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  margin-bottom: 8px;
  background: var(--step-bg);
  transition: background .15s, border-color .15s;
}
.step.active { border-color: var(--info); background: var(--step-active); }
.step.done { background: var(--step-done); opacity: .75; }
.step-no {
  width: 22px; height: 22px;
  min-width: 22px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; font-weight: bold;
}
.step.active .step-no { background: var(--info); color: var(--bg); }
.step.done .step-no { background: var(--accent-dim); color: var(--accent); }
.step-body { flex: 1; min-width: 0; }
.step-title { font-weight: bold; font-size: 0.84rem; color: var(--text); }
.step.done .step-title { color: var(--accent); }
.step-task { font-size: 0.78rem; color: var(--text-dim); margin: 3px 0; }
.step-tips { font-size: 0.74rem; color: var(--warn); margin-top: 4px; line-height: 1.5; }

/* 终端 */
.terminal-wrap {
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: #0d1117;
}
.terminal-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: #1a1f2b;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.terminal-bar .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
.terminal-bar .dot.r { background: #ff5f56; }
.terminal-bar .dot.y { background: #ffbd2e; }
.terminal-bar .dot.g { background: #27c93f; }
.term-title { margin-left: 6px; font-size: 0.76rem; color: var(--text-dim); }

.terminal {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  font-family: var(--mono);
  font-size: 0.85rem;
  line-height: 1.55;
}
.term-output { display: block; }
.terminal .line { white-space: pre-wrap; word-break: break-all; }
.terminal .line.err   { color: var(--error); }
.terminal .line.ok    { color: var(--accent); }
.terminal .line.info  { color: var(--info); }
.terminal .line.system, .terminal .line.note { color: var(--text-dim); font-style: italic; }
.terminal .prompt { color: var(--prompt); margin-right: 8px; }

.term-input-line {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  background: #0d1117;
  flex-shrink: 0;
}
.prompt { color: var(--prompt); white-space: nowrap; }
.term-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--highlight);
  font-family: var(--mono);
  font-size: 0.85rem;
  caret-color: var(--accent);
}
.term-input::placeholder { color: var(--text-dim); }


/* ============================================================================
 * 独立参考文档页（docs/<key>.html，整页，与交互沙盒同风格）
 * ========================================================================== */
.doc-shell {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}
.doc-sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
}
.doc-nav { display: flex; flex-direction: column; gap: 6px; margin-top: 18px; flex: 1; }
.doc-nav a.doc-link {
  color: var(--text-dim);
  text-decoration: none;
  padding: 8px 12px;
  border-radius: var(--radius);
  font-size: 0.9rem;
  border: 1px solid transparent;
}
.doc-nav a.doc-link:hover { color: var(--text); background: var(--surface-2); }
.doc-main {
  background: var(--bg);
  padding: 40px 48px;
  overflow-y: auto;
  height: 100vh;
}
.doc-article {
  max-width: 860px;
  margin: 0 auto;
}
.doc-head { border-bottom: 1px solid var(--border); padding-bottom: 18px; margin-bottom: 24px; }
.doc-head h1 { font-size: 1.8rem; color: var(--accent); margin: 0 0 8px; }
.doc-sub { color: var(--text-dim); margin: 0; font-size: 0.95rem; }
.doc-body { font-size: 0.95rem; line-height: 1.7; }
.doc-body h1 { font-size: 1.5rem; color: var(--accent); margin: 28px 0 12px; }
.doc-body h2 { font-size: 1.25rem; color: var(--text); margin: 24px 0 10px; }
.doc-body h3 { font-size: 1.08rem; color: var(--info); margin: 18px 0 8px; }
.doc-body p { margin: 12px 0; }
.doc-body ul, .doc-body ol { margin: 12px 0 12px 24px; }
.doc-body li { margin: 5px 0; }
.doc-body code {
  font-family: var(--mono);
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--cmd);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 0.85em;
}
.doc-body pre.code-block {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  overflow-x: auto;
  margin: 14px 0;
}
.doc-body pre.code-block code { background: none; border: none; color: var(--output); padding: 0; }
.doc-body strong { color: var(--highlight); }
.doc-body em { color: var(--info); }
.doc-body a { color: var(--accent); text-decoration: underline; }
.doc-body a:hover { color: var(--info); }
.doc-body hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.doc-body blockquote {
  border-left: 3px solid var(--accent);
  background: var(--surface-2);
  margin: 14px 0;
  padding: 8px 14px;
  color: var(--text-dim);
  border-radius: 0 var(--radius) var(--radius) 0;
}
.doc-body blockquote p { margin: 4px 0; }
.doc-body .table-wrap { overflow-x: auto; margin: 14px 0; }
.doc-body table.md-table { border-collapse: collapse; width: 100%; font-size: 0.88rem; }
.doc-body table.md-table th,
.doc-body table.md-table td { border: 1px solid var(--border); padding: 7px 11px; text-align: left; vertical-align: top; }
.doc-body table.md-table th { background: var(--surface-2); color: var(--text); font-weight: 600; }
.doc-body table.md-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
.doc-foot {
  margin-top: 40px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.8rem;
}

/* 兼容 sandbox.js 旧类名 */
.terminal .line.prompt-line { color: var(--prompt); }

/* ============================================================================
 * 响应式: 窄屏适配
 * ========================================================================== */
@media (max-width: 860px) {
  .doc-shell { grid-template-columns: 1fr; }
  .doc-sidebar {
    position: static;
    height: auto;
    flex-direction: row;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    border-right: none;

  .doc-main { padding: 24px 18px; height: auto; }
}

<!-- 启动自检：任何脚本加载失败都会明确提示，而不是空白 -->
<script>
/* === inlined: assets/js/boot-check.js === */
/* Penguin Path · 启动自检（零依赖）
   作用：若核心脚本未能正常加载，在页面顶部显示明确错误，
   而不是让用户看到一个“空白/没有终端”的页面而误以为系统坏了。
   两个页面都在主逻辑脚本之前引入本文件。 */
(function () {
  "use strict";
  function showError(msg) {
    if (!document.getElementById("boot-error")) {
      var d = document.createElement("div");
      d.id = "boot-error";
      d.style.cssText = "position:fixed;left:0;right:0;top:0;z-index:9999;" +
        "background:#2a0d12;color:#ff9b9b;border-bottom:2px solid #ff6b6b;" +
        "padding:12px 16px;font:13px/1.6 monospace;white-space:pre-wrap;";
      d.textContent = "⚠️ 加载异常：" + msg +
        "\n建议：用本地服务器打开（python3 tools/serve.py），不要直接双击 file:// 预览。";
      document.body.appendChild(d);
    }
  }
  window.__PENGUIN_BOOT_ERROR__ = showError;
  // 页面加载完成后统一检查（此时所有脚本应已执行）
  window.addEventListener("load", function () {
    var isSandbox = location.pathname.indexOf("/sandbox/") >= 0 || location.pathname.endsWith("/sandbox");
    if (isSandbox) {
      if (typeof window.PenguinEmulator !== "function") {
        showError("模拟器内核 emulator.js 未加载（PenguinEmulator 不存在）。");
      }
      if (!(window.__PENGUIN_STEPS__ || window.__PENGUIN_STEPS) || (window.__PENGUIN_STEPS__ || window.__PENGUIN_STEPS).length === 0) {
        showError("步骤数据 steps.js 未加载（__PENGUIN_STEPS 为空）。");
      }
    } else {
      if (!(window.__COURSE_INDEX__ && window.__COURSE_INDEX__.length) ||
          !(window.__COURSES__ && Object.keys(window.__COURSES__).length)) {
        showError("课程数据未加载（content/index.js 或 content/courses.js 失败）。");
      }
    }
  });
})();

</script>
<!-- 先加载模拟器内核与各伙伴的步骤分片 -->
<script>
/* === inlined: assets/js/emulator.js === */
/**
 * PenguinEmulator —— Penguin Path（企鹅之路）轻量前端 Linux 模拟内核
 * 零依赖 · 纯浏览器原生 JS · 无需后端
 *
 * ============================================================
 * 对外接口
 * ============================================================
 *   // 创建沙盒状态（虚拟文件系统 + 当前目录），每个会话只创建一次并长期持有
 *   const ctx = PenguinEmulator.createContext();
 *
 *   // 执行一条命令，返回结果对象
 *   const res = PenguinEmulator("ls -l", ctx);
 *   res.output  // 字符串：模拟终端输出
 *   res.error   // 布尔：是否出错（出错时 output 为友好中文提示）
 *   res.clear   // 布尔：是否为 clear 命令（沙盒页据此清屏）
 *
 *   ctx 会在多次调用间保持状态：cwd（当前目录）、fs（虚拟文件系统树）、user。
 *
 * ============================================================
 * 命令清单（[cmd]: (args, ctx, stdin) => string）
 * ============================================================
 *   基础：help, ls, pwd, cd, mkdir, touch, cat,
 *         echo(支持 > 和 >> 重定向), cp, mv, rm, chmod,
 *         grep, ps, date, whoami, uname, clear
 *   管道：|  （例如  ls | grep txt 、 cat hello.txt | grep Linux）
 *   进阶（为本系统 L2/L3 课程补齐，非强制但保证沙盒可用）：
 *         find / locate / which（查找），
 *         sed（替换） / awk（字段提取）
 *
 * 出错一律返回友好中文提示，绝不向外抛出异常。
 * ============================================================
 */
(function (global) {
  "use strict";

  /* ---------------- 工具函数 ---------------- */

  function splitPath(p) { return String(p).split("/").filter(Boolean); }

  // 把任意路径（绝对/相对/~/. /..）解析为规范的绝对路径
  function normalize(cwd, p) {
    p = String(p == null ? "" : p);
    if (p === "" ) return cwd;
    if (p === "~" || p.indexOf("~/") === 0) {
      p = "/home/guest" + (p.length === 1 ? "" : p.slice(1));
    }
    if (p.charAt(0) !== "/") {
      var base = cwd.replace(/\/$/, "");
      p = base + "/" + p;
    }
    var parts = [];
    splitPath(p).forEach(function (seg) {
      if (seg === ".") return;
      if (seg === "..") { parts.pop(); return; }
      parts.push(seg);
    });
    return "/" + parts.join("/");
  }

  function getNode(path, fs) {
    if (!path || path === "/") return fs;
    var parts = splitPath(path);
    var node = fs;
    for (var i = 0; i < parts.length; i++) {
      if (!node || node.type !== "dir") return null;
      node = node.children[parts[i]];
      if (!node) return null;
    }
    return node;
  }

  function getParent(path, fs) {
    var parts = splitPath(path);
    var name = parts.length ? parts.pop() : "";
    var parentPath = "/" + parts.join("/");
    var parent = (!parentPath || parentPath === "/") ? fs : getNode(parentPath, fs);
    return { parent: parent, name: name };
  }

  function makeDir(name, perm) {
    return { name: name || "", type: "dir", perm: perm == null ? 0o755 : perm,
             owner: "guest", group: "guest", mtime: new Date(), children: {} };
  }
  function makeFile(name, content, perm) {
    return { name: name || "", type: "file", perm: perm == null ? 0o644 : perm,
             owner: "guest", group: "guest", mtime: new Date(), content: content || "", children: null };
  }
  function cloneNode(n) {
    if (n.type === "file") return makeFile(n.name, n.content, n.perm);
    var d = makeDir(n.name, n.perm);
    Object.keys(n.children).forEach(function (k) { d.children[k] = cloneNode(n.children[k]); });
    return d;
  }

  function escapeRegExp(s) { return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

  // 权限数字 -> rwx 字符串
  function permToString(perm) {
    function t(b) { return (b & 4 ? "r" : "-") + (b & 2 ? "w" : "-") + (b & 1 ? "x" : "-"); }
    return t((perm >> 6) & 7) + t((perm >> 3) & 7) + t(perm & 7);
  }

  function formatDate(d) {
    var mm = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    function p2(n) { return String(n).padStart(2, "0"); }
    return mm[d.getMonth()] + " " + p2(d.getDate()) + " " + p2(d.getHours()) + ":" + p2(d.getMinutes());
  }

  function formatLong(name, node) {
    var d = node.type === "dir" ? "d" : "-";
    var size = node.type === "file" ? (node.content ? node.content.length : 0) : 4096;
    return d + permToString(node.perm) + " 1 " + node.owner + " " + node.group +
           " " + String(size).padStart(6) + " " + formatDate(node.mtime) + " " + name;
  }

  // 通配符 -> 正则（用于 find -name）
  function globToRegex(glob) {
    var re = "";
    for (var i = 0; i < glob.length; i++) {
      var c = glob[i];
      if (c === "*") re += ".*";
      else if (c === "?") re += ".";
      else if (".+^${}()|[]\\".indexOf(c) >= 0) re += "\\" + c;
      else re += c;
    }
    return new RegExp("^" + re + "$");
  }

  // 递归遍历目录
  function walk(node, path, cb) {
    if (!node || node.type !== "dir") return;
    Object.keys(node.children).forEach(function (name) {
      var child = node.children[name];
      var cpath = path === "/" ? "/" + name : path + "/" + name;
      cb(child, cpath, name);
      if (child.type === "dir") walk(child, cpath, cb);
    });
  }

  // chmod 符号法：u+x / go-w / a=rwx / 755 等
  function applySymbolic(perm, expr) {
    var m = /^([ugoa]*)([+\-=])([rwx]*)$/.exec(expr);
    if (!m) return null;
    var who = m[1] || "a", op = m[2], perms = m[3];
    var bits = 0;
    if (perms.indexOf("r") >= 0) bits |= 4;
    if (perms.indexOf("w") >= 0) bits |= 2;
    if (perms.indexOf("x") >= 0) bits |= 1;
    var cats = [];
    if (who.indexOf("u") >= 0) cats.push(6);
    if (who.indexOf("g") >= 0) cats.push(3);
    if (who.indexOf("o") >= 0) cats.push(0);
    if (who.indexOf("a") >= 0 || who === "") { cats.push(6); cats.push(3); cats.push(0); }
    var nperm = perm & 0o777;
    cats.forEach(function (shift) {
      var cur = (nperm >> shift) & 7, nv;
      if (op === "+") nv = cur | bits;
      else if (op === "-") nv = cur & ~bits;
      else nv = bits;
      nperm = (nperm & ~(7 << shift)) | (nv << shift);
    });
    return nperm & 0o777;
  }

  /* ---------------- 命令实现（函数表） ---------------- */

  function cmd_help() {
    return [
      "Penguin Path 模拟终端 — 可用命令：",
      "  help                 显示本帮助",
      "  ls [-l -a]           列出目录内容",
      "  pwd                  显示当前所在目录",
      "  cd [目录]            切换目录（cd ~ 回家目录，cd .. 回上级）",
      "  mkdir [-p] 目录      创建目录",
      "  touch 文件           创建空文件 / 更新修改时间",
      "  cat 文件             查看文件内容",
      "  echo 文本 [> 文件]   输出文本，支持 > 覆盖与 >> 追加",
      "  cp [-r] 源 目标      复制文件或目录",
      "  mv 源 目标           移动 / 重命名",
      "  rm [-r -f] 目标      删除文件或目录",
      "  chmod 模式 文件      修改权限（数字 755 或符号 +x）",
      "  grep [-inr] 模式 [文件]  在文本中搜索",
      "  find 路径 -name 模式 按名称查找文件",
      "  which 命令           查找命令所在位置",
      "  locate 模式          快速查找（同 find /）",
      "  sed s/旧/新/ 文件    流编辑：替换文本",
      "  awk '{print $1}' 文件  提取字段",
      "  ps / date / whoami / uname   系统信息",
      "  clear                清屏",
      "  命令1 | 命令2        管道，如  ls | grep txt"
    ].join("\n");
  }

  function cmd_ls(args, ctx) {
    var longF = false, allF = false, targets = [];
    args.forEach(function (a) {
      if (a.charAt(0) === "-") { if (a.indexOf("l") >= 0) longF = true; if (a.indexOf("a") >= 0) allF = true; }
      else targets.push(a);
    });
    if (targets.length === 0) targets = ["."];
    var lines = [];
    targets.forEach(function (t) {
      var abs = normalize(ctx.cwd, t);
      var node = getNode(abs, ctx.fs);
      if (!node) { lines.push("ls: 无法访问 " + t + "：没有那个文件或目录"); return; }
      if (node.type === "file") { lines.push(longF ? formatLong(t.split("/").pop(), node) : t.split("/").pop()); return; }
      var names = Object.keys(node.children);
      if (allF) names = [".", ".."].concat(names);
      names.sort();
      names.forEach(function (name) {
        if (!allF && name.charAt(0) === ".") return;
        var child;
        if (name === ".") child = node;
        else if (name === "..") child = (getParent(abs, ctx.fs).parent || node);
        else child = node.children[name];
        lines.push(longF ? formatLong(name, child) : name);
      });
    });
    return lines.join("\n");
  }

  function cmd_pwd(args, ctx) { return ctx.cwd; }

  function cmd_cd(args, ctx) {
    var target = args[0] ? args[0] : "/home/guest";
    var abs = normalize(ctx.cwd, target);
    var node = getNode(abs, ctx.fs);
    if (!node) return "cd: " + target + "：没有那个文件或目录";
    if (node.type !== "dir") return "cd: " + target + "：不是目录";
    ctx.cwd = abs;
    return "";
  }

  function cmd_mkdir(args, ctx) {
    var p = false, dirs = [];
    args.forEach(function (a) { if (a === "-p") p = true; else dirs.push(a); });
    var out = [];
    dirs.forEach(function (d) {
      var abs = normalize(ctx.cwd, d);
      if (getNode(abs, ctx.fs)) { out.push('mkdir: 无法创建目录 “' + d + '”：文件已存在'); return; }
      var parts = splitPath(abs), cur = ctx.fs, path = "";
      for (var i = 0; i < parts.length; i++) {
        path = path === "/" ? "/" + parts[i] : path + "/" + parts[i];
        if (cur.children[parts[i]]) {
          if (cur.children[parts[i]].type !== "dir") { out.push('mkdir: 无法创建目录 “' + d + '”：不是目录'); return; }
          cur = cur.children[parts[i]];
        } else {
          if (i < parts.length - 1 && !p) { out.push('mkdir: 无法创建目录 “' + d + '”：没有那个文件或目录'); return; }
          var nd = makeDir(parts[i]); cur.children[parts[i]] = nd; cur = nd;
        }
      }
    });
    return out.join("\n");
  }

  function cmd_touch(args, ctx) {
    var out = [];
    args.forEach(function (f) {
      var abs = normalize(ctx.cwd, f);
      var node = getNode(abs, ctx.fs);
      if (node) { node.mtime = new Date(); return; }
      var parent = getParent(abs, ctx.fs);
      if (!parent.parent || parent.parent.type !== "dir") {
        out.push("touch: 无法创建 “" + f + "”：没有那个文件或目录"); return;
      }
      parent.parent.children[parent.name] = makeFile(parent.name, "");
    });
    return out.join("\n");
  }

  function cmd_cat(args, ctx) {
    var out = [];
    args.forEach(function (f) {
      var node = getNode(normalize(ctx.cwd, f), ctx.fs);
      if (!node) { out.push("cat: " + f + "：没有那个文件或目录"); return; }
      if (node.type === "dir") { out.push("cat: " + f + "：是一个目录"); return; }
      out.push(node.content);
    });
    return out.join("\n");
  }

  function cmd_echo(args) { return args.join(" "); }

  function cmd_cp(args, ctx) {
    var r = false;
    var items = args.filter(function (a) {
      if (a === "-r" || a === "-R") { r = true; return false; }
      return true;
    });
    if (items.length < 2) return "用法：cp [-r] 源 目标";
    var src = items[0], dst = items[1];
    var srcNode = getNode(normalize(ctx.cwd, src), ctx.fs);
    if (!srcNode) return "cp: 无法获取 " + src + "：没有那个文件或目录";
    if (srcNode.type === "dir" && !r) return "cp: -r 未指定，略过目录 " + src;
    var dstAbs = normalize(ctx.cwd, dst);
    var dstNode = getNode(dstAbs, ctx.fs);
    if (dstNode && dstNode.type === "dir") {
      dstAbs = dstAbs.replace(/\/$/, "") + "/" + splitPath(normalize(ctx.cwd, src)).pop();
    }
    var parent = getParent(dstAbs, ctx.fs);
    if (!parent.parent || parent.parent.type !== "dir") return "cp: 无法创建 " + dst + "：没有那个文件或目录";
    parent.parent.children[parent.name] = cloneNode(srcNode);
    return "";
  }

  function cmd_mv(args, ctx) {
    if (args.length < 2) return "用法：mv 源 目标";
    var src = args[0], dst = args[1];
    var srcAbs = normalize(ctx.cwd, src);
    var srcNode = getNode(srcAbs, ctx.fs);
    if (!srcNode) return "mv: 无法获取 " + src + "：没有那个文件或目录";
    var dstAbs = normalize(ctx.cwd, dst);
    var dstNode = getNode(dstAbs, ctx.fs);
    var finalAbs;
    if (dstNode && dstNode.type === "dir") finalAbs = dstAbs.replace(/\/$/, "") + "/" + splitPath(srcAbs).pop();
    else finalAbs = dstAbs;
    var dstParent = getParent(finalAbs, ctx.fs);
    if (!dstParent.parent || dstParent.parent.type !== "dir") return "mv: 无法创建 " + dst + "：没有那个文件或目录";
    var srcParent = getParent(srcAbs, ctx.fs);
    if (srcParent.parent) delete srcParent.parent.children[srcParent.name];
    dstParent.parent.children[dstParent.name] = srcNode;
    return "";
  }

  function cmd_rm(args, ctx) {
    var r = false, f = false;
    var items = args.filter(function (a) {
      if (a === "-r" || a === "-R") { r = true; return false; }
      if (a === "-f") { f = true; return false; }
      return true;
    });
    var out = [];
    items.forEach(function (t) {
      var abs = normalize(ctx.cwd, t);

<script>
/* === inlined: assets/js/sandbox.js === */
/* Penguin Path 沙盒控制器（零依赖）
   依赖（由其它文件提供）：
     window.PenguinEmulator(input, ctx) -> {output, error}   （emulator.js）
     window.__PENGUIN_STEPS__  (array of step)               （各伙伴 steps.js 分片）
   功能：引导式逐步骤练习 + 自由终端。
*/
(function () {
  "use strict";

  var STEPS = (window.__PENGUIN_STEPS__ || window.__PENGUIN_STEPS || []).slice();
  var emulator = window.PenguinEmulator;
  var ctx = null; // 沙盒状态，由 emulator 初始化
  var current = null;      // 当前 lesson key
  var stepIndex = 0;
  var solved = {};         // key -> 已完成步骤集合

  function $(id) { return document.getElementById(id); }

  function printLine(text, cls) {
    var out = $("term-output");
    var div = document.createElement("div");
    div.className = "line " + (cls || "");
    div.innerHTML = text;
    out.appendChild(div);
    out.scrollTop = out.scrollHeight;
  }

  function printCmd(cmd) {
    printLine('<span class="prompt">guest@penguin:~$</span> ' + escapeHtml(cmd));
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function runCommand(raw) {
    if (!emulator) {
      printLine("⚠️ 模拟器内核未加载（emulator.js）。请联系主 agent 检查。", "err");
      return;
    }
    var res = emulator(raw, ctx);
    if (res && typeof res.output === "string") {
      res.output.split("\n").forEach(function (l) {
        if (l.length) printLine(escapeHtml(l), res.error ? "err" : "");
      });
    }
    // 引导式校验
    if (current && STEPS_STEP()) {
      var step = STEPS_STEP();
      try {
        if (typeof step.checker === "function" && step.checker(raw)) {
          if (!solved[current]) solved[current] = {};
          solved[current][step.id] = true;
          printLine("✅ 完成：" + step.title, "ok");
          stepIndex++;
          renderGuide();
        }
      } catch (e) { /* checker 异常不影响终端 */ }
    }
  }

  function STEPS_STEP() {
    var list = stepsFor(current);
    return list[stepIndex] || null;
  }

  function stepsFor(key) {
    return STEPS.filter(function (s) { return s.key === key; });
  }

  function renderGuide() {
    var guide = $("guide");
    if (!current) {
      guide.innerHTML = '<div class="guide-empty">选择左侧课程进入引导式练习。</div>';
      return;
    }
    var list = stepsFor(current);
    var html = '<div class="guide-title">' + escapeHtml(current) + ' · 引导练习</div>';
    if (!list.length) {
      html += '<div class="guide-note">本课以真实环境练习为主，无沙盒步骤。你可以在右侧终端自由输入命令体验。</div>';
      guide.innerHTML = html;
      return;
    }
    list.forEach(function (s, i) {
      var cls = "step";
      if (i < stepIndex) cls += " done";
      else if (i === stepIndex) cls += " active";
      html += '<div class="' + cls + '">' +
        '<div class="step-no">' + (i < stepIndex ? "✓" : (i + 1)) + '</div>' +
        '<div class="step-body"><div class="step-title">' + escapeHtml(s.title) + '</div>' +
        '<div class="step-task">' + (s.task || "") + '</div>' +
        (s.tips ? '<div class="step-tips">' + s.tips + '</div>' : '') +
        (i === stepIndex && s.commandHint ? '<button class="btn mini" data-hint="' + escapeHtml(s.commandHint) + '">填入提示命令</button>' : '') +
        '</div></div>';
    });
    guide.innerHTML = html;
    var hintBtn = guide.querySelector("[data-hint]");
    if (hintBtn) {
      hintBtn.addEventListener("click", function () {
        $("term-input").value = hintBtn.getAttribute("data-hint");
        $("term-input").focus();
      });
    }
  }

  function selectLesson(key) {
    current = key;
    stepIndex = 0;
    renderGuide();
    var list = stepsFor(key);
    if (list.length) {
      printLine("📚 已加载课程：" + escapeHtml(key) + "（共 " + list.length + " 步）", "info");
      printLine("👉 " + list[0].title, "info");
    } else {
      printLine("📚 已加载课程：" + escapeHtml(key) + "（自由练习模式）", "info");
    }
  }

  function populateSelect() {
    var sel = $("lesson-select");
    var keys = [];
    STEPS.forEach(function (s) { if (keys.indexOf(s.key) < 0) keys.push(s.key); });
    keys.sort();
    sel.innerHTML = '<option value="">— 选择引导课程 —</option>' +
      keys.map(function (k) { return '<option value="' + k + '">' + k + '</option>'; }).join("");
    sel.addEventListener("change", function () {
      if (sel.value) selectLesson(sel.value);
    });
    // URL ?course=key
    var params = new URLSearchParams(location.search);
    var c = params.get("course");
    if (c && keys.indexOf(c) >= 0) { sel.value = c; selectLesson(c); }
  }

  function bindTerminal() {
    var input = $("term-input");
    $("terminal").addEventListener("click", function () { input.focus(); });
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        var v = input.value;
        input.value = "";
        if (v.trim() === "clear") { $("term-output").innerHTML = ""; return; }
        printCmd(v);
        runCommand(v);
      }
    });
    $("reset-btn").addEventListener("click", function () {
      if (emulator && emulator.createContext) ctx = emulator.createContext();
      $("term-output").innerHTML = "";
      stepIndex = 0;
      printLine("🔄 环境已重置。", "info");
    });
  }

  document.addEventListener("DOMContentLoaded", function () {
    if (!emulator) {
      printLine("⚠️ 模拟器内核未加载（emulator.js）。请联系主 agent 检查。", "err");
    } else if (emulator.createContext) {
      ctx = emulator.createContext();
    }
    populateSelect();
    bindTerminal();
    renderGuide();
    printLine("🐧 Penguin Path 模拟终端已就绪。输入 <code>help</code> 查看可用命令。", "info");
  });
})();

</script>
