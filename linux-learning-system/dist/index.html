  "l5-var": "# Bash 变量、引号与数组\n\n## 讲解\n\n变量是脚本的\"记忆\"。Bash 里赋值**等号两边不能有空格**（`x=1` 对，`x = 1` 会被当成命令），引用时加 `$`（`echo $x`）。新手 90% 的坑都出在**引号**上：单引号 `'...'` 里的一切都是字面量，双引号 `\"...\"` 里 `$变量` 和 `` `命令` `` 会被展开。理解这一点，才能避免文件名带空格时脚本炸掉。\n\n除了标量，Bash 还有**数组**（`arr=(a b c)`），以及特殊的\"位置参数\"：`$0` 是脚本名、`$1` `$2`…是传入的参数、`$@` 是所有参数（保留空格）。这些在写函数/可复用脚本时天天用。\n\n## 动手实验\n\n1. 变量赋值与引用：\n   ```bash\n   name=\"Penguin\"\n   echo \"你好, $name\"\n   echo '你好, $name'     # 单引号不展开\n   ```\n   预期：第一行输出 `你好, Penguin`；第二行原样输出 `你好, $name`。\n\n2. 命令替换（两种写法）：\n   ```bash\n   today=$(date +%F)\n   files=`ls`            # 老写法，不推荐\n   echo \"今天是 $today\"\n   ```\n\n3. 位置参数：\n   ```bash\n   cat > hello.sh <<'EOF'\n   #!/bin/bash\n   echo \"脚本名: $0\"\n   echo \"第1个参数: $1\"\n   echo \"全部参数: $@\"\n   EOF\n   bash hello.sh alice bob\n   ```\n   预期：依次打印脚本名、`alice`、`alice bob`。\n\n4. 数组：\n   ```bash\n   fruits=(apple banana cherry)\n   echo \"${fruits[0]}\"      # apple\n   echo \"${fruits[@]}\"      # apple banana cherry\n   echo \"${#fruits[@]}\"     # 数组长度 3\n   ```\n\n## 常见错误\n\n- **`x = 1` 报错 command not found**：等号两侧有空格！正确是 `x=1`。这是最高频错误。\n- **变量含空格不加引号**：`rm -rf \"$dir\"` 若 `$dir` 是 `my dir` 且没引号，会被当成两个参数。引用变量一律加双引号。\n- **单双引号用反**：想要展开变量却用了单引号，结果输出字面 `$name`。需要展开用双引号。\n- **`$@` 与 `$*` 混用**：`\"$@\"` 保留每个参数的独立性（推荐），`\"$*\"` 把所有参数拼成一个字符串。循环遍历参数用 `\"$@\"`。\n\n## 小结\n\n1. 赋值 `x=1`（无空格），引用加 `$`；单引号字面量、双引号可展开。\n2. 命令替换用 `$(...)`，比反引号更安全可读。\n3. 位置参数 `$1 $@` 与数组 `(\"a\" \"b\")` 是脚本复用的基石，引用时记得双引号。\n\n进阶：下一课用这些变量写 `if`/`for`/`case`，让脚本真正\"会思考\"。",
  "l6-dns": "# DNS 解析（dig / nslookup / resolv.conf）\n\n## 讲解\n\n你输入 `example.com`，机器怎么知道连哪个 IP？靠 **DNS（域名系统）**——一套分布式的\"电话簿\"。当你访问域名，系统先查本机缓存/`/etc/hosts`，再问**DNS 解析器（resolver）**，解析器按 `resolv.conf` 里配置的 DNS 服务器去递归查询，最终拿到 A 记录（IPv4）或 AAAA 记录（IPv6）。\n\n排查 DNS 用两把刀：\n- **`dig`**（首选，信息全）：默认查 A 记录，加 `@8.8.8.8` 可指定 DNS 服务器，`+short` 只输出结果。\n- **`nslookup`**：交互/非交互皆可，较老但简单。\n\n`/etc/resolv.conf` 是解析器配置：`nameserver 8.8.8.8` 指明用哪个 DNS。注意：用 NetworkManager/systemd-resolved 的机器里这个文件常被自动管理，手动改可能被覆盖。\n\n## 动手实验\n\n1. 用 dig 查 A 记录：\n   ```bash\n   dig example.com\n   dig +short example.com          # 只要 IP\n   dig @8.8.8.8 example.com        # 指定 DNS 服务器\n   ```\n   预期：输出里 `ANSWER SECTION` 含 `example.com.  N  A  93.184.216.34` 之类。\n\n2. 查 MX / 指定类型：\n   ```bash\n   dig example.com MX\n   dig example.com AAAA\n   ```\n\n3. 用 nslookup：\n   ```bash\n   nslookup example.com\n   nslookup example.com 8.8.8.8\n   ```\n\n4. 看本机 DNS 配置：\n   ```bash\n   cat /etc/resolv.conf\n   ```\n   预期：含 `nameserver 127.0.0.53` 或 `nameserver 8.8.8.8` 之类。\n\n## 常见错误\n\n- **能 ping IP 但 ping 不通域名**：典型 DNS 问题。先看 `/etc/resolv.conf` 有没有 `nameserver`，再用 `dig` 验证。\n- **`/etc/resolv.conf` 改完重启没了**：被 NetworkManager/systemd-resolved 接管。应在对应网络管理配置里改 DNS，而非直接编辑此文件。\n- **dig 报 SERVFAIL**：上游 DNS 拒绝/出故障，换 `@8.8.8.8` 或 `@1.1.1.1` 再试，定位是本地 DNS 还是域名本身问题。\n- **`/etc/hosts` 优先级更高**：`getent hosts 域名` 先看 hosts 再看 DNS；若 hosts 里写错了脏数据，会\"解析到奇怪的 IP\"。\n\n## 小结\n\n1. DNS 把域名翻译成 IP；解析顺序：本机缓存/`/etc/hosts` → `resolv.conf` 指定的 nameserver。\n2. `dig`（首选，信息全）与 `nslookup` 用于排查；`+short`/`@服务器` 是常用技巧。\n3. 能连 IP 不能连域名，多半是 DNS；先看 `resolv.conf`，再用 `dig @公共DNS` 区分责任。\n\n进阶：下一课 `ssh` 是日常最常用到的\"基于 IP+端口\"的远程连接，配合 DNS 你就能 `ssh user@主机名` 直连。",
  "l6-ip": "# ip 命令族与路由\n\n## 讲解\n\n`ip` 命令（来自 `iproute2` 套件）是现代 Linux 管理网络的\"瑞士军刀\"，它统一取代了老旧的 `ifconfig`、`route`、`arp` 三件套。日常你只要记住它的几个子命令：**`ip addr`**（地址）、**`ip link`**（链路/网卡）、**`ip route`**（路由）。\n\n核心概念三层：\n- **link（链路）**：物理或虚拟网卡本身，如 `eth0`、`lo`。看它是不是 `UP`。\n- **addr（地址）**：绑定在 link 上的 IP，如 `192.168.1.10/24`。\n- **route（路由）**：\"去某网段该走哪个网关\"，系统靠路由表决定包往哪发；默认路由 `default via 网关` 就是\"上不了本网段就交给它\"。\n\n理解这三层，你就能回答\"为什么我连不上网\"——多半是 link 没 UP、addr 没配上、或 route 没默认网关。\n\n## 动手实验\n\n1. 查看所有网卡与 IP：\n   ```bash\n   ip addr show\n   ip -br addr         # 精简一行一卡\n   ```\n   预期：看到 `lo`（回环）、`eth0`/`ens33` 等，含 `inet 192.168.x.x/24` 与状态 `UP`/`DOWN`。\n\n2. 只看路由表：\n   ```bash\n   ip route show\n   ip route get 8.8.8.8\n   ```\n   预期：`ip route get` 会告诉你\"去 8.8.8.8 走哪个网卡、经哪个网关\"。\n\n3. 临时给网卡加 IP（重启失效，需 root）：\n   ```bash\n   sudo ip addr add 192.168.1.100/24 dev eth0\n   sudo ip link set eth0 up\n   ```\n\n4. 添加默认网关：\n   ```bash\n   sudo ip route add default via 192.168.1.1\n   ```\n   说明：生产/桌面环境一般用 NetworkManager 或 `/etc/network/interfaces` 持久化，手动 `ip` 命令仅临时生效。\n\n## 常见错误\n\n- **还在用 `ifconfig` 提示 command not found**：新系统默认只有 `ip`。`ifconfig` 属过时工具，学 `ip addr` 才是正道。\n- **配了 IP 但 link 是 DOWN**：`ip link set eth0 up` 忘了执行，网卡不起就收发不了包。先看 `ip link` 状态。\n- **`ip` 改完重启就丢**：命令行直接改是内存态，重启还原。要持久化得改发行版的网络配置（Netplan/NetworkManager/interfaces）。\n- **默认路由重复或缺失**：多个 `default` 会冲突；没有 `default` 则只能访问本网段。用 `ip route show default` 检查。\n\n## 小结\n\n1. `ip addr` 看地址、`ip link` 看网卡状态、`ip route` 看路由，三件套取代老三样。\n2. 网络不通先查三件事：link 是否 UP、addr 是否配上、有无默认路由。\n3. 命令行 `ip` 改动是临时的，持久化要走发行版的网卡配置文件。\n\n进阶：下一课用 `ss` 看\"哪些端口在监听\"，配合本课的 IP/路由，网络排错基本闭环。",
  "l6-ss": "# ss 查看端口与连接\n\n## 讲解\n\n服务跑起来后，它会在某个**端口（port）**上\"监听\"，等待连接。排查\"服务起没起、端口被没被占、连没连上\"就要看**套接字（socket）**统计——这正是 `ss`（socket statistics，取代老旧 `netstat`）的活。\n\n常用组合：\n- `ss -tuln`：`t`CP/`u`DP、`l`istening 监听中、`n` 数字显示（不解析主机名，更快）。\n- `ss -tnp`：看 **established（已建立）** 的 TCP 连接，并显示进程 `-p`。\n\n关键术语：**LISTEN** 表示在等连接；**ESTABLISHED** 表示已连上；**端口**是 0~65535 的数字，<1024 为特权端口（需 root 才能监听，如 80/443）。看到 `0.0.0.0:22` 监听，意思是\"本机所有网卡都在 22 端口等 SSH\"。\n\n## 动手实验\n\n1. 查看所有监听端口：\n   ```bash\n   ss -tuln\n   ```\n   预期：列出 `Local Address:Port`，如 `0.0.0.0:22`、`127.0.0.1:3306`，状态 `LISTEN`。\n\n2. 只看 TCP 已建立连接：\n   ```bash\n   ss -tnp\n   ```\n   预期：显示本端/对端 IP:端口 与状态 `ESTAB`，`-p` 附进程名（需 root）。\n\n3. 查看特定端口是否被占用：\n   ```bash\n   ss -tlnp 'sport = :80'\n   ss -tln | grep ':22'\n   ```\n\n4. 按状态过滤（仅 ESTABLISHED）：\n   ```bash\n   ss -tan state established\n   ```\n\n## 常见错误\n\n- **`netstat` 找不到**：新系统推荐 `ss`；`netstat` 属废弃工具。习惯 `ss -tuln`。\n- **忘记 `-n` 导致卡顿**：不加 `-n` 会做反向 DNS 解析，慢且有时误导。看端口一律加 `-n`。\n- **看到 `127.0.0.1:port` 却外部连不上**：那是只监听本机回环，不接受外部连接。要让外网访问需监听 `0.0.0.0`。\n- **`-p` 看不到进程**：普通用户看不到别人的进程名，加 `sudo` 再试。\n\n## 小结\n\n1. `ss -tuln` 看监听端口、`ss -tnp` 看已建立连接，取代旧 `netstat`。\n2. LISTEN=等待连接，ESTABLISHED=已连上；`0.0.0.0` 监听所有网卡，`127.0.0.1` 仅本机。\n3. 排查\"端口被占/服务没起\"第一件事就是 `ss -tulnp`。\n\n进阶：下一课用 `dig` 看\"域名怎么解析成 IP\"，配合端口知识，端到端连不通时能精确定位是 DNS 还是端口问题。",
  "l6-ssh": "# SSH 远程登录与端口转发\n\n## 讲解\n\n`ssh`（Secure Shell）是 Linux 运维的命脉：加密地远程登录、执行命令、传文件。`ssh user@host` 默认用密码登录，但**密钥登录**才是正道——本地持私钥、远端 `~/.ssh/authorized_keys` 放公钥，既免密又抗暴力破解。\n\n三个进阶玩法极其实用：\n- **ProxyJump（`-J`）**：透过一台跳板机连内网机器，`ssh -J jump user@内网`，不用手动先登跳板。\n- **本地转发（`-L`）**：把本地端口隧穿到远端能访问的资源（`-L 本地端口:目标:目标端口`）。\n- **远程转发（`-R`）**：反过来，把远端端口映射到本机，常用于内网穿透演示。\n\n安全底线：禁用 root 直登、只用密钥、改掉默认 22 端口（或前置防火墙）、用 `~/.ssh/config` 固化常用连接。\n\n## 动手实验\n\n1. 生成密钥并分发公钥（免密登录）：\n   ```bash\n   ssh-keygen -t ed25519 -C \"my-laptop\"\n   ssh-copy-id user@host        # 把公钥送进远端 authorized_keys\n   ssh user@host                # 此后免密\n   ```\n   说明：一路回车用默认路径 `~/.ssh/id_ed25519`；`ssh-copy-id` 自动处理权限。\n\n2. 用 `~/.ssh/config` 简化：\n   ```bash\n   cat >> ~/.ssh/config <<'EOF'\n   Host web\n     HostName 192.168.1.10\n     User deploy\n     IdentityFile ~/.ssh/id_ed25519\n   EOF\n   chmod 600 ~/.ssh/config\n   ssh web        # 直接别名登录\n   ```\n\n3. ProxyJump 跳板登录：\n   ```bash\n   ssh -J jumpuser@jumphost deploy@10.0.0.5\n   ```\n   说明：先连 jumphost 再跳转内网 `10.0.0.5`，本地无需直连内网。\n\n4. 本地端口转发（访问远端内网服务）：\n   ```bash\n   ssh -L 8080:127.0.0.1:80 deploy@host\n   ```\n   说明：本机访问 `localhost:8080` 就等于访问 host 上的 `127.0.0.1:80`。\n\n## 常见错误\n\n- **`Permission denied (publickey)`**：远端 `authorized_keys` 没你的公钥，或文件权限太开放（`.ssh` 须 700、`authorized_keys` 须 600）。先 `ssh-copy-id` 重发。\n- **`config` 文件权限过宽被忽略**：`~/.ssh/config` 必须是 600，否则 SSH 出于安全直接不读。\n- **ProxyJump 连不上内网**：跳板机能登但内网 IP 不通，确认跳板机能访问目标，且 `-J` 后是\"最终目标\"而非跳板。\n- **端口转发不生效**：忘了转发期间保持 ssh 连接不断开；且本地端口若被占用会报 \"bind: Address already in use\"，换一个本地端口。\n\n## 小结\n\n1. 密钥登录：`ssh-keygen` 生成、`ssh-copy-id` 分发、远端 `authorized_keys` 收公钥，免密又安全。\n2. `~/.ssh/config` 固化 Host/User/密钥，`ssh 别名` 一键连；文件权限须 600。\n3. `-J` 跳板、`-L` 本地转发、`-R` 远程转发，是运维与内网访问的三把钥匙。\n\n进阶：L8 Ansible 默认就走 SSH（最好密钥+config），理解本课你已具备批量管理集群的连接基础。",
  "l7-docker": "# Docker：镜像、容器生命周期与 docker-compose\n\n## 讲解\n\nDocker 把「应用 + 它的运行环境」打包成一个**镜像（image）**，镜像是只读模板；**容器（container）** 是镜像的运行实例，带可写层。一句话：**镜像是类，容器是对象**。\n\n三个必须分清的概念：\n- **镜像（image）**：由 `Dockerfile` 层层构建出的只读文件系统。每次 `RUN` 产生一层，层可缓存复用——这就是为什么把「不变的安装步骤」放前面能大幅加速构建。\n- **容器（container）**：`docker run` 镜像得到的运行实体。它有状态（启动/停止/退出），可以被 `start/stop/rm`。容器的可写层在删除后消失（除非用 volume 持久化）。\n- **docker-compose**：用一个 `docker-compose.yml` 描述「多个容器如何一起跑」（如 web + db），一条 `docker compose up` 拉起整套环境，告别手敲一长串 `docker run`。\n\n学习路径：先会 `docker run` 跑现成镜像 → 再写 `Dockerfile` 做自己的镜像 → 最后用 `compose` 编排多服务。L7 的目标是把 L7-nginx 里的 Web 服务容器化，做到「在我机器上能跑，在你机器上也能跑」。\n\n> 提示：本课的沙盒步骤（见沙盒页）用于在模拟终端里练习「用编辑器/echo 创建 Dockerfile」这一文件操作，真实构建请在本地 Docker 环境执行。\n\n## 动手实验\n\n1. **确认环境**：\n   ```bash\n   docker --version\n   docker info | head -n 5\n   ```\n   预期看到 Client/Server 版本信息（若报 `Cannot connect to the Docker daemon`，说明 daemon 没起：`sudo systemctl start docker`）。\n\n2. **跑一个现成容器**（nginx 官方镜像）：\n   ```bash\n   docker run -d --name web -p 8080:80 nginx:alpine\n   curl -sI http://localhost:8080 | head -n 1   # HTTP/1.1 200 OK\n   ```\n\n3. **写一个最小 Dockerfile**（把静态页面打进 nginx）：\n   ```dockerfile\n   FROM nginx:alpine\n   COPY index.html /usr/share/nginx/html/index.html\n   EXPOSE 80\n   ```\n   ```bash\n   echo \"<h1>Hello Penguin</h1>\" > index.html\n   docker build -t my-web:v1 .\n   docker run -d --name myweb -p 8081:80 my-web:v1\n   ```\n\n4. **容器生命周期管理**：\n   ```bash\n   docker ps                  # 看运行中的容器\n   docker stop myweb          # 停止\n   docker start myweb         # 再启动\n   docker logs myweb          # 看日志\n   docker rm -f myweb         # 强制删除（容器态清空）\n   ```\n\n5. **用 docker-compose 编排 web+db**：\n   ```yaml\n   # docker-compose.yml\n   services:\n     web:\n       build: .\n       ports: [\"8082:80\"]\n     db:\n       image: mysql:8\n       environment:\n         MYSQL_ROOT_PASSWORD: secret\n         MYSQL_DATABASE: app\n   ```\n   ```bash\n   docker compose up -d\n   docker compose ps\n   docker compose down        # 停止并移除\n   ```\n\n## 常见错误\n\n1. **`permission denied` 连不上 daemon**：当前用户不在 `docker` 组。解决：`sudo usermod -aG docker $USER` 后**重新登录**；临时用 `sudo docker ...`。\n2. **镜像越 build 越大**：没用 `.dockerignore` 也没清理。把 `apt` 缓存清理、`COPY` 只放必要文件，并加 `.dockerignore`（排除 `.git`、`node_modules`）。\n3. **容器一启动就退出（Exited）**：Docker 容器在「主进程退出」后就停止。前台命令（如 `nginx -g 'daemon off;'`）要保持运行；别在容器里跑会立刻结束的脚本当主进程。\n4. **数据丢失**：容器删了，里面写的文件也没了。数据库等需持久化的数据必须挂 `volume`（如 `db` 服务加 `volumes: [\"dbdata:/var/lib/mysql\"]`）。\n\n## 小结\n\n- 镜像=只读模板（Dockerfile 构建），容器=运行实例（有生命周期，删了可写层就没）。\n- 三步曲：`docker run` 跑现成 → 写 `Dockerfile` 自制镜像 → `docker compose` 编排多服务。\n- 进阶指引：镜像做好了，下一课用 MySQL 容器跑真实数据库，并学会备份恢复。",
  "l7-mysql": "# MySQL：安装、权限模型与备份恢复基础\n\n## 讲解\n\nMySQL 是最常用的关系型数据库之一。L7 里它通常作为 L7-nginx 反向代理后端的存储层存在。本课聚焦三个运维必备点：**装好、管住权限、能备份能恢复**——后两点直接决定你夜里能不能睡安稳觉。\n\n权限模型是 MySQL 新手最容易迷糊的地方：\n- 账户是 **`'user'@'host'`** 二元组，`'app'@'localhost'` 和 `'app'@'192.168.1.%'` 是两个**不同**账户。host 限制「这个用户从哪台机器连」，写 `%` 表示任意（生产上应尽量收紧）。\n- 授权用 `GRANT`：`GRANT SELECT, INSERT ON db.* TO 'app'@'%';`，再用 `FLUSH PRIVILEGES;` 生效（有些版本自动生效，但手动 flush 更稳妥）。\n- 权限粒度：`*.*`（全局）> `db.*`（库）> `db.table`（表）。\n\n备份与恢复是底线能力：\n- **逻辑备份** `mysqldump`：导出成 SQL 文本，跨版本兼容好，适合中小库。大库会慢、锁表需注意。\n- **恢复**就是把 SQL 文本 `source` 回去或管道喂给 `mysql`。\n- 生产还应了解物理备份（如 Percona XtraBackup），本课先打牢逻辑备份基础。\n\n## 动手实验\n\n1. **安装与初始化**（Debian/Ubuntu，MySQL 8）：\n   ```bash\n   sudo apt update\n   sudo apt install -y mysql-server\n   sudo systemctl enable --now mysql\n   sudo mysql -e \"SELECT VERSION();\"   # 预期看到 8.x 版本号\n   ```\n\n2. **安全初始化**（交互式，建议生产必做）：\n   ```bash\n   sudo mysql_secure_installation\n   # 按提示设置 root 密码、移除匿名用户、禁止 root 远程登录、删 test 库\n   ```\n\n3. **建立应用专用账户并授权**：\n   ```sql\n   CREATE DATABASE appdb CHARACTER SET utf8mb4;\n   CREATE USER 'app'@'192.168.1.%' IDENTIFIED BY 'StrongPass!23';\n   GRANT SELECT, INSERT, UPDATE, DELETE ON appdb.* TO 'app'@'192.168.1.%';\n   FLUSH PRIVILEGES;\n   ```\n\n4. **验证账户只能从指定网段连**：\n   ```bash\n   mysql -u app -p -h 192.168.1.10 appdb -e \"SHOW TABLES;\"\n   ```\n\n5. **备份（mysqldump）**：\n   ```bash\n   mysqldump -u root -p --single-transaction --routines --triggers appdb > appdb_$(date +%F).sql\n   ls -lh appdb_*.sql\n   ```\n\n6. **恢复**：\n   ```bash\n   mysql -u root -p -e \"CREATE DATABASE appdb_restore CHARACTER SET utf8mb4;\"\n   mysql -u root -p appdb_restore < appdb_2026-07-12.sql\n   ```\n\n## 常见错误\n\n1. **`Access denied for user 'app'@'localhost'`**：你以为建了 `'app'@'%'`，但本地连默认走 `'app'@'localhost'`，二者不是一回事。连接来源（socket 本地 vs TCP 远程）决定匹配哪个 host，按需补建对应 host 的账户。\n2. **root 用 `mysql -u root` 登不进**：MySQL 8 默认用 `auth_socket` 插件，只允许系统 root 通过 socket 登录。要么 `sudo mysql`，要么 `ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '密码';`。\n3. **备份时锁表/数据不一致**：MyISAM 会锁表；InnoDB 务必加 `--single-transaction` 拿到一致性快照，业务无感知。\n4. **恢复报 `Unknown database`**：`mysqldump` 默认不建库，需先手动 `CREATE DATABASE` 再 `source`，或备份时加 `--databases` 让 dump 自带 `CREATE DATABASE`。\n\n## 小结\n\n- MySQL 账户是 `'user'@'host'` 二元组，host 控制来源，授权用 `GRANT` + `FLUSH PRIVILEGES`。\n- 备份用 `mysqldump --single-transaction`（InnoDB 一致性），恢复先建库再导入。\n- 进阶指引：L8 用 Ansible 把这整条「装 MySQL + 建库 + 授权」流水线一键化，并引入 ansible-vault 保管密码。",
  "l7-nginx": "# Nginx：虚拟主机、反向代理与负载均衡\n\n## 讲解\n\nNginx 是当今最流行的 Web 服务器与反向代理之一，以高并发、低内存著称。在 L7「服务与 Web」这一关里，Nginx 扮演三个角色：**静态资源服务器**（直接吐 HTML/图片）、**虚拟主机**（一台机器上用域名区分多个站点）、**反向代理/负载均衡**（把请求转发给后端应用或多个节点）。\n\n理解三个核心概念：\n- **虚拟主机（server block）**：一个 `server {}` 块对应一个站点，靠 `server_name` 区分。一台 80 端口的机器可以用 `a.example.com` 和 `b.example.com` 分别服务两个网站。\n- **反向代理**：`location / { proxy_pass http://backend; }` 把请求转发给后端（如 Node、Tomcat、Python），客户端只看到 Nginx。好处是隐藏后端、统一入口、做 TLS 终止。\n- **负载均衡**：在 `http {}` 里定义 `upstream backend { server 10.0.0.1; server 10.0.0.2; }`，Nginx 默认轮询分发，提升可用性与吞吐。\n\n配置文件主位置：`/etc/nginx/nginx.conf`（全局）+ `/etc/nginx/conf.d/*.conf`（按站点拆分，推荐）。改完用 `nginx -t` 校验语法，再 `systemctl reload nginx` 生效。Nginx 是「配置即代码」的典型——改的是文本，跑的是生产。\n\n## 动手实验\n\n1. **安装并启动**（Debian/Ubuntu）：\n   ```bash\n   sudo apt update\n   sudo apt install -y nginx\n   sudo systemctl enable --now nginx\n   curl -sI http://localhost | head -n 1   # 预期看到 HTTP/1.1 200 OK\n   ```\n\n2. **建一个基于域名的虚拟主机** `conf.d/site_a.conf`：\n   ```nginx\n   server {\n       listen 80;\n       server_name a.example.com;\n       root /var/www/a;\n       index index.html;\n       location / { try_files $uri $uri/ =404; }\n   }\n   ```\n   ```bash\n   sudo mkdir -p /var/www/a && echo \"<h1>Site A</h1>\" | sudo tee /var/www/a/index.html\n   ```\n\n3. **反向代理到本地 8080 的后端应用**：\n   ```nginx\n   server {\n       listen 80;\n       server_name api.example.com;\n       location / {\n           proxy_pass http://127.0.0.1:8080;\n           proxy_set_header Host $host;\n           proxy_set_header X-Real-IP $remote_addr;\n       }\n   }\n   ```\n\n4. **配置 upstream 负载均衡**（两个后端节点）：\n   ```nginx\n   upstream app_cluster {\n       server 10.0.0.11:8080 weight=2;\n       server 10.0.0.12:8080;\n   }\n   server {\n       listen 80;\n       server_name app.example.com;\n       location / { proxy_pass http://app_cluster; }\n   }\n   ```\n\n5. **校验并热加载**：\n   ```bash\n   sudo nginx -t            # 预期：syntax is ok / test is successful\n   sudo systemctl reload nginx\n   ```\n\n6. **本地验证虚拟主机**（改 hosts 或直接 curl 带 Host 头）：\n   ```bash\n   curl -H \"Host: a.example.com\" http://localhost   # 预期返回 <h1>Site A</h1>\n   ```\n\n## 常见错误\n\n1. **`nginx: [emerg] unknown directive` 或端口占用**：多半是 `conf.d` 里少了分号，或 80 端口被 Apache 占用。先 `nginx -t` 看行号，再 `sudo ss -tlnp | grep :80` 查冲突进程。\n2. **改了配置不生效**：忘了 `reload`。修改配置后必须 `systemctl reload nginx`（热加载，不断连接）；只有改 `user/worker_processes` 等少数项才需 `restart`。\n3. **反向代理 502 Bad Gateway**：后端没起或 `proxy_pass` 地址写错。先 `curl http://127.0.0.1:8080` 确认后端本身可达，再查防火墙/SELinux。\n4. **`server_name` 不生效、总进默认站点**：Nginx 按 `server_name` 匹配，匹配不到会落到第一个 `server` 或 `default_server`。确认 curl 带了正确的 `Host` 头，或本地 `/etc/hosts` 已绑定域名。\n\n## 小结\n\n- Nginx 三大能力：虚拟主机（`server_name` 分流）、反向代理（`proxy_pass` 隐藏后端）、负载均衡（`upstream` 多节点）。\n- 配置写在 `conf.d/*.conf`，改完先 `nginx -t` 再 `reload`，这是生产铁律。\n- 进阶指引：下一课用 Docker 把 Nginx 与应用打包成可移植的容器，彻底摆脱「环境不一致」。",
  "l8-ansible": "# Ansible：Inventory、ad-hoc 与第一个 Playbook\n\n## 讲解\n\nAnsible 是无 Agent 的自动化运维工具：只靠 SSH 连上目标机，用 YAML 描述「要什么状态」，它负责把现状变成目标状态（幂等）。L8 承接 L7——L7 你手工把 Nginx/MySQL 跑起来了，L8 把它们变成「一行命令复制到 N 台机器」。\n\n三个核心概念：\n- **Inventory（清单）**：描述「管哪些机器、分组、连接信息」。默认 `/etc/ansible/hosts`，也可 `-i` 指定。分组用 `[web]` 这种方括号。\n- **ad-hoc（临时命令）**：`ansible web -m ping` 或 `ansible web -m shell -a \"uptime\"`，适合一次性查看/操作，不用写文件。\n- **Playbook**：YAML 描述的「剧本」，把多个任务编排成可复用、可版本控制的流程。`ansible-playbook site.yml` 执行。\n\n关键思维转变：从「我一步步敲命令」变成「我声明目标状态，Ansible 自己算差异并执行」。Playbook 里的 `module` 是最小执行单元（`apt`/`copy`/`service`/`service` 等），每个 module 都尽量幂等（跑多次结果一致）。\n\n> 沙盒提示：本课沙盒步骤练习用编辑器/`echo` 创建 Inventory 与第一个 Playbook 文件（文件操作可在模拟终端完成）；真实执行需在装有 Ansible 的机器上 `ssh` 可达目标节点。\n\n## 动手实验\n\n1. **安装 Ansible**：\n   ```bash\n   sudo apt update && sudo apt install -y ansible\n   ansible --version | head -n 1     # 预期看到 ansible [core x.y.z]\n   ```\n\n2. **写一份 Inventory**（`inventory.ini`）：\n   ```ini\n   [web]\n   192.168.1.11\n   192.168.1.12\n\n   [db]\n   192.168.1.21\n\n   [all:vars]\n   ansible_user=ubuntu\n   ansible_ssh_private_key_file=~/.ssh/id_rsa\n   ```\n\n3. **ad-hoc 连通性与探活**：\n   ```bash\n   ansible web -i inventory.ini -m ping\n   ansible web -i inventory.ini -m shell -a \"uptime\"\n   ```\n\n4. **第一个 Playbook**（`site.yml`）——给 web 组装 nginx 并启动：\n   ```yaml\n   - hosts: web\n     become: true\n     tasks:\n       - name: 安装 nginx\n         apt:\n           name: nginx\n           state: present\n           update_cache: true\n       - name: 确保 nginx 运行\n         service:\n           name: nginx\n           state: started\n           enabled: true\n   ```\n\n5. **执行并验证**：\n   ```bash\n   ansible-playbook -i inventory.ini site.yml\n   ansible web -i inventory.ini -m shell -a \"systemctl is-active nginx\"\n   ```\n\n## 常见错误\n\n1. **`to use the 'ssh' connection type with passwords, you must install sshpass`**：Inventory 没配 key，又用密码连。要么配 `ansible_ssh_private_key_file`，要么 `apt install sshpass` 并设 `ansible_password`（不推荐明文密码）。\n2. **`UNREACHABLE` / 超时**：目标机 SSH 不通、用户不对或防火墙挡 22。先 `ssh ubuntu@192.168.1.11` 手动确认可达，再检查 Inventory 的 `ansible_user`。\n3. **YAML 缩进报错（`mapping values are not allowed here`）**：YAML 对缩进极敏感，务必用空格（别用 Tab），同一层级对齐。推荐 2 空格缩进。\n4. **Playbook 跑过一次再跑「没变化」**：这是**幂等**在生效，不是失败。Ansible 比对现状与目标，一致就 `ok`/`changed: false`，放心重复执行。\n\n## 小结\n\n- Inventory 管「目标机器清单」，ad-hoc 管「一次性操作」，Playbook 管「可复用编排」。\n- 思维转变：声明目标状态而非逐步敲命令；module 幂等，可反复执行。\n- 进阶指引：下一课用 Roles 把 Playbook 拆成可共享的结构，并用 Jinja2 模板与 ansible-vault 管理配置与密钥。",
  "l8-lamp": "# Ansible 实战：一键部署 LEMP 栈\n\n## 讲解\n\n本课是 L8 的收口实战：把 L7 你手工搭过的 Nginx、MySQL 用 Ansible **一键复现并扩展为 LEMP**（Linux + Nginx + MySQL + PHP）。它验证你前几课的能力——Inventory 分组、Role 结构、Jinja2 渲染、vault 加密——能否拼成一条「从零到生产可用」的流水线。\n\n设计思路（一个 Playbook 编排三个 Role）：\n- `role: nginx`：装 Nginx、渲染虚拟主机模板、启动。\n- `role: mysql`：装 MySQL、用 vault 里的密码建库建用户、开防火墙。\n- `role: php`：装 php-fpm，让 Nginx 把 `.php` 转给 php-fpm（FastCGI）。\n- Playbook 顶层按 `[web]`、`[db]` 分组分别套 Role；敏感密码走 `group_vars/all/vault.yml`（ansible-vault 加密）。\n\n一句话价值：以前你花半小时手工装一套，现在 `ansible-playbook -i inventory.ini lemp.yml --ask-vault-pass` 几十秒在 10 台机器上复制出 10 套一致环境。**一致性**是自动化的第一收益。\n\n## 动手实验\n\n1. **Inventory 分组**（沿用 l8-ansible 的 `inventory.ini`，确保 web/db 分组存在）。\n   ```ini\n   [web]\n   192.168.1.11\n   [db]\n   192.168.1.21\n   ```\n\n2. **PHP Role 的 tasks（`roles/php/tasks/main.yml`）**：\n   ```yaml\n   - apt: { name: [php-fpm, php-mysql], state: present, update_cache: true }\n     become: true\n   - service: { name: php8.1-fpm, state: started, enabled: true }\n     become: true\n   ```\n\n3. **Nginx 虚拟主机模板支持 PHP（`roles/nginx/templates/vhost.conf.j2`）**：\n   ```jinja\n   server {\n       listen 80;\n       server_name {{ domain }};\n       root {{ web_root }};\n       index index.php index.html;\n       location ~ \\.php$ {\n           include fastcgi_params;\n           fastcgi_pass unix:/run/php/php8.1-fpm.sock;\n           fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;\n       }\n   }\n   ```\n\n4. **MySQL Role 用 vault 建库建用户（`roles/mysql/tasks/main.yml`）**：\n   ```yaml\n   - mysql_db: { name: \"{{ db_name }}\", state: present }\n     become: true\n   - mysql_user:\n       name: \"{{ db_user }}\"\n       password: \"{{ db_password }}\"      # 来自 vault\n       priv: \"{{ db_name }}.*:ALL\"\n       host: \"192.168.1.%\"\n       state: present\n     become: true\n   ```\n\n5. **顶层 Playbook `lemp.yml`**：\n   ```yaml\n   - hosts: web\n     roles: [nginx, php]\n   - hosts: db\n     roles: [mysql]\n   ```\n\n6. **一键执行**：\n   ```bash\n   ansible-playbook -i inventory.ini lemp.yml --ask-vault-pass\n   ansible web -i inventory.ini -m shell -a \"curl -s localhost | head -n1\"\n   ```\n\n## 常见错误\n\n1. **php-fpm socket 路径对不上**：Nginx 模板里 `fastcgi_pass` 的 sock 路径（如 `php8.1-fpm.sock`）必须和装的 PHP 版本一致，否则 502。用 `ls /run/php/` 确认真实 sock 名，再用变量传入模板。\n2. **MySQL Role 报 `mysqldb`/`mysql_user` 模块缺失**：需要 `pip install pymysql` 且 Playbook 里 task 加 `become: true` 或以 `ansible_python_interpreter` 指向装了 PyMySQL 的解释器。\n3. **vault 变量在 Role 里取不到**：vault 文件应放在 `group_vars/<组>/` 或 `host_vars/`，且变量名与模板/`{{ }}` 引用一致；执行必须带 `--ask-vault-pass`。\n4. **幂等误判导致每次都 restart**：对 `service` 用 `state: started` 是幂等的（已起则 unchanged）；但若 task 总 `changed`，检查是不是 `command`/`shell` 没加 `creates`/`creates` 或 `changed_when: false`。\n\n## 小结\n\n- LEMP 一键化 = nginx + php-fpm + mysql 三个 Role 由顶层 Playbook 按分组编排，敏感数据全部走 vault。\n- 自动化的第一收益是**环境一致性**：一份 Playbook，N 台机器，零偏差。\n- 进阶指引：L9 用 Prometheus 给这套 LEMP 装上「仪表盘与报警器」，让它能自己告警。",
  "l8-roles": "# Ansible Roles：结构、Jinja2 模板与 ansible-vault\n\n## 讲解\n\n当 Playbook 越写越长，就要把它拆成 **Role（角色）**——Ansible 官方推荐的「可复用单元」。一个 Role 是一个按约定目录组织的文件夹，别人 `roles/myrole` 拿来就能 `roles: [myrole]` 引用，像搭积木。\n\n标准 Role 目录（约定优于配置，Ansible 会自动加载）：\n```\nroles/nginx/\n├── tasks/main.yml        # 主任务列表\n├── handlers/main.yml     # 由 notify 触发的处理（如重载）\n├── templates/            # Jinja2 模板 (.j2)\n├── files/                # 静态文件\n├── vars/main.yml         # 角色内变量\n├── defaults/main.yml     # 默认变量（优先级最低，易被覆盖）\n└── meta/main.yml         # 依赖声明\n```\n\n两个关键能力：\n- **Jinja2 模板**：`templates/nginx.conf.j2` 里写 `worker_processes {{ ansible_processor_vcpus }};`，Ansible 按目标机事实渲染成真实配置。这是「一套模板适配千台机器」的核心。\n- **ansible-vault**：敏感数据（密码、密钥）绝不能明文进 git。`ansible-vault create secret.yml` 加密，`--ask-vault-pass` 解密执行。团队约定把 vault 密码放 CI 环境变量，而非仓库。\n\n## 动手实验\n\n1. **用脚手架初始化 Role**：\n   ```bash\n   ansible-galaxy init roles/nginx\n   tree roles/nginx\n   ```\n\n2. **写 tasks/main.yml**（安装并启用 nginx，变更后重载）：\n   ```yaml\n   - name: 安装 nginx\n     apt: { name: nginx, state: present, update_cache: true }\n     become: true\n   - name: 渲染配置\n     template:\n       src: nginx.conf.j2\n       dest: /etc/nginx/nginx.conf\n     become: true\n     notify: reload nginx\n   - name: 启动 nginx\n     service: { name: nginx, state: started, enabled: true }\n     become: true\n   ```\n\n3. **写 handlers/main.yml**：\n   ```yaml\n   - name: reload nginx\n     service: { name: nginx, state: reloaded }\n     become: true\n   ```\n\n4. **写 Jinja2 模板 `templates/nginx.conf.j2`**：\n   ```jinja\n   worker_processes {{ ansible_processor_vcpus }};\n   events { worker_connections 1024; }\n   http {\n       server {\n           listen {{ nginx_port | default(80) }};\n           server_name {{ inventory_hostname }};\n           root {{ web_root | default('/var/www/html') }};\n       }\n   }\n   ```\n\n5. **用 ansible-vault 加密敏感变量**：\n   ```bash\n   ansible-vault create group_vars/web/vault.yml\n   # 在编辑器里写： db_password: \"StrongPass!23\"\n   ansible-vault view group_vars/web/vault.yml     # 需输入 vault 密码\n   ```\n\n6. **在 Playbook 里引用 Role 并执行**：\n   ```yaml\n   - hosts: web\n     roles: [nginx]\n   ```\n   ```bash\n   ansible-playbook -i inventory.ini site.yml --ask-vault-pass\n   ```\n\n## 常见错误\n\n1. **Role 没被找到（`ERROR! the role ... could not be found`）**：检查 `roles/` 目录名与 `roles:` 引用是否一致，且 Role 目录下有 `tasks/main.yml`（入口文件缺失会报错）。\n2. **Jinja2 变量未定义报 `undefined variable`**：模板引用了没传的变量。给默认值（`{{ x | default(80) }}`）或在 `defaults/main.yml` 声明；调试用 `ansible web -m setup` 看可用 fact。\n3. **vault 文件执行报 `Vault password not provided`**：忘了加 `--ask-vault-pass`，或 CI 没注入 `VAULT_PASSWORD`。也可用 `--vault-password-file`。\n4. **handler 不触发**：只有 task 标了 `notify: reload nginx` 且该 task 状态为 `changed` 时，handler 才在 Playbook 末尾触发；用 `changed_when: false` 的 task 不会触发。\n\n## 小结\n\n- Role = 约定目录结构的可复用单元（tasks/handlers/templates/vars…），`ansible-galaxy init` 生成骨架。\n- Jinja2 模板让「一套配置适配千机」；ansible-vault 让敏感变量安全入版本库。\n- 进阶指引：下一课把 L7 的 LEMP（Linux+Nginx+MySQL+PHP）整条链路用 Role 一键部署实战。",
  "l9-alert": "# Alertmanager：告警路由与 Webhook 通知\n\n## 讲解\n\n监控不告警 = 瞎子点灯。本课在 L9-node 的 Prometheus 之上加 **Alertmanager**，把「指标异常」变成「人能收到的通知」。\n\n两条链路要分清：\n- **告警规则（Prometheus 侧）**：在 `rules/*.yml` 里写 PromQL + 阈值 + `for` 持续时间。例如「内存可用率 < 10% 持续 2 分钟」就触发 `HighMemoryUsage` 告警。Prometheus 评估规则，触发后把告警**推给** Alertmanager。\n- **告警处理（Alertmanager 侧）**：负责「收到告警后怎么办」——**分组（group_by）** 把同类告警合并、**抑制（inhibit_rules）** 避免雪崩式重复、**路由（route）** 按标签分到不同接收端、**静默（silence）** 维护时免打扰。接收端支持邮件、Slack、钉钉，以及最灵活的 **Webhook**（一个 HTTP POST，把告警 JSON 推给你自己的服务，你再转发到任意渠道）。\n\n思维转变：监控是「看见」，告警是「被通知」。好告警系统追求**高信噪比**——该响的响，不重要的别刷屏。\n\n> 沙盒说明：Alertmanager 的路由与 Webhook 需真实服务联动，无法在命令模拟器完成，故 `sandbox:false`，请在真实环境练习。\n\n## 动手实验\n\n1. **写告警规则 `rules/node.yml`**：\n   ```yaml\n   groups:\n     - name: node_alerts\n       rules:\n         - alert: HighMemoryUsage\n           expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 10\n           for: 2m\n           labels: { severity: warning }\n           annotations:\n             summary: \"内存可用率低于 10%（{{ $labels.instance }}）\"\n         - alert: NodeDown\n           expr: up == 0\n           for: 1m\n           labels: { severity: critical }\n           annotations:\n             summary: \"节点失联：{{ $labels.instance }}\"\n   ```\n\n2. **在 `prometheus.yml` 里挂规则**：\n   ```yaml\n   rule_files: [\"/etc/prometheus/rules/*.yml\"]\n   alerting:\n     alertmanagers:\n       - static_configs:\n           - targets: [\"alertmanager:9093\"]\n   ```\n\n3. **写 `alertmanager.yml`**（路由 + Webhook 接收端）：\n   ```yaml\n   route:\n     receiver: webhook\n     group_by: ['alertname', 'instance']\n     group_wait: 30s\n     group_interval: 5m\n     repeat_interval: 4h\n   receivers:\n     - name: webhook\n       webhook_configs:\n         - url: \"http://192.168.1.30:5000/alert\"\n   ```\n\n4. **启动 Alertmanager（容器）**：\n   ```bash\n   docker run -d --name alertmanager -p 9093:9093 \\\n     -v $PWD/alertmanager.yml:/etc/alertmanager/alertmanager.yml \\\n     prom/alertmanager:latest\n   ```\n\n5. **最小 Webhook 接收端（Python，验证推送）**：\n   ```python\n   from http.server import BaseHTTPRequestHandler, HTTPServer\n   class H(BaseHTTPRequestHandler):\n       def do_POST(self):\n           n = int(self.headers.get('Content-Length', 0))\n           print(\"ALERT:\", self.rfile.read(n).decode())\n           self.send_response(200); self.end_headers()\n   HTTPServer(('0.0.0.0', 5000), H).serve_forever()\n   ```\n\n6. **在 Alertmanager UI 建静默**（维护窗口）：\n   打开 `http://localhost:9093` → Silences → New Silence → 按 `instance` 或 `alertname` 匹配 → 设时间段 → Create。\n\n## 常见错误\n\n1. **告警一直 `PENDING` 不 `FIRING`**：漏了 `for` 持续时间，或 PromQL 算出来根本没超阈值。在 Prometheus UI 的 Alerts 页看状态；先在 Graph 里跑一遍 `expr` 确认数值。\n2. **Prometheus 连不上 Alertmanager（告警不发）**：`alerting.alertmanagers.targets` 里的地址在容器网络内要用服务名（如 `alertmanager:9093`）而非 `localhost`。`docker logs prometheus` 看连接报错。\n3. **Webhook 收不到 / 429**：接收端服务没起或返回非 2xx。Alertmanager 会重试；确保 Webhook 服务返回 200，且能处理并发 POST。\n4. **告警刷屏（噪声）**：没配 `group_by`/`group_wait` 或阈值太敏感。用 `group_by` 合并，用 `inhibit_rules` 抑制「因 NodeDown 引发的连带告警」，调高 `for` 过滤抖动。\n\n## 小结\n\n- 告警分两段：Prometheus 规则（写 PromQL+阈值+for）负责「判是否异常」；Alertmanager 负责「通知谁、怎么合并、何时静默」。\n- Webhook 是最灵活的接收端，把告警 JSON POST 给你的服务，再转发任意渠道。\n- 进阶指引：下一课补齐监控的最后一环——日志（rsyslog/journald/logrotate 与集中式思路）。",
  "l9-log": "# 日志体系：rsyslog、journald、logrotate 与集中式思路\n\n## 讲解\n\n指标（L9-node）看趋势，日志看「当时到底发生了什么」。本课补齐可观测性的第三根支柱——**日志**。\n\n现代 Linux 有两条并行的系统日志线：\n- **journald（systemd-journald）**：systemd 自带的二进制日志，存 `/run/log/journal`（内存/磁盘）。`journalctl` 是它的查询入口，支持按服务/时间/优先级过滤，如 `journalctl -u nginx -p err --since \"1 hour ago\"`。优点是结构化、和 unit 强绑定；缺点是二进制格式，跨机分析不便。\n- **rsyslog**：传统 syslog 守护进程，按 `facility.priority` 规则把日志写到 `/var/log/*.log`（如 `auth.log`、`syslog`）。可配置把日志**转发**到远程日志服务器（集中式的关键）。很多发行版两者并存：journald 收，rsyslog 从 journal 取并落盘/转发。\n\n还有个绕不开的配角 **logrotate**：日志会无限增长撑爆磁盘，logrotate 按日/周/大小轮转、压缩、保留 N 份、轮完可 reload 服务。配置在 `/etc/logrotate.d/`。\n\n集中式思路：单机 `tail` 在 100 台机器时不现实。业界用 **ELK（Elasticsearch+Logstash+Kibana）/ Loki / 或 Promtail+Loki+Grafana**——各机 agent 把日志推到中心，统一检索。本课建立思路，具体栈可在真实环境搭。\n\n> 沙盒说明：journald/rsyslog 是系统级服务且与真实 unit 绑定，无法在命令模拟器复现，故 `sandbox:false`，请在真实环境练习。\n\n## 动手实验\n\n1. **用 journalctl 查服务日志**：\n   ```bash\n   journalctl -u nginx -p err --since \"2 hours ago\"   # 看 nginx 近 2 小时错误\n   journalctl -f -u docker                            # 实时跟随（类似 tail -f）\n   ```\n\n2. **看传统 syslog 落盘文件**：\n   ```bash\n   ls -lh /var/log/          # 常见：syslog, auth.log, kern.log\n   sudo tail -n 20 /var/log/auth.log   # 看登录/认证相关\n   ```\n\n3. **配置 rsyslog 转发到远程（集中式第一步）**，在 `/etc/rsyslog.d/10-forward.conf`：\n   ```bash\n   *.* @@logserver.example.com:514   # @@ = TCP，@ = UDP\n   ```\n   ```bash\n   sudo systemctl restart rsyslog\n   ```\n\n4. **写一条 logrotate 规则** `/etc/logrotate.d/myapp`：\n   ```bash\n   /var/log/myapp/*.log {\n       daily\n       missingok\n       rotate 14\n       compress\n       delaycompress\n       notifempty\n       sharedscripts\n       postrotate\n           systemctl reload myapp > /dev/null 2>&1 || true\n       endscript\n   }\n   ```\n   ```bash\n   sudo logrotate -d /etc/logrotate.d/myapp   # 演练（dry-run，不真转）\n   sudo logrotate -f /etc/logrotate.d/myapp   # 强制立即轮转验证\n   ```\n\n5. **（思路）用 Promtail+Loki 接入 Grafana**：\n   在每台机装 Promtail 读 `/var/log/*.log` 与 journal，推到 Loki，Grafana 加 Loki 数据源统一查——与 L9-node 的看板同一入口。\n\n## 常见错误\n\n1. **`journalctl` 没历史（重启丢日志）**：默认 journal 可能只存内存（`Storage=volatile`）。改 `/etc/systemd/journald.conf` 设 `Storage=persistent` 并 `mkdir -p /var/log/journal && systemctl restart systemd-journald`。\n2. **磁盘被日志写满（`No space left`）**：忘了配 logrotate 或规则未触发。`df -h /var/log` 排查；确认 logrotate 的 cron/系统 timer 在跑（`systemctl status logrotate.timer`）。\n3. **rsyslog 转发不生效**：远程 514 端口被防火墙挡，或用了 `@@`(TCP) 但服务端只收 UDP。先用 `nc -vz logserver 514` 测连通；本机 `logger -p local0.info \"test\"` 后查远端是否收到。\n4. **logrotate 轮完服务仍写旧文件**：轮转后文件被改名但进程还握着旧 fd。务必在 `postrotate` 里 `reload`/`kill -HUP` 让服务重新打开日志文件（或用 `copytruncate` 方案）。\n\n## 小结\n\n- 系统日志两条线：journald（二进制、按 unit、用 `journalctl` 查）+ rsyslog（文本、落盘 `/var/log`、可转发集中）。\n- logrotate 是防磁盘爆的刚需：按大小/时间轮转压缩，轮完 reload 服务。\n- 进阶指引：把指标（Prometheus）、告警（Alertmanager）、日志（Loki/ELK）三路汇入 Grafana，你就拥有了完整的可观测性体系——这也是 L9 的里程碑。",
  "l9-node": "# Prometheus + node_exporter + Grafana 监控部署\n\n## 讲解\n\nL9 是「把系统看住」的一关。核心三角：**采集（exporter）→ 存储/查询（Prometheus）→ 展示（Grafana）**。\n\n- **node_exporter**：跑在被监控机上，把 CPU/内存/磁盘/网络等指标以 HTTP 接口（`/metrics`）暴露成文本。一个 `node_exporter` 负责一台主机。\n- **Prometheus**：时序数据库 + 拉取（pull）模型。它按 `scrape_interval` 主动去各 exporter 的 `/metrics` 拉数据，存进自己的 TSDB。配置写在 `prometheus.yml` 的 `scrape_configs` 里，用 `job_name` + `static_configs.targets` 列出目标。查询语言是 **PromQL**，如 `rate(node_cpu_seconds_total[5m])`。\n- **Grafana**：把 Prometheus 当数据源，用仪表盘（Dashboard）把指标画成图。官方社区有大量现成 Dashboard（如 Node Exporter Full，ID 1860），导入即用。\n\n思维转变：从「出问题去翻日志」变成「指标持续在收集，仪表盘实时可见，告警主动找你」。本课把 L7 的 Docker 环境利用起来——整套监控栈都能容器化部署。\n\n> 沙盒说明：Prometheus 的 `promtool` 校验、真实拉取都依赖运行中的服务，无法在纯命令模拟器里完成，故本课 `sandbox:false`，请在真实/容器环境练习。\n\n## 动手实验\n\n1. **部署 node_exporter（容器方式）**：\n   ```bash\n   docker run -d --name node_exporter -p 9100:9100 \\\n     prom/node-exporter:latest\n   curl -s http://localhost:9100/metrics | grep -E \"^node_cpu|^node_memory\" | head\n   ```\n\n2. **写 `prometheus.yml`**：\n   ```yaml\n   global:\n     scrape_interval: 15s\n   scrape_configs:\n     - job_name: \"node\"\n       static_configs:\n         - targets: [\"192.168.1.11:9100\", \"192.168.1.12:9100\"]\n     - job_name: \"prometheus\"\n       static_configs:\n         - targets: [\"localhost:9090\"]\n   ```\n\n3. **启动 Prometheus（挂载配置）**：\n   ```bash\n   docker run -d --name prometheus -p 9090:9090 \\\n     -v $PWD/prometheus.yml:/etc/prometheus/prometheus.yml \\\n     prom/prometheus:latest\n   # 浏览器打开 http://localhost:9090 → Status → Targets 看目标是否 UP\n   ```\n\n4. **用 PromQL 查询**（在 9090 的 Graph 页）：\n   ```promql\n   rate(node_cpu_seconds_total{mode=\"idle\"}[5m])\n   node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100\n   ```\n\n5. **部署 Grafana 并加数据源**：\n   ```bash\n   docker run -d --name grafana -p 3000:3000 grafana/grafana:latest\n   ```\n   登录 `http://localhost:3000`（默认 admin/admin）→ Connections → Data sources → Add Prometheus → URL 填 `http://prometheus:9090`（同网络用服务名）或 `http://宿主机IP:9090`。\n\n6. **导入 Node Exporter 看板**：\n   Grafana → Dashboards → Import → 输入 Dashboard ID `1860` → 选 Prometheus 数据源 → Load。即可看到 CPU/内存/磁盘/网络全量图表。\n\n## 常见错误\n\n1. **Prometheus Targets 显示 DOWN**：网络不通或 exporter 没起。先 `curl http://目标:9100/metrics` 确认可达；容器跨主机注意防火墙放 9100。同 docker 网络内用容器名/服务名而非 `localhost`。\n2. **Grafana 连不上 Prometheus（`Bad Gateway` / 连接拒绝）**：数据源 URL 填错。Grafana 容器访问宿主机 Prometheus 不能用 `localhost`（那是 Grafana 自己），要用宿主机真实 IP 或把两者放同一 `docker network`。\n3. **`prometheus.yml` 缩进错导致启动失败**：YAML 严格缩进，且 `scrape_configs` 下 `- job_name` 的横线不能省。改完用 `docker logs prometheus` 看具体报错行，或用 `promtool check config prometheus.yml` 校验。\n4. **指标查出来是空/老数据**：确认 `scrape_interval` 与查询的时间范围（Grafana 右上角时间选择器）覆盖拉取周期；刚启动需等一个 interval 才有数据。\n\n## 小结\n\n- 监控三件套：node_exporter 采集 → Prometheus 拉取存储（PromQL 查询）→ Grafana 可视化。\n- 配置核心是 `prometheus.yml` 的 `scrape_configs`；容器化部署最省心。\n- 进阶指引：下一课用 Alertmanager 让异常主动告警，而不是等你盯着看板。"

  "roadmap": "# Penguin Path 能力总纲路线图（roadmap）\n\n> **总纲定位**：Penguin Path 是一条从「不敢碰终端的小白」到「能设计高可用架构与 SRE 体系的高级工程师」的 12 级递进式 Linux 成长路线，每一级都对应一套可验证的实战能力，而非纸上谈兵。\n\n---\n\n## 一、12 级能力总表（L1 ~ L12）\n\n| 代号 | 级别 | 定位 | 核心目标 | 代表技能点 | 推荐周数 |\n|------|------|------|----------|------------|----------|\n| L1 小白启航 | L1 | 入门 | 不怕终端，会基础文件操作 | 终端/help/ls/pwd/cd、文件增删改查 | 1 周 |\n| L2 文件系统 | L2 | 入门 | 路径/权限/查找通透 | 绝对/相对路径、chmod、find/locate、软硬链接 | 1~2 周 |\n| L3 文本处理 | L3 | 入门 | grep/sed/awk 三剑客 | 正则、管道、文本流编辑、列处理 | 2 周 |\n| L4 系统管理 | L4 | 初级 | 用户/进程/服务/包管理 | useradd、ps/top、systemd、apt/yum | 2~3 周 |\n| L5 Shell 编程 | L5 | 初级 | 写可复用脚本 | 变量/条件/循环、函数、参数、cron | 2~3 周 |\n| L6 网络基础 | L6 | 初级 | 联网与远程运维 | ip/ss、dig/nslookup、ssh/scp、防火墙基础 | 2 周 |\n| L7 服务与Web | L7 | 中级 | Nginx/数据库/容器落地 | Nginx 虚拟主机与反向代理、Docker 生命周期、MySQL 权限与备份 | 3~4 周 |\n| L8 自动化 | L8 | 中级 | 用 Ansible 批量运维 | Inventory、ad-hoc、Playbook、Roles、ansible-vault | 3 周 |\n| L9 监控运维 | L9 | 中级 | 可观测性与日志体系 | Prometheus+Grafana、Alertmanager、集中式日志 | 3 周 |\n| L10 安全加固 | L10 | 高级 | 最小权限与合规审计 | 最小权限、iptables/nftables、审计(auditd)、SSH 加固 | 3~4 周 |\n| L11 性能调优 | L11 | 高级 | 用数据定位瓶颈 | USE 方法、内核参数(sysctl)、压测、火焰图思路 | 3~4 周 |\n| L12 架构与SRE | L12 | 高级 | 高可用与故障演练 | 高可用设计、容量规划、混沌工程、SLO/Error Budget | 4 周+ |\n\n---\n\n## 二、能力树 / 阶段递进关系（ASCII）\n\n```\n                         ┌─────────────────────────────────────────────┐\n                         │            L12 架构与 SRE（高级巅峰）          │\n                         └───────────────────────┬─────────────────────┘\n                  L10 安全加固 ◄────┬────► L11 性能调优 ◄──┐\n                                    │                     │\n                         ┌──────────┴─────────────────────┴──────────┐\n                         │        中级三角：能独立交付生产系统          │\n                         │  L7 服务与Web  ──►  L8 自动化  ──►  L9 监控运维 │\n                         └───────────┬──────────────┬──────────────┘\n                                     │              │\n                         ┌───────────┴──────────────┴───────────┐\n                         │        初级三关：会写会管会联网          │\n                         │  L4 系统管理 ─► L5 Shell编程 ─► L6 网络基础 │\n                         └───────────┬──────────────┬───────────┘\n                                     │              │\n                         ┌───────────┴──────────────┴───────────┐\n                         │        入门三关：建立肌肉记忆          │\n                         │  L1 小白启航 ─► L2 文件系统 ─► L3 文本处理 │\n                         └───────────────────────────────────────┘\n\n依赖方向（实线为强前置，虚线为能力互补）：\n  L1→L2→L3→L4→L5→L6→L7→L8→L9→{L10, L11}→L12\n  L7/L8/L9 三者为「交付三角」：先用 L7 把服务跑起来，用 L8 把它批量复制，用 L9 把它看住。\n  L10 与 L11 平行（安全与性能），共同支撑 L12 的架构与 SRE 决策。\n```\n\n---\n\n## 三、成长路径与里程碑\n\n### 阶段一：入门（L1~L3）—— 建立肌肉记忆\n- **里程碑 M1（完成 L3）**：能用终端完成 90% 的日常文件与文本操作，不再依赖图形界面找文件。\n- 标志：看到报错会先 `cat` 日志、`grep` 关键字、`find` 定位。\n\n### 阶段二：初级（L4~L6）—— 会管一台机器\n- **里程碑 M2（完成 L6）**：能独立**运维单台服务器**——建用户、管进程、配包源、远程 SSH 上去排错、看懂网络连接。\n- 标志：收到「这台机器怎么这么慢/连不上」的工单，你能独立定位到用户、进程或网络层。\n\n### 阶段三：中级（L7~L9）—— 能交付生产系统（交付三角）\n- **里程碑 M3（完成 L7）**：能把一个 Web 服务 + 数据库 + 容器**真正跑起来并对外可用**（Nginx 反向代理、Docker 部署、MySQL 可恢复）。\n- **里程碑 M4（完成 L8）**：能把 L7 的手工操作**沉淀为可复用的 Ansible Playbook/Roles**，一键在多台机器上重复部署，告别「手工点点点」。\n- **里程碑 M5（完成 L9）**：能**搭建监控体系**——指标(Prometheus)、看板(Grafana)、告警(Alertmanager)、日志(集中式)，系统出问题你比用户先知道。\n- 标志：从「人肉运维」升级为「用代码和仪表盘运维」。\n\n### 阶段四：高级（L10~L12）—— 能守住与能设计\n- **里程碑 M6（完成 L10/L11）**：能**加固系统安全**、能**用数据定位性能瓶颈**，而不是靠猜。\n- **里程碑 M7（完成 L12）**：能做**架构与 SRE 方案**——设计高可用拓扑、定义 SLO/Error Budget、组织故障演练(混沌工程)、写容量规划与事故复盘。这是路线终点，也是「高级工程师」与「资深/架构师」的分水岭。\n\n### 一句话路径\n> L1~L3 学会用终端 → L4~L6 学会管一台机 → L7 把服务跑起来 → L8 把它批量化 → L9 把它看住 → L10/L11 守住安全与性能 → L12 设计架构与 SRE 体系。\n\n---\n\n## 四、本路线图与课程切分对应关系\n\n- L1~L3 入门三关：`content/l1-*.md ~ l3-*.md`（小码哥）\n- L4~L6 初级三关：`content/l4-*.md ~ l6-*.md`（言秘书）\n- **L7~L9 中级三角：`content/l7-*.md ~ l9-*.md`（少年派，本路线图作者）**\n- L10~L11 高级双翼：`content/l10-*.md ~ l11-*.md`（小政哥）\n- L12 架构与 SRE：本路线图定义目标，课程由主 agent 统筹收口。\n\n> 参见 `partner-workspace/shaonianpai/COORD.md` 获取完整交付清单与集成说明。\n",
  "setup-env": "# 练习环境搭建（Penguin Path / 企鹅之路）\n\n> 本文档教你准备一台能\"真刀真枪\"练 L1~L12 课程的 Linux 环境。\n> 目标：命令经得起敲，不依赖任何在线服务即可学习。\n> 四种方式任选其一，推荐新手从 **容器** 或 **WSL2** 起步，想贴近生产再上 **虚拟机/云主机**。\n\n---\n\n## 0. 先说结论：选哪种？\n\n| 方式 | 上手难度 | 隔离性 | 资源占用 | 适合场景 |\n|------|----------|--------|----------|----------|\n| 本地虚拟机（VirtualBox/VMware/Hyper-V） | 中 | 强 | 高（需 2G+ 内存） | 想完整体验开机/分区/GRUB/救援模式 |\n| WSL2（Windows 自带） | 低 | 中 | 低 | Windows 用户日常练习，最接近真机 |\n| 云主机（阿里云/腾讯云轻量） | 低 | 强 | 需花钱 | 想有公网 IP、练 SSH/防火墙/Web |\n| 容器（Docker） | 低 | 弱（共享内核） | 极低 | 快速起个 shell 练命令，几秒搞定 |\n\n---\n\n## 1. 本地虚拟机（推荐 Rocky Linux 9 最小化安装）\n\n> Rocky Linux 9 是 RHEL 9 的社区克隆，免费、稳定、企业生产级，最适合学习。\n\n### 1.1 选择虚拟化软件\n- **VirtualBox**（免费、跨平台）：https://www.virtualbox.org\n- **VMware Workstation Player / Pro**（Windows/Linux）：https://www.vmware.com\n- **Hyper-V**（Windows 专业版/企业版自带，仅 Windows）\n\n### 1.2 下载系统镜像\n- Rocky Linux 9 最小化 ISO：`https://rockylinux.org/download`（选 \"Minimal\" 约 1.3GB）\n- 备用：AlmaLinux 9、CentOS Stream 9（命令几乎一致）\n\n### 1.3 创建虚拟机（以 VirtualBox 为例）\n1. 新建 → 名称 `penguin-lab` → 类型 `Linux` / 版本 `Red Hat (64-bit)`。\n2. 内存 ≥ 2048 MB；硬盘 ≥ 20 GB（VDI，动态分配）。\n3. 设置 → 存储 → 控制器 IDE 挂载刚才下的 `Rocky-9-...-minimal.iso`。\n4. 网络：默认 `NAT` 即可；想主机直连用 `桥接网卡`。\n5. 启动 → 安装界面选 `Install Rocky Linux 9` → 语言选中文或 English。\n\n### 1.4 安装过程要点\n- 安装目标（Installation Destination）：自动分区即可（新手）。\n- 软件选择（Software Selection）：**最小安装（Minimal Install）**。\n- 用户设置：设置 root 密码 + 新建一个普通用户并勾选\"将此用户设为管理员\"。\n- 完成 → 重启，弹出 ISO → 进入系统。\n\n### 1.5 首次登录后的初始化命令\n```bash\n# 更新系统（中国大陆用户可先换镜像源，见下文）\nsudo dnf update -y\n\n# 安装常用工具（最小化安装缺很多命令，L6 以后必用）\nsudo dnf install -y vim net-tools iproute-traceroute bind-utils \\\n        bash-completion tar gzip unzip wget curl git tree\n\n# 确认里有 sudo（普通用户提权用，L10 会讲精细授权）\nsudo whoami        # 应输出 root\n\n# 关闭 SELinux 仅用于练习环境（可选，生产勿关）\ngetenforce\n```\n\n> 换源（中科大 Rocky 镜像，练习机提速）：\n> ```bash\n> sudo sed -i 's|^mirrorlist=|#mirrorlist=|g; s|^#baseurl=http://dl.rockylinux.org|baseurl=https://mirrors.ustc.edu.cn/rocky|g' /etc/yum.repos.d/rocky*.repo\n> sudo dnf makecache\n> ```\n\n---\n\n## 2. WSL2（Windows 用户最省事）\n\n### 2.1 一键安装\n以**管理员**打开 PowerShell：\n```powershell\nwsl --install\n# 默认装 Ubuntu；重启后按提示设用户名/密码\n```\n如需指定发行版（推荐 Ubuntu 22.04 或 Debian）：\n```powershell\nwsl --list --online      # 查看可安装列表\nwsl --install -d Ubuntu-22.04\n```\n\n### 2.2 开启 systemd（很多服务依赖它）\nWSL2 默认不带 systemd。编辑 `/etc/wsl.conf`：\n```bash\nsudo tee /etc/wsl.conf > /dev/null <<'EOF'\n[boot]\nsystemd=true\nEOF\n```\n回到 **PowerShell** 重启 WSL 使配置生效：\n```powershell\nwsl --shutdown\nwsl\n```\n进入后验证：\n```bash\nps -p 1 -o comm=     # 输出 systemd 即成功\n```\n\n### 2.3 常用设置\n```bash\n# 更新\nsudo apt update && sudo apt full-upgrade -y\n\n# 装工具（Debian/Ubuntu 系用 apt）\nsudo apt install -y vim net-tools iproute2 dnsutils \\\n        bash-completion tar gzip unzip wget curl git tree\n\n# 在文件资源管理器访问 WSL 文件：\\\\wsl$\\<发行版名>\\\n```\n\n> 想练 Rocky/Alibaba 系？WSL 商店也有 `Rocky Linux` 可用，安装方式同上 `wsl --install -d Rocky`。\n\n---\n\n## 3. 云主机（阿里云 / 腾讯云轻量应用服务器）\n\n> 适合想有公网 IP、练 SSH 加固、防火墙、Nginx 的场景。费用以 2026 年常见促销价估算，**实际以下单页为准**。\n\n### 3.1 配置与月费区间参考\n| 厂商 | 规格 | 系统盘 | 带宽/流量 | 参考月费（新用户促销） |\n|------|------|--------|-----------|------------------------|\n| 腾讯云轻量应用服务器 | 2 核 2G | 40~60 GB SSD | 3~4 Mbps / 200~300 GB 流量 | ¥50 ~ ¥70 |\n| 腾讯云轻量应用服务器 | 2 核 4G | 60~80 GB SSD | 4~5 Mbps / 300~500 GB 流量 | ¥80 ~ ¥110 |\n| 阿里云轻量应用服务器 | 2 核 2G | 40~60 GB SSD | 3~4 Mbps / 200~300 GB 流量 | ¥50 ~ ¥70 |\n| 阿里云 ECS（突发型） | 2 核 2G | 40 GB | 按量/包年 | ¥60 ~ ¥90 |\n\n- 镜像选 **Rocky Linux 9 / AlmaLinux 9 / Ubuntu 22.04 LTS** 均可。\n- 新用户首年常有 ¥几十 的特价，老用户价约翻倍。\n\n### 3.2 登录与初始化\n购买后在控制台\"重置密码\"或下载密钥，然后用本地终端登录：\n```bash\n# 密钥方式（推荐）\nssh -i ~/.ssh/id_rsa <用户名>@<公网IP>\n\n# 或密码方式\nssh <用户名>@<公网IP>\n```\n登录后立即做三件事（与 L10 呼应）：\n```bash\n# 1) 更新\nsudo dnf update -y          # RHEL 系\n#   或 sudo apt update && sudo apt upgrade -y   # Debian/Ubuntu 系\n\n# 2) 新建普通用户并给 sudo（不要长期用 root 直登）\nsudo adduser lab && sudo usermod -aG wheel lab    # RHEL 系\n#   或 sudo adduser lab && sudo usermod -aG sudo lab  # Debian 系\n\n# 3) 配置防火墙默认拒绝（详见 L10-firewall）\n```\n> ⚠️ 云主机安全组也要在厂商控制台设置，只放行 22/80/443 等必要端口。\n\n---\n\n## 4. 容器方式（Docker，最快起手）\n\n> 几秒起一个 Linux，练命令零负担。注意：容器共享宿主机内核，无法练 GRUB/内核参数/完整 systemd（可用 `docker run --privileged` 或 `systemd` 镜像弥补部分需求）。\n\n### 4.1 安装 Docker\n- Windows / macOS：装 Docker Desktop（https://www.docker.com/products/docker-desktop/）。\n- Linux：`curl -fsSL https://get.docker.com | sudo sh`\n\n### 4.2 起一个练习容器\n```bash\n# CentOS Stream 9\ndocker run -it --name penguin-lab centos:stream9 bash\n\n# 或 Ubuntu 22.04\ndocker run -it --name penguin-lab ubuntu:22.04 bash\n\n# 或 Rocky Linux 9（贴近生产推荐）\ndocker run -it --name penguin-lab rockylinux:9 bash\n```\n\n### 4.3 初始化容器里的系统\n```bash\n# Rocky/CentOS（RHEL 系）\ndnf update -y && dnf install -y vim net-tools iproute bind-utils \\\n        bash-completion tar gzip unzip wget curl git tree\n\n# Ubuntu（Debian 系）\napt update && apt install -y vim iproute2 dnsutils \\\n        bash-completion tar gzip unzip wget curl git tree\n```\n\n### 4.4 常用容器操作\n```bash\ndocker ps -a                       # 查看容器（含已退出）\ndocker start -ai penguin-lab       # 重新进入交互\ndocker exec -it penguin-lab bash   # 在运行中的容器再开一个 shell\ndocker rm -f penguin-lab           # 删掉重来\n```\n> 想练 systemd 管理的服务？用特权模式：`docker run -it --privileged --name lab rockylinux:9 /sbin/init`，\n> 然后在另开终端 `docker exec -it lab bash`，里面 `systemctl` 即可用。\n\n---\n\n## 5. 练习环境最小清单（对照课程）\n\n- [ ] 能 `ssh` / `wsl` / `docker exec` 进入一台 Linux。\n- [ ] 有普通用户且能 `sudo`（L4/L10）。\n- [ ] 装好 `vim curl wget git net-tools`（L2~L6 全程用到）。\n- [ ] 能 `dnf update` / `apt update`（联网）。\n- [ ] 想练内核/防火墙/审计：优先虚拟机或云主机，而非容器。\n\n> 下一步：回到课程 L1 开始\"你好，Linux！\"。遇到命令不懂，用 `man <命令>` 或 `<命令> --help`。\n",
  "resources": "# 📚 Penguin Path · 学习资源推荐\n\n> 言秘书整理。以下书籍、文档、课程、平台均为真实可查资源；链接尽量用官方/稳定地址。\n> 资源持续更新，建议配合本项目 L1~L12 主线按需取用。\n\n---\n\n## 一、必读书籍\n\n| 书名 | 理由 | 优先级 |\n|------|------|--------|\n| 《The Linux Command Line》（William Shotts，有免费中文译本《快乐的 Linux 命令行》） | 最友好的命令行入门书，从 shell 基础讲到脚本，概念清晰、例子多，零基础首选 | ⭐⭐⭐ 高 |\n| 《鸟哥的 Linux 私房菜 基础学习篇》 | 中文世界经典，覆盖文件系统、权限、shell、网络，讲解细致，适合系统性打底 | ⭐⭐⭐ 高 |\n| 《UNIX/Linux 系统管理技术手册》（Nemeth 等，第 5 版） | 系统管理\"百科全书\"，用户/进程/服务/网络/存储全涉及，进阶案头书 | ⭐⭐ 中 |\n| 《Linux 命令行与 shell 脚本编程大全》（Richard Blum） | bash 脚本专题，变量/条件/函数/调试讲得透，配合本项目 L5 极好 | ⭐⭐ 中 |\n| 《How Linux Works》（Brian Ward） | 讲清\"系统是怎么跑起来的\"：init、内核、设备、网络栈，适合想通透理解的人 | ⭐⭐ 中 |\n| 《TCP/IP 详解 卷 1》（Stevens） | 网络底层权威，配合 L6/L7 网络与服务，深而经典 | ⭐ 低（按需） |\n\n> 优先读免费/开源资源：《The Linux Command Line》官网提供完整 PDF 免费下载（linuxcommand.org）。\n\n---\n\n## 二、官方文档\n\n| 资源 | 地址 | 说明 |\n|------|------|------|\n| Arch Wiki | https://wiki.archlinux.org | 近乎\"通用 Linux 百科\"，发行版无关，覆盖安装/网络/服务/排错，质量极高 |\n| Debian 手册 | https://www.debian.org/doc/ | 官方使用手册，包管理(apt/dpkg)权威参考 |\n| Ubuntu Server 文档 | https://ubuntu.com/server/docs | 服务器场景的官方指引，含 systemd/网络 |\n| systemd 官方文档 | https://www.freedesktop.org/wiki/Software/systemd/ | unit 文件、`systemctl`/`journalctl` 最权威出处 |\n| man7.org (Linux man pages) | https://man7.org | 在线 man 手册，查 `ip`/`ss`/`kill`/`signal` 等的精确语义 |\n| Bash 参考手册 | https://www.gnu.org/software/bash/manual/ | bash 变量/引号/数组/流程控制官方定义 |\n| IPv6/网络工具 iproute2 文档 | https://wiki.linuxfoundation.org/networking/iproute2 | `ip`/`ss` 命令族说明 |\n\n---\n\n## 三、在线课程\n\n| 课程 | 平台 | 说明 |\n|------|------|------|\n| Introduction to Linux | edX / Linux Foundation | 免费入门课，证书可选，体系化 |\n| Linux Command Line Basics | Udacity (免费) | 短平快，适合零基础摸终端 |\n| LFCS / LFCE 认证课 | Linux Foundation | 面向系统管理员认证的付费系统课，覆盖 L4~L6 主题 |\n| 红帽 RHCSA/RHCE 课程 | Red Hat / 各大培训机构 | RHEL 系系统管理实战，对应 yum/dnf、systemd |\n| MIT 6.NULL / 各类高校\"实用 Linux\"公开课 | 各校 OCW | 偏实战的命令行与系统管理 |\n\n> 提示：B 站/慕课也有大量中文 Linux 入门视频，关键词\"鸟哥 Linux\"\"尚硅谷 Linux\"；注意甄别时效性，优先近 3 年内容。\n\n---\n\n## 四、免费实验平台（不装虚拟机也能练）\n\n| 平台 | 地址 | 说明 |\n|------|------|------|\n| Killercoda | https://killercoda.com | 浏览器内即开即用的 Linux 实验场，含命令行/网络/K8s 场景，免登录试玩 |\n| Play with Docker | https://labs.play-with-docker.com | Docker 官方提供的免费 4 小时沙盒，练习容器与命令 |\n| Play with Kubernetes | https://labs.play-with-k8s.com | 同上，K8s 实验场 |\n| overthewire (Bandit) | https://overthewire.org/wargames/bandit/ | 游戏化命令行闯关，从 `ssh` 基础到文本处理，趣味练手 |\n| IBM Skills Network Labs | https://skills.network | 提供限时 Linux 实验环境 |\n| 本项目交互沙盒 | 本仓库 `sandbox/index.html` | 由 emulator.js 模拟的浏览器终端，练 L1~L6 基础命令 |\n\n> 本项目 `sandbox/` 仅模拟基础命令（help/ls/cd/ps/echo/cat/grep/| 等），系统级操作（useradd/systemctl/网络）请在上述真实平台练习。\n\n---\n\n## 五、中文社区与问答\n\n| 社区 | 地址 | 说明 |\n|------|------|------|\n| 知乎 Linux 话题 | https://www.zhihu.com/topic/19550956 | 大量科普与实战长文 |\n| V2EX 技术节点 | https://www.v2ex.com/?node=linux | 日常讨论、踩坑分享 |\n| 博客园 / CSDN Linux 频道 | https://www.cnblogs.com / https://www.csdn.net | 中文教程与排错笔记（注意甄别时效性） |\n| Stack Overflow (英文) | https://stackoverflow.com | 提问前先搜，标签 `[linux]` `[bash]` `[ssh]` |\n| Unix & Linux Stack Exchange | https://unix.stackexchange.com | 比 SO 更专精的 Unix/Linux 问答社区 |\n| Arch 中文论坛 / 各发行版官方论坛 | 见各官网 | 发行版专属问题的一手来源 |\n| GitHub / GitLab 开源项目 | https://github.com | 读源码、提 issue，跟真实工程学习 |\n\n---\n\n## 使用建议\n\n1. **先主线后扩展**：按本项目 L1→L6 顺序刷完图文课 + 沙盒，再按需深入书籍/官方文档。\n2. **动手优先**：每看一个命令，立刻在 Killercoda 或本项目沙盒敲一遍，比只读强十倍。\n3. **排错靠官方**：遇到命令语义不清，首选 `man` 与 man7.org；发行版问题查对应 Wiki。\n4. **社区提问艺术**：先 `man`/`search`/看日志，附上命令+完整报错+环境，别人更愿意帮你。\n",
  "team-case": "# 团队整改协作案例 · Penguin Path 企鹅之路\n\n> 一份**可复用的多 Agent 协作实战复盘**：如何把\"一个人闷头做\"变成\"一个指挥 + 四个专业伙伴并行交付\"，并把产物用工程手段自动收口、零废话、零冲突、零弄虚作假。\n> 本文件本身即案例产物——它记录的是「我们这次怎么把 Linux 学习系统做出来的」，而不是系统使用说明。\n\n---\n\n## 一、背景：为什么要用团队协作来做\n\n用户要一个「从入门到高级工程师的 Linux 学习系统」，不限语言、轻量级。需求体量不小：\n\n- 40 篇图文课程（L1 入门 → L12 高级 SRE）\n- 一个浏览器内 Linux 模拟终端（沙盒）\n- 暗色极客风样式、学习资源文档、环境搭建文档\n- 一个 12 级能力总纲\n- 一套可自动校验的质量门禁\n\n一个人串行做会慢、且容易顾此失彼。**正确做法**：主 Agent 当\"技术总监/架构/集成者\"，把内容按能力阶段切分给 4 个专业伙伴并行干，最后用脚本自动收口。\n\n---\n\n## 二、角色分工（谁干什么，边界清晰）\n\n| 角色 | 身份 | 负责范围 | 交付物 |\n|------|------|----------|--------|\n| 🦞 主 Agent（总监） | 架构 + 集成收口 | 目录骨架、接口契约、索引生成器、主页/沙盒壳、最终集成与验收 | `SCHEMA.md` `PROJECT.md` `tools/gen_index.py` `index.html` `assets/js/app.js` `sandbox/*` `docs/team-case.md` |\n| 🛠️ 小码哥 | 技术执行 | 沙盒内核 + L1~L3 入门 | `assets/js/emulator.js` + 9 课 + `steps.js`(24 步) |\n| 📝 言秘书 | 文字创作 | 样式 + 资源 + L4~L6 初级 | `assets/css/style.css` `docs/resources.md` + 13 课 + `steps.js`(8 步) |\n| 🔧 小政哥 | 执行操作 | 校验器 + 环境 + L10~L11 高级 | `tools/check.py` `docs/setup-env.md` + 9 课 + `steps.js`(6 步) |\n| 🧭 少年派 | 协调 + 中级 | 总纲 + L7~L9 中级 + 汇总 | `docs/roadmap.md` + 9 课 + `steps.js`(4 步) + `COORD.md` |\n\n**关键纪律**：每个伙伴只写自己目录与 `partner-workspace/<自己id>/`，**互不碰他人文件、不改 SCHEMA/PROJECT**。集成收口只由主 Agent 做。\n\n---\n\n## 三、协作机制：三道\"防冲突 + 防废话\"的闸门\n\n### 1. 契约先行（SCHEMA.md = 接口合同）\n开工前主 Agent 写好 `SCHEMA.md`，定死：\n- 课程 frontmatter 全字段：`key / level / lang / objective / prereq / estimated_min / sandbox`\n- `lang` 枚举（不许自造）、`level` 必须是 L1~L12\n- 每课固定四章：`讲解 / 动手实验 / 常见错误 / 小结`\n- STEPS 三铁律：`key` 与课程一致、`checker` 必须浏览器纯函数、`sandbox:false` 的课不写 STEPS\n- ID 区间互不踩踏：小码哥 `1xx`、言秘书 `4xx`、少年派 `7xx`、小政哥 `1xxx`\n\n> **教训点**：约定初期 STEPS 想让大家往同一个 `course.js` 里 append，会并发冲突。改成每人独立写 `partner-workspace/<id>/steps.js` 往全局数组 `push` ——**分片优于并发写同一文件**。\n\n### 2. 分片写入（避免文件级冲突）\n每个伙伴在各自 `steps.js` 里做 `if (!window.__PENGUIN_STEPS) window.__PENGUIN_STEPS = []; window.__PENGUIN_STEPS.push({...})`。沙盒页按固定顺序加载 4 个分片，自动合并。谁也不用等谁，谁也不覆盖谁。\n\n### 3. 自动化收口（脚本代替人工拼装）\n主 Agent 提供两个零依赖脚本：\n- `tools/gen_index.py`：扫 `content/*.md` → 生成 `index.json` / `index.js` / `courses.js`，并做 frontmatter 合法性 + key 唯一 + prereq 存在性校验。\n- `tools/check.py`：课程契约校验 + 索引一致性 + 沙盒 STEPS 联动校验，输出中文报告 + 退出码（供 CI）。\n\n> 最终验收一句话：**`python3 tools/check.py` → 通过 82 / 失败 0**。\n\n---\n\n## 四、全流程时间线（真实发生）\n\n1. **架构**：主 Agent 建 `linux-learning-system/`（assets/content/docs/partner-workspace/sandbox/tools），写 `SCHEMA.md`、`PROJECT.md` 看板。\n2. **派单**：并行 spawn 4 个子 Agent，各自认领 L1~L3 / L4~L6 / L7~L9 / L10~L11 + 公共件。\n3. **并行产出**：四伙伴在各自目录落地课件与 `steps.js`，互不干扰。\n4. **集成收口**（主 Agent）：\n   - 发现并修复 3 处接口错位：\n     - STEPS 全局变量名 `__PENGUIN_STEPS`（伙伴写）vs `__PENGUIN_STEPS__`（主页读）→ 让读取端兼容两种写法；\n     - 沙盒重置接口 `emulator.reset()` 实际是 `emulator.createContext()` → 对齐；\n     - `gen_index.py` 在 Windows 控制台因 cp1252 打印中文崩溃 → 强制 stdout UTF-8（文件写入本身正常）。\n   - **增强沙盒内核**：原 `emulator.js` 不支持 `&&`/`;` 串联，学习场景几乎必用 → 在不破坏现有 24 条命令的前提下补上链执行（尊重引号），Node 烟测全绿。\n5. **验收**：`check.py` 82/82 通过；Node 模拟浏览器加载顺序做三方一致性核对（40 课程 = 40 正文 = 42 步骤 完全对齐）；`emulator` 单测 `help/ls/cd/管道/chmod/&&/clear` 全部正常。\n6. **沉淀**：产出本案例文档。\n\n---\n\n## 五、质量与诚信红线（本案例的底线）\n\n- **不弄虚作假**：所有命令/配置/资源文档均真实可查（如资源文档里的 Killercoda、Play-with-Docker 等实验平台是真实存在的）；沙盒步骤的 `checker` 一律浏览器纯函数，不编造假校验。\n- **诚实标注沙盒边界**：配置/架构类高级课（nginx/ansible/prometheus）在浏览器沙盒里交互价值低，伙伴们**主动只给\"纯命令/纯文件创建\"课开 sandbox**，其余标 `sandbox:false` 并提示\"请在真实环境练习\"——不堆无效 STEPS。\n- **可离线、零依赖**：整个系统纯 HTML/CSS/JS + Python 校验，无 npm install、无 CDN，双击 `index.html` 即开，手机也能看。\n\n---\n\n## 六、成果清单（可交付物）\n\n```\nlinux-learning-system/\n├── index.html                 # 主页（路线图+进度+雷达图+课程阅读器）\n├── SCHEMA.md / PROJECT.md     # 契约 + 看板\n├── assets/\n│   ├── css/style.css          # 暗色极客风样式\n│   └── js/\n│       ├── emulator.js        # 浏览器内 Linux 模拟内核（24 命令 + 管道/重定向/&&/;/权限/三剑客）\n│       ├── app.js             # 主页逻辑（零依赖极简 MD 渲染 + 雷达图）\n│       └── sandbox.js         # 沙盒控制器（引导式逐步骤练习）\n├── content/                   # 40 篇图文课（L1~L12），每课 frontmatter 合法\n│   ├── index.json / index.js / courses.js   # 自动生成索引\n├── docs/\n│   ├── roadmap.md             # 12 级能力总纲\n│   ├── resources.md           # 真实学习资源\n│   ├── setup-env.md           # 环境搭建（虚拟机/WSL2/云主机/容器）\n│   └── team-case.md           # 本文件\n├── tools/\n│   ├── gen_index.py           # 索引生成 + 契约校验\n│   └── check.py               # 质量门禁（82/82 通过）\n├── sandbox/index.html         # 交互沙盒页\n└── partner-workspace/<id>/    # 4 伙伴各自的 steps.js 分片 + 报告\n```\n\n---\n\n## 七、可复用的协作方法论（拿走即用）\n\n1. **能并行就并行**：按\"能力阶段\"或\"文件维度\"切分，让多个 Agent 同时干，总监只做集成。\n2. **契约先于内容**：先写接口/字段/枚举合同（SCHEMA），再让伙伴填内容；CI 兜底。\n3. **分片优于并发写同文件**：全局状态用\"每人独立文件 push 全局数组\"模式，彻底消灭文件级冲突。\n4. **脚本收口，不靠人工拼装**：索引生成、一致性校验、质量门禁全部脚本化，结果可复现。\n5. **集成时做\"接口对齐\"而非\"内容审查\"**：主 Agent 重点核对变量名/函数签名/数据格式是否对齐，内容质量交给各伙伴对自己负责。\n6. **边界纪律**：协调者不越权改他人文件；谁写谁负责，集成者只做跨文件缝合。\n7. **诚实优于凑数**：做不到/交互价值低的部分，明确标注边界（如 `sandbox:false`），绝不编造。\n\n---\n\n*本案例由主 Agent（QClaw 小虾）在 4 伙伴并行交付后集成收口时撰写，作为「多 Agent 团队合作完成大型内容+工程产出」的复盘样本。*\n"

<script>
/* === inlined: assets/js/app.js === */
/* Penguin Path 主页逻辑（零依赖，原生 JS）
   读取：window.__COURSE_INDEX__ / window.__COURSES__ / window.__PENGUIN_STEPS__
   职责：渲染路线图、进度看板、能力雷达图、课程阅读面板
*/
(function () {
  "use strict";

  var LEVELS = ["L1","L2","L3","L4","L5","L6","L7","L8","L9","L10","L11","L12"];
  var STAGE = {
    L1:"入门", L2:"入门", L3:"入门", L4:"初级", L5:"初级", L6:"初级",
    L7:"中级", L8:"中级", L9:"中级", L10:"高级", L11:"高级", L12:"高级"
  };
  var DONE_KEY = "penguin_path_done_v1";
  var stepsByKey = {};

  function loadDone() {
    try { return JSON.parse(localStorage.getItem(DONE_KEY) || "{}"); }
    catch (e) { return {}; }
  }
  function saveDone(obj) { localStorage.setItem(DONE_KEY, JSON.stringify(obj)); }

  function initSteps() {
    var arr = (window.__PENGUIN_STEPS__ || window.__PENGUIN_STEPS || []);
    arr.forEach(function (s) { if (s.key) stepsByKey[s.key] = s; });
  }

  // ---- 极简 Markdown 渲染 ----
  function escapeHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  // ---- 极简 Markdown 渲染（课程 + 文档通用：标题/列表/代码/表格/引用/分隔线/链接/图片）----
  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function inline(s) {
    s = escapeHtml(s);
    // 图片占位，避免被下方 code/strong 规则破坏
    var imgs = [];
    s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function (_, alt, src) {
      imgs.push('<img src="' + src + '" alt="' + alt + '" style="max-width:100%">' );
      return "\u0000IMG" + (imgs.length - 1) + "\u0000";
    });
    s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
    s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/\*([^*]+)\*/g, "<em>$1</em>");
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_, t, href) {
      return '<a href="' + href + '" target="_blank" rel="noopener">' + t + "</a>";
    });
    s = s.replace(/\u0000IMG(\d+)\u0000/g, function (_, i) { return imgs[+i]; });
    return s;
  }
  function splitRow(line) {
    var raw = line.replace(/^\s*\|/, "").replace(/\|\s*$/, "");
    return raw.split("|").map(function (c) { return c.trim(); });
  }
  function isSepRow(line) {
    return /^\s*\|?\s*:?-{2,}:?(\s*\|\s*:?-{2,}:?)+\s*\|?\s*$/.test(line);
  }
  function mdToHtml(md) {
    var lines = md.split(/\r?\n/);
    var html = [], i = 0, inCode = false, codeBuf = [];
    function flushCode() {
      html.push('<pre class="code-block"><code>' + escapeHtml(codeBuf.join("\n")) + "</code></pre>");
      codeBuf = [];
    }
    while (i < lines.length) {
      var line = lines[i];
      if (/^```/.test(line)) {
        if (inCode) { flushCode(); inCode = false; }
        else { inCode = true; }
        i++; continue;
      }
      if (inCode) { codeBuf.push(line); i++; continue; }
      // 表格（| 开头，且下一行是分隔行）
      if (/^\s*\|/.test(line) && i + 1 < lines.length && isSepRow(lines[i + 1])) {
        var heads = splitRow(line);
        i += 2;
        var rows = [];
        while (i < lines.length && /^\s*\|/.test(lines[i])) {
          rows.push(splitRow(lines[i])); i++;
        }
        var thead = "<thead><tr>" + heads.map(function (h) {
          return "<th>" + inline(h) + "</th>";
        }).join("") + "</tr></thead>";
        var tbody = "<tbody>" + rows.map(function (r) {
          return "<tr>" + r.map(function (c) { return "<td>" + inline(c) + "</td>"; }).join("") + "</tr>";
        }).join("") + "</tbody>";
        html.push('<div class="table-wrap"><table class="md-table">' + thead + tbody + "</table></div>");
        continue;
      }
      if (/^#{1,6}\s/.test(line)) {
        var m = line.match(/^(#{1,6})\s+(.*)$/);
        var lvl = m[1].length;
        var txt = m[2].trim();
        var id = txt.replace(/[^\w\u4e00-\u9fa5-]+/g, "-").toLowerCase();
        html.push("<h" + lvl + ' id="' + id + '">' + inline(txt) + "</h" + lvl + ">");
      } else if (/^\s*>{1,}\s?/.test(line)) {
        var q = [];
        while (i < lines.length && /^\s*>{1,}\s?/.test(lines[i])) {
          q.push(inline(lines[i].replace(/^\s*>{1,}\s?/, ""))); i++;
        }
        html.push('<blockquote>' + q.map(function (x) { return "<p>" + x + "</p>"; }).join("") + "</blockquote>");
        continue;
      } else if (/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
        html.push("<hr>");
      } else if (/^\s*[-*]\s+/.test(line)) {
        var list = [];
        while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])) {
          list.push("<li>" + inline(lines[i].replace(/^\s*[-*]\s+/, "")) + "</li>");
          i++;
        }
        html.push("<ul>" + list.join("") + "</ul>");
        continue;
      } else if (/^\s*\d+\.\s+/.test(line)) {
        var olist = [];
        while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
          olist.push("<li>" + inline(lines[i].replace(/^\s*\d+\.\s+/, "")) + "</li>");
          i++;
        }
        html.push("<ol>" + olist.join("") + "</ol>");
        continue;
      } else if (line.trim() === "") {
        // skip empty
      } else {
        html.push("<p>" + inline(line) + "</p>");
      }
      i++;
    }
    if (inCode) flushCode();
    return html.join("\n");
  }

  // ---- 渲染：路线图 ----
  function renderRoadmap(index, done) {
    var byLevel = {};
    index.forEach(function (r) {
      (byLevel[r.level] = byLevel[r.level] || []).push(r);
    });
    var html = "";
    LEVELS.forEach(function (lv) {
      var courses = byLevel[lv] || [];
      var total = courses.length;
      var doneCount = courses.filter(function (c) { return done[c.key]; }).length;
      var stage = STAGE[lv];
      var stageClass = "stage-" + stage;
      var items = courses.map(function (c) {
        var cls = "course-item" + (done[c.key] ? " done" : "");
        return '<div class="' + cls + '" data-key="' + c.key + '">' +
          '<span class="ci-check">' + (done[c.key] ? "✓" : "○") + '</span>' +
          '<span class="ci-title">' + escapeHtml(c.title) + '</span>' +
          '<span class="ci-meta">' + c.lang + ' · ' + c.estimated_min + 'min' +
          (c.sandbox ? ' · <span class="tag">沙盒</span>' : '') + '</span>' +
          '</div>';
      }).join("");
      html += '<div class="level-col ' + stageClass + '">' +
        '<div class="level-head"><span class="level-badge">' + lv + '</span>' +
        '<span class="level-stage">' + stage + '</span>' +
        '<span class="level-prog">' + doneCount + '/' + total + '</span></div>' +
        '<div class="course-list">' + (items || '<div class="course-item empty">（待补充）</div>') + '</div>' +
        '</div>';
    });
    document.getElementById("roadmap").innerHTML = html;

    // 绑定点击
    Array.prototype.forEach.call(document.querySelectorAll(".course-item[data-key]"), function (el) {
      el.addEventListener("click", function () { openCourse(el.getAttribute("data-key")); });
    });
  }

  // ---- 渲染：进度看板 + 雷达 ----
  function renderProgress(index, done) {
    var total = index.length;
    var doneCount = index.filter(function (c) { return done[c.key]; }).length;
    var pct = total ? Math.round((doneCount / total) * 100) : 0;
    document.getElementById("progress-bar").style.width = pct + "%";
    document.getElementById("progress-text").textContent = doneCount + " / " + total + " 课 · " + pct + "%";

    // 各级进度
    var byLevel = {};
    index.forEach(function (r) { (byLevel[r.level] = byLevel[r.level] || []).push(r); });
    var labels = [], vals = [];
    LEVELS.forEach(function (lv) {
      var cs = byLevel[lv] || [];
      var d = cs.filter(function (c) { return done[c.key]; }).length;
      labels.push(lv);
      vals.push(cs.length ? Math.round((d / cs.length) * 100) : 0);
    });
    drawRadar(labels, vals);
  }

  function drawRadar(labels, vals) {
    var canvas = document.getElementById("radar");
    var ctx = canvas.getContext("2d");
    var W = canvas.width, H = canvas.height;
    var cx = W / 2, cy = H / 2, R = Math.min(W, H) / 2 - 30;
    ctx.clearRect(0, 0, W, H);
    var n = labels.length;
    // 网格
    for (var g = 1; g <= 4; g++) {
      ctx.beginPath();
      for (var i = 0; i <= n; i++) {
        var ang = (Math.PI * 2 * i / n) - Math.PI / 2;
        var r = R * g / 4;
        var x = cx + r * Math.cos(ang), y = cy + r * Math.sin(ang);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = "rgba(120,140,170,0.18)";
      ctx.stroke();
    }
    // 轴线 + 标签
    ctx.fillStyle = "#8b9dc3";
    ctx.font = "11px monospace";
    for (var j = 0; j < n; j++) {
      var a = (Math.PI * 2 * j / n) - Math.PI / 2;
      var lx = cx + (R + 14) * Math.cos(a), ly = cy + (R + 14) * Math.sin(a);
      ctx.strokeStyle = "rgba(120,140,170,0.18)";
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + R * Math.cos(a), cy + R * Math.sin(a)); ctx.stroke();
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(labels[j], lx, ly);
    }
    // 数据多边形
    ctx.beginPath();
    for (var k = 0; k <= n; k++) {
      var idx = k % n;
      var ang2 = (Math.PI * 2 * idx / n) - Math.PI / 2;
      var rr = R * vals[idx] / 100;
      var px = cx + rr * Math.cos(ang2), py = cy + rr * Math.sin(ang2);
      if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = "rgba(57,201,129,0.22)";
    ctx.strokeStyle = "#39c981";
    ctx.lineWidth = 2;
    ctx.fill(); ctx.stroke();
  }

  // ---- 课程阅读面板 ----
  function openCourse(key) {
    var rec = (window.__COURSE_INDEX__ || []).filter(function (r) { return r.key === key; })[0];
    var body = (window.__COURSES__ || {})[key] || "（内容缺失）";
    var done = loadDone();
    var panel = document.getElementById("reader");
    panel.innerHTML =
      '<div class="reader-head">' +
        '<button class="btn" id="reader-back">← 返回路线</button>' +
        '<h2>' + escapeHtml(rec ? rec.title : key) + '</h2>' +
        '<button class="btn btn-primary" id="reader-done">' +
          (done[key] ? "✔ 已掌握（点击取消）" : "标记已掌握") + '</button>' +
      '</div>' +
      '<div class="reader-body">' + mdToHtml(body) + '</div>' +
      (stepsByKey[key] ? '<div class="reader-sandbox"><button class="btn btn-primary" id="go-sandbox">▶ 进入交互沙盒</button></div>' : '');

    document.getElementById("reader-back").addEventListener("click", function () {
      panel.classList.remove("open"); panel.innerHTML = "";
    });
    document.getElementById("reader-done").addEventListener("click", function () {
      var d = loadDone(); d[key] = !d[key]; saveDone(d);
      refresh();
      openCourse(key);
    });
    var gs = document.getElementById("go-sandbox");
    if (gs) gs.addEventListener("click", function () {
      window.location.href = "sandbox/index.html?course=" + encodeURIComponent(key);
    });
    panel.classList.add("open");
    panel.scrollTop = 0;
  }

  // ---- 参考文档阅读区（方案 A：在主页正文主区域呈现，不跳离、不弹右边小框）----
  var DOC_TITLES = { "roadmap": "📘 12 级总纲", "setup-env": "🔧 环境搭建", "resources": "📚 学习资源", "team-case": "🧩 团队案例" };
    // ---- 主页视图切换（路线/看板 与 文档阅读区/交互沙盒 互斥显示）----
  // 修复 BUG：点完文档/沙盒后 home 区块被 hidden，顶部导航 scrollIntoView 一个隐藏元素无反应。
  function showView(target) {
    var all = ["#progress-sec", "#roadmap-sec", "#doc-sec", "#sandbox-sec"];
    Array.prototype.forEach.call(all, function (sel) {
      var el = document.querySelector(sel);
      if (el) el.hidden = true;
    });
    if (target === "home") {
      ["#progress-sec", "#roadmap-sec"].forEach(function (sel) {
        var el = document.querySelector(sel);
        if (el) el.hidden = false;
      });
    } else {
      var el = document.querySelector(target);
      if (el) el.hidden = false;
    }
  }

  // ---- 参考文档阅读区（方案 A：在主页正文主区域呈现，不跳离、不弹右边小框）----
  var DOC_TITLES = { "roadmap": "📘 12 级总纲", "setup-env": "🔧 环境搭建", "resources": "📚 学习资源", "team-case": "🧩 团队案例" };
  function openDoc(key) {
    var md = (window.__DOCS__ || {})[key];
    if (md == null) return;
    var reader = document.getElementById("reader");
    if (reader) { reader.classList.remove("open"); reader.innerHTML = ""; }
    document.getElementById("doc-title").textContent = DOC_TITLES[key] || key;
    document.getElementById("doc-body").innerHTML = mdToHtml(md);
    if (location.hash !== "#doc=" + key) history.replaceState(null, "", "#doc=" + key);
  }

function refresh() {
    var done = loadDone();
    renderRoadmap(window.__COURSE_INDEX__ || [], done);
    renderProgress(window.__COURSE_INDEX__ || [], done);
  }

    document.addEventListener("DOMContentLoaded", function () {
    initSteps();
    refresh();
    // 导航高亮：点击后给当前项加 .active，清除其它项
    function setActive(elm) {
      Array.prototype.forEach.call(document.querySelectorAll(".side-nav a"), function (n) {
        n.classList.remove("active");
      });
      if (elm) elm.classList.add("active");
    }
    // 顶部导航：先恢复主页视图，再平滑滚动（修复 hidden 元素无反应的 BUG）
    var navLinks = document.querySelectorAll("[data-nav]");
    Array.prototype.forEach.call(navLinks, function (a) {
      a.addEventListener("click", function (e) {
        e.preventDefault();
        showView("home");
        setActive(a);
        var t = a.getAttribute("data-nav");
        var el = document.getElementById(t);
        if (el) el.scrollIntoView({ behavior: "smooth" });
        if (location.hash.indexOf("#doc=") === 0) history.replaceState(null, "", "#");
      });
    });
    // 侧边栏参考文档：在主页正文区打开（不跳离）
    var docLinks = document.querySelectorAll("[data-doc]");
    Array.prototype.forEach.call(docLinks, function (a) {
      a.addEventListener("click", function (e) {
        e.preventDefault();
        showView("#doc-sec");
        setActive(a);
        openDoc(a.getAttribute("data-doc"));
      });
    });
    // 侧边栏交互沙盒：在主页正文区打开（与文档区同款 in-page 样式）
    var sandboxLink = document.querySelector('[data-view="sandbox"]');
    if (sandboxLink) {
      sandboxLink.addEventListener("click", function (e) {
        e.preventDefault();
        showView("#sandbox-sec");
        setActive(sandboxLink);
        var sec = document.getElementById("sandbox-sec");
        if (sec) sec.scrollIntoView({ behavior: "smooth" });
      });
    }
    // 深链：#doc=roadmap 直接进入文档阅读区
    if (location.hash.indexOf("#doc=") === 0) {
      showView("#doc-sec");
      openDoc(decodeURIComponent(location.hash.slice(5)));
    }
  });
})();

</script>
