<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penguin Path · 企鹅之路 Linux 学习系统</title>
<style>
/* === inlined: assets/css/style.css === */
/* ============================================================================
 * Penguin Path · 企鹅之路  —  全局样式表 (assets/css/style.css)
 * 作者: 言秘书  |  零框架依赖, 纯原生 CSS
 * ----------------------------------------------------------------------------
 * 【配色思路】
 *   暗色极客风，参考 linux-learning.html 的观感，统一一套 CSS 变量。
 *   背景为近黑的深蓝 (#0a0e14)，卡片表面略亮 (#131820)，描边用低饱和蓝灰。
 *   主强调色青绿 --accent:#39c981（成功/完成/主操作），信息色青蓝 #5ccfe6，
 *   警告橙 #ffb454，错误红 #ff6b6b；命令文本用亮蓝 #73d0ff，输出用 #8b9dc3。
 *   所有颜色集中在 :root，改一处即可换肤。
 *
 * 【栅格思路】
 *   .app-shell 用 CSS Grid: 左侧固定 264px 侧栏 + 右侧自适应主区；
 *   课程阅读面板 .reader 以固定定位从右侧滑入（不破坏栅格）。
 *   沙盒页 .sandbox-shell 用 flex 纵向拆成顶栏 + (引导栏 | 终端) 两栏。
 *   窄屏 (<=860px) 侧栏转为顶部横向导航；沙盒两栏堆叠为单栏。
 *   间距统一用 --gap(12px)，圆角 --radius(6px)，字号偏好等宽字体。
 * ========================================================================== */

:root {
  --bg: #0a0e14;
  --surface: #131820;
  --surface-2: #1a2332;
  --border: #1e293b;
  --text: #bfc7d5;
  --text-dim: #6b7280;
  --accent: #39c981;        /* 青绿：成功/主操作 */
  --accent-dim: #1a4a2f;
  --warn: #ffb454;          /* 橙：警告 */
  --error: #ff6b6b;         /* 红：错误 */
  --info: #5ccfe6;          /* 青蓝：信息/提示 */
  --cmd: #73d0ff;           /* 命令文本 */
  --output: #8b9dc3;        /* 命令输出 */
  --highlight: #ffd580;     /* 用户输入高亮 */
  --prompt: #39c981;        /* 终端提示符 */
  --step-bg: #1a2332;
  --step-done: #0f1e15;
  --step-active: #1a2e44;
  --gap: 12px;
  --radius: 6px;
  --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, 'Courier New', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; }

body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
}

a { color: var(--info); text-decoration: none; }
a:hover { text-decoration: underline; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #2d3a4f; }

/* ============================================================================
 * 布局骨架: .app-shell (侧栏 + 主区) + .reader 滑入面板
 * ========================================================================== */
.app-shell {
  display: grid;
  grid-template-columns: 264px minmax(0, 1fr);
  min-height: 100vh;
  background: var(--bg);
}

/* ---- 侧边栏 ---- */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  gap: var(--gap);
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1.15rem;
  font-weight: bold;
  color: var(--accent);
  padding: 4px 6px 10px;
  border-bottom: 1px solid var(--border);
}
.brand-logo { font-size: 1.4rem; }
.brand-name { letter-spacing: .5px; }

.side-nav {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.side-nav a {
  display: block;
  padding: 9px 12px;
  border-radius: var(--radius);
  color: var(--text-dim);
  font-size: 0.85rem;
  border: 1px solid transparent;
  border-left: 3px solid transparent;
  transition: background .15s, border-color .15s, color .15s;
}
.side-nav a:hover {
  background: var(--step-bg);
  color: var(--text);
  text-decoration: none;
}
.side-nav a.active {
  background: var(--accent-dim);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: bold;
}

.side-foot {
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.72rem;
  line-height: 1.5;
}

/* ---- 主区 ---- */
.main {
  padding: 22px 26px 60px;
  overflow: auto;
  min-width: 0;
}
.topbar {
  border-bottom: 1px solid var(--border);
  padding-bottom: 16px;
  margin-bottom: 22px;
}
.topbar h1 { font-size: 1.4rem; color: var(--text); }
.subtitle { color: var(--text-dim); font-size: 0.85rem; margin-top: 6px; }

/* ---- 课程阅读面板 (从右滑入) ---- */
.reader {
  position: fixed;
  top: 0;
  right: 0;
  width: min(580px, 94vw);
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  box-shadow: -12px 0 40px rgba(0,0,0,.45);
  transform: translateX(102%);
  transition: transform .25s ease;
  z-index: 50;
  overflow-y: auto;
  padding: 18px 22px 40px;
}
.reader.open { transform: translateX(0); }
.reader-head {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
  margin-bottom: 14px;
}
.reader-head h2 { font-size: 1.05rem; color: var(--accent); flex: 1 1 auto; }
.reader-body { font-size: 0.9rem; }
.reader-sandbox { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 16px; }

/* ============================================================================
 * 通用组件: 卡片 / 按钮 / 徽章 / 标签 / 提示
 * ========================================================================== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
}
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 22px;
}
.panel h2 { font-size: 1.1rem; margin-bottom: 12px; color: var(--text); }

/* 视图互斥：被 showView 隐藏的区块强制不显示（覆盖 .panel 的 display） */
[hidden] { display: none !important; }

/* 主页 in-page 交互沙盒：复用沙盒页同一套样式，但嵌入正文主区 */
#sandbox-sec {
  display: flex;
  flex-direction: column;
  min-height: 64vh;
  padding: 0;
  overflow: hidden;
}
#sandbox-sec .sandbox-top {
  border-radius: var(--radius) var(--radius) 0 0;
  margin: 0;
}
#sandbox-sec .sandbox-body { flex: 1; }

.btn {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.82rem;
  padding: 7px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
}
.btn:hover { border-color: var(--info); color: var(--text); }
.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
  font-weight: bold;
}
.btn-primary:hover { background: #2fb574; border-color: #2fb574; }
.btn.mini { padding: 4px 10px; font-size: 0.72rem; }

/* 级别徽章 (L1~L12) */
.level-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 38px;
  padding: 3px 8px;
  border-radius: var(--radius);
  background: var(--accent-dim);
  color: var(--accent);
  font-weight: bold;
  font-size: 0.8rem;
  border: 1px solid var(--accent);
}
.tag {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 0.68rem;
  background: var(--step-bg);
  color: var(--info);
  border: 1px solid var(--border);
}
.alert {
  border-radius: var(--radius);
  padding: 10px 14px;
  margin: 12px 0;
  font-size: 0.82rem;
  border: 1px solid var(--border);
  background: var(--surface-2);
}
.alert.warn  { border-color: var(--warn);  color: var(--warn); }
.alert.error { border-color: var(--error); color: var(--error); }
.alert.info  { border-color: var(--info);  color: var(--info); }

/* ============================================================================
 * 进度看板 + 雷达
 * ========================================================================== */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-track {
  flex: 1;
  height: 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--accent-dim), var(--accent));
  border-radius: 8px;
  transition: width .4s ease;
}
.progress-text { color: var(--text-dim); font-size: 0.8rem; white-space: nowrap; }

.radar-wrap {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.radar { display: block; }
#radar { display: block; }
.radar-legend { color: var(--text-dim); font-size: 0.72rem; }

.stage-legend { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 12px; }
.stage-legend .dot {
  display: inline-block;
  width: 9px; height: 9px;
  border-radius: 50%;
  margin: 0 4px 0 12px;
  vertical-align: middle;
}
.dot.stage-入门 { background: #5ccfe6; }
.dot.stage-初级 { background: #39c981; }
.dot.stage-中级 { background: #ffb454; }
.dot.stage-高级 { background: #ff6b6b; }

/* 路线等级徽章按阶段着色（与顶部图例四色一致） */
.level-col.stage-入门 .level-badge { background: #5ccfe6; border-color: #5ccfe6; color: #06222a; }
.level-col.stage-初级 .level-badge { background: #39c981; border-color: #39c981; color: #053524; }
.level-col.stage-中级 .level-badge { background: #ffb454; border-color: #ffb454; color: #3a2600; }
.level-col.stage-高级 .level-badge { background: #ff6b6b; border-color: #ff6b6b; color: #3a0d0d; }
/* 列容器左缘同步着色，强化阶段辨识 */
.level-col.stage-入门 { border-left: 3px solid #5ccfe6; }
.level-col.stage-初级 { border-left: 3px solid #39c981; }
.level-col.stage-中级 { border-left: 3px solid #ffb454; }
.level-col.stage-高级 { border-left: 3px solid #ff6b6b; }
/* 等级名文字同步着色，与图例四色呼应 */
.level-col.stage-入门 .level-stage { color: #5ccfe6; }
.level-col.stage-初级 .level-stage { color: #39c981; }
.level-col.stage-中级 .level-stage { color: #ffb454; }
.level-col.stage-高级 .level-stage { color: #ff6b6b; }

/* ============================================================================
 * 路线图: .roadmap > .level-col > .course-list > .course-item(.done)
 * ========================================================================== */
.roadmap {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 14px;
}
.level-col {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
}
.level-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 8px;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.level-stage { font-size: 0.78rem; color: var(--text-dim); }
.level-prog { margin-left: auto; font-size: 0.74rem; color: var(--accent); }

.course-list { display: flex; flex-direction: column; gap: 6px; }
.course-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 11px;
  border-radius: var(--radius);
  background: var(--surface);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s, border-color .15s;
  font-size: 0.82rem;
}
.course-item:hover { background: var(--step-bg); border-color: var(--info); }
.course-item.done { background: var(--step-done); border-color: var(--accent-dim); }
.course-item.done .ci-title { color: var(--accent); }
.course-item.empty { color: var(--text-dim); cursor: default; font-style: italic; }
.ci-check { color: var(--text-dim); width: 14px; text-align: center; }
.course-item.done .ci-check { color: var(--accent); }
.ci-title { flex: 1; }
.ci-meta { font-size: 0.68rem; color: var(--text-dim); white-space: nowrap; }

/* ============================================================================
 * 正文排版 (课程 Markdown 渲染后的标签)
 * ========================================================================== */
/* 参考文档阅读区（方案 A：主页正文区呈现，不跳离、不弹右边小框） */
#doc-sec .doc-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
#doc-sec .doc-head h2 { margin: 0; flex: 1; }
#doc-sec .doc-head .btn { white-space: nowrap; }

.reader-body h1, .reader-body h2, .reader-body h3,
.reader-body h4, .reader-body h5, .reader-body h6 {
  color: var(--accent);
  margin: 18px 0 10px;
  line-height: 1.3;
}
.reader-body h1 { font-size: 1.25rem; }
.reader-body h2 { font-size: 1.08rem; }
.reader-body h3 { font-size: 0.98rem; color: var(--info); }
.reader-body p { margin: 10px 0; }
.reader-body ul, .reader-body ol { margin: 10px 0 10px 22px; }
.reader-body li { margin: 4px 0; }
.reader-body code {
  font-family: var(--mono);
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--cmd);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 0.85em;
}
.reader-body pre.code-block {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  overflow-x: auto;
  margin: 12px 0;
}
.reader-body pre.code-block code {
  background: none;
  border: none;
  color: var(--output);
  padding: 0;
}
.reader-body strong { color: var(--highlight); }
.reader-body em { color: var(--info); }
.reader-body a { color: var(--accent); text-decoration: underline; }
.reader-body a:hover { color: var(--info); }
.reader-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.reader-body blockquote {
  border-left: 3px solid var(--accent);
  background: var(--surface-2);
  margin: 12px 0;
  padding: 8px 14px;
  color: var(--text-dim);
  border-radius: 0 var(--radius) var(--radius) 0;
}
.reader-body blockquote p { margin: 4px 0; }
.reader-body .table-wrap { overflow-x: auto; margin: 12px 0; }
.reader-body table.md-table {
  border-collapse: collapse;
  width: 100%;
  font-size: 0.85rem;
}
.reader-body table.md-table th,
.reader-body table.md-table td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
  vertical-align: top;
}
.reader-body table.md-table th {
  background: var(--surface-2);
  color: var(--text);
  font-weight: 600;
}
.reader-body table.md-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
.reader-tag {
  font-size: 0.7rem;
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2px 10px;
  white-space: nowrap;
}
.reader-body em { color: var(--info); }

/* ============================================================================
 * 沙盒页: .sandbox-shell > (.sandbox-top + .sandbox-body)
 * ========================================================================== */
.sandbox-page { background: var(--bg); }
.sandbox-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.sandbox-top {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sandbox-top h1 { font-size: 1rem; color: var(--accent); flex: 1; }
.sandbox-actions { display: flex; align-items: center; gap: 8px; }
.sandbox-actions select.btn { font-family: var(--mono); }

.sandbox-body {
  flex: 1;
  display: grid;
  grid-template-columns: 320px minmax(0, 1fr);
  min-height: 0;
}
.sandbox-guide {
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 14px;
}
.guide-empty, .guide-note { color: var(--text-dim); font-size: 0.82rem; line-height: 1.6; }
.guide-title {
  font-weight: bold;
  color: var(--info);
  font-size: 0.85rem;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

/* 引导步骤 */
.step {
  display: flex;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  margin-bottom: 8px;
  background: var(--step-bg);
  transition: background .15s, border-color .15s;
}
.step.active { border-color: var(--info); background: var(--step-active); }
.step.done { background: var(--step-done); opacity: .75; }
.step-no {
  width: 22px; height: 22px;
  min-width: 22px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; font-weight: bold;
}
.step.active .step-no { background: var(--info); color: var(--bg); }
.step.done .step-no { background: var(--accent-dim); color: var(--accent); }
.step-body { flex: 1; min-width: 0; }
.step-title { font-weight: bold; font-size: 0.84rem; color: var(--text); }
.step.done .step-title { color: var(--accent); }
.step-task { font-size: 0.78rem; color: var(--text-dim); margin: 3px 0; }
.step-tips { font-size: 0.74rem; color: var(--warn); margin-top: 4px; line-height: 1.5; }

/* 终端 */
.terminal-wrap {
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: #0d1117;
}
.terminal-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: #1a1f2b;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.terminal-bar .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
.terminal-bar .dot.r { background: #ff5f56; }
.terminal-bar .dot.y { background: #ffbd2e; }
.terminal-bar .dot.g { background: #27c93f; }
.term-title { margin-left: 6px; font-size: 0.76rem; color: var(--text-dim); }

.terminal {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  font-family: var(--mono);
  font-size: 0.85rem;
  line-height: 1.55;
}
.term-output { display: block; }
.terminal .line { white-space: pre-wrap; word-break: break-all; }
.terminal .line.err   { color: var(--error); }
.terminal .line.ok    { color: var(--accent); }
.terminal .line.info  { color: var(--info); }
.terminal .line.system, .terminal .line.note { color: var(--text-dim); font-style: italic; }
.terminal .prompt { color: var(--prompt); margin-right: 8px; }

.term-input-line {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  background: #0d1117;
  flex-shrink: 0;
}
.prompt { color: var(--prompt); white-space: nowrap; }
.term-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--highlight);
  font-family: var(--mono);
  font-size: 0.85rem;
  caret-color: var(--accent);
}
.term-input::placeholder { color: var(--text-dim); }


/* ============================================================================
 * 独立参考文档页（docs/<key>.html，整页，与交互沙盒同风格）
 * ========================================================================== */
.doc-shell {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}
.doc-sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
}
.doc-nav { display: flex; flex-direction: column; gap: 6px; margin-top: 18px; flex: 1; }
.doc-nav a.doc-link {
  color: var(--text-dim);
  text-decoration: none;
  padding: 8px 12px;
  border-radius: var(--radius);
  font-size: 0.9rem;
  border: 1px solid transparent;
}
.doc-nav a.doc-link:hover { color: var(--text); background: var(--surface-2); }
.doc-main {
  background: var(--bg);
  padding: 40px 48px;
  overflow-y: auto;
  height: 100vh;
}
.doc-article {
  max-width: 860px;
  margin: 0 auto;
}
.doc-head { border-bottom: 1px solid var(--border); padding-bottom: 18px; margin-bottom: 24px; }
.doc-head h1 { font-size: 1.8rem; color: var(--accent); margin: 0 0 8px; }
.doc-sub { color: var(--text-dim); margin: 0; font-size: 0.95rem; }
.doc-body { font-size: 0.95rem; line-height: 1.7; }
.doc-body h1 { font-size: 1.5rem; color: var(--accent); margin: 28px 0 12px; }
.doc-body h2 { font-size: 1.25rem; color: var(--text); margin: 24px 0 10px; }
.doc-body h3 { font-size: 1.08rem; color: var(--info); margin: 18px 0 8px; }
.doc-body p { margin: 12px 0; }
.doc-body ul, .doc-body ol { margin: 12px 0 12px 24px; }
.doc-body li { margin: 5px 0; }
.doc-body code {
  font-family: var(--mono);
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--cmd);
  padding: 1px 5px;
  border-radius: 4px;
  font-size: 0.85em;
}
.doc-body pre.code-block {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  overflow-x: auto;
  margin: 14px 0;
}
.doc-body pre.code-block code { background: none; border: none; color: var(--output); padding: 0; }
.doc-body strong { color: var(--highlight); }
.doc-body em { color: var(--info); }
.doc-body a { color: var(--accent); text-decoration: underline; }
.doc-body a:hover { color: var(--info); }
.doc-body hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.doc-body blockquote {
  border-left: 3px solid var(--accent);
  background: var(--surface-2);
  margin: 14px 0;
  padding: 8px 14px;
  color: var(--text-dim);
  border-radius: 0 var(--radius) var(--radius) 0;
}
.doc-body blockquote p { margin: 4px 0; }
.doc-body .table-wrap { overflow-x: auto; margin: 14px 0; }
.doc-body table.md-table { border-collapse: collapse; width: 100%; font-size: 0.88rem; }
.doc-body table.md-table th,
.doc-body table.md-table td { border: 1px solid var(--border); padding: 7px 11px; text-align: left; vertical-align: top; }
.doc-body table.md-table th { background: var(--surface-2); color: var(--text); font-weight: 600; }
.doc-body table.md-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
.doc-foot {
  margin-top: 40px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 0.8rem;
}

/* 兼容 sandbox.js 旧类名 */
.terminal .line.prompt-line { color: var(--prompt); }

/* ============================================================================
 * 响应式: 窄屏适配
 * ========================================================================== */
@media (max-width: 860px) {
  .doc-shell { grid-template-columns: 1fr; }
  .doc-sidebar {
    position: static;
    height: auto;
    flex-direction: row;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .doc-sidebar .brand { border-bottom: none; padding: 0; }
  .doc-nav { flex-direction: row; flex-wrap: wrap; flex: 1; margin-top: 0; }
  .doc-sidebar .side-foot { display: none; }
  .doc-main { padding: 24px 18px; height: auto; }
}

@media (max-width: 860px) {
  .app-shell { grid-template-columns: 1fr; }
  .sidebar {
    position: static;
    height: auto;
    flex-direction: row;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }
  .brand { border-bottom: none; padding: 0 6px; }
  .side-nav { flex-direction: row; flex-wrap: wrap; flex: 1; }
  .side-foot { display: none; }
  .main { padding: 16px; }

  .sandbox-body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .sandbox-guide { border-right: none; border-bottom: 1px solid var(--border); max-height: 38vh; }
}

@media (max-width: 560px) {
  .roadmap { grid-template-columns: 1fr; }
  .topbar h1 { font-size: 1.15rem; }
}

</style>

<!-- 启动自检：任何脚本加载失败都会明确提示，而不是空白 -->
<script>
/* === inlined: assets/js/boot-check.js === */
/* Penguin Path · 启动自检（零依赖）
   作用：若核心脚本未能正常加载，在页面顶部显示明确错误，
   而不是让用户看到一个“空白/没有终端”的页面而误以为系统坏了。
   两个页面都在主逻辑脚本之前引入本文件。 */
(function () {
  "use strict";
  function showError(msg) {
    if (!document.getElementById("boot-error")) {
      var d = document.createElement("div");
      d.id = "boot-error";
      d.style.cssText = "position:fixed;left:0;right:0;top:0;z-index:9999;" +
        "background:#2a0d12;color:#ff9b9b;border-bottom:2px solid #ff6b6b;" +
        "padding:12px 16px;font:13px/1.6 monospace;white-space:pre-wrap;";
      d.textContent = "⚠️ 加载异常：" + msg +
        "\n建议：用本地服务器打开（python3 tools/serve.py），不要直接双击 file:// 预览。";
      document.body.appendChild(d);
    }
  }
  window.__PENGUIN_BOOT_ERROR__ = showError;
  // 页面加载完成后统一检查（此时所有脚本应已执行）
  window.addEventListener("load", function () {
    var isSandbox = location.pathname.indexOf("/sandbox/") >= 0 || location.pathname.endsWith("/sandbox");
    if (isSandbox) {
      if (typeof window.PenguinEmulator !== "function") {
        showError("模拟器内核 emulator.js 未加载（PenguinEmulator 不存在）。");
      }
      if (!(window.__PENGUIN_STEPS__ || window.__PENGUIN_STEPS) || (window.__PENGUIN_STEPS__ || window.__PENGUIN_STEPS).length === 0) {
        showError("步骤数据 steps.js 未加载（__PENGUIN_STEPS 为空）。");
      }
    } else {
      if (!(window.__COURSE_INDEX__ && window.__COURSE_INDEX__.length) ||
          !(window.__COURSES__ && Object.keys(window.__COURSES__).length)) {
        showError("课程数据未加载（content/index.js 或 content/courses.js 失败）。");
      }
    }
  });
})();

</script>
<!-- 数据层：先加载各伙伴的 steps 分片，再加载索引与正文 -->
<script>

 * 约定：
 *   - id 从 101 起递增，避免与其它伙伴分片冲突（主 agent 集成时会统一重排）。
 *   - key 必须与 content/<key>.md 的 frontmatter key 完全一致。
 *   - checker 必须是浏览器内可执行的纯函数，仅依赖传入的命令字符串。

if (!window.__PENGUIN_STEPS) window.__PENGUIN_STEPS = [];
window.__PENGUIN_STEPS.push(

  /* ---------- L1 小白启航 ---------- */

  // L1-1

    task: '在终端输入 <code>help</code> 并按回车',
    expectedCmd: 'help',
    checker: (cmd) => cmd.trim() === 'help',
    commandHint: 'help',
    tips: '忘记命令就敲 <code>help</code>。注意拼写，<code>helo</code> 会报错。'

    task: '输入 <code>pwd</code> 查看你此刻在哪个目录',
    expectedCmd: 'pwd',
    checker: (cmd) => cmd.trim() === 'pwd',
    commandHint: 'pwd',
    tips: '预期输出 <code>/home/guest</code>，那是你的家目录。'
  },
  // L1-3
  {
    id: 103, key: 'l1-hello', icon: '📃', name: '你好，Linux！',

    desc: '<code>ls</code> 列出当前目录下的文件和文件夹。加 <code>-l</code> 看详细信息。',
    task: '输入 <code>ls</code> 看看当前目录有什么',
    expectedCmd: 'ls',
    checker: (cmd) => ['ls', 'ls -l', 'ls -a', 'ls -la'].indexOf(cmd.trim()) >= 0,
    commandHint: 'ls',
    tips: '试试 <code>ls -l</code> 看权限、大小、时间；<code>ls -a</code> 看隐藏文件。'
  },

  // L1-4
  {
    id: 104, key: 'l1-files', icon: '🚪', name: '文件与目录',
    title: '第一步：用 cd 走进目录',
    desc: '<code>cd</code> 切换目录。<code>cd 目录名</code> 进入，<code>cd ..</code> 回上层，<code>cd ~</code> 回家。',
    task: '输入 <code>cd projects</code> 进入 projects 目录',
    expectedCmd: 'cd projects',
    checker: (cmd) => cmd.trim() === 'cd projects',
    commandHint: 'cd projects',
    tips: '进不去？先用 <code>ls</code> 看看当前目录是否真有 <code>projects</code>。'
  },
  // L1-5
  {
    id: 105, key: 'l1-files', icon: '📁', name: '文件与目录',
    title: '第二步：用 mkdir 建目录',
    desc: '<code>mkdir 目录名</code> 新建一个目录。多级目录用 <code>mkdir -p a/b/c</code>。',
    task: '输入 <code>mkdir notes</code> 新建一个叫 notes 的目录',
    expectedCmd: 'mkdir notes',
    checker: (cmd) => /^\s*mkdir(\s+-[a-zA-Z]+)*\s+notes\s*$/.test(cmd),
    commandHint: 'mkdir notes',
    tips: '建好后用 <code>ls</code> 确认它出现了。'
  },
  // L1-6
  {
    id: 106, key: 'l1-files', icon: '📄', name: '文件与目录',
    title: '第三步：用 touch 建文件 + cat 查看',
    desc: '<code>touch 文件名</code> 新建空文件；<code>cat 文件名</code> 打印内容。',
    task: '输入 <code>touch idea.txt</code> 新建空文件，再用 <code>cat idea.txt</code> 查看',
    expectedCmd: 'touch idea.txt',
    checker: (cmd) => /^\s*touch\s+idea\.txt\s*$/.test(cmd) || /^\s*cat\s+idea\.txt\s*$/.test(cmd),
    commandHint: 'touch idea.txt',
    tips: '空文件 <code>cat</code> 出来没有内容，这是正常的。'
  },

  // L1-7
  {
    id: 107, key: 'l1-edit', icon: '✍️', name: '写与整理',
    title: '第一步：echo 重定向写文件',
    desc: '<code>echo 文字 &gt; 文件</code> 把文字写入文件（覆盖）；<code>&gt;&gt;</code> 是追加。',
    task: '输入 <code>echo "Linux 真好用" &gt; memo.txt</code> 写一句话到 memo.txt',
    expectedCmd: 'echo "Linux 真好用" > memo.txt',
    checker: (cmd) => /^\s*echo\s+.*>\s*memo\.txt\s*$/.test(cmd),
    commandHint: 'echo "Linux 真好用" > memo.txt',
    tips: '用 <code>cat memo.txt</code> 验证写入成功。<code>&gt;</code> 是覆盖，<code>&gt;&gt;</code> 是追加。'

  // L1-8
  {
    id: 108, key: 'l1-edit', icon: '📋', name: '写与整理',

    task: '输入 <code>cp memo.txt memo.bak</code> 复制一份备份',

    checker: (cmd) => /^\s*cp(\s+-[a-zA-Z]+)*\s+memo\.txt\s+memo\.bak\s*$/.test(cmd),

    tips: '复制目录要加 <code>-r</code>，如 <code>cp -r 源 目标</code>。'

  // L1-9
  {
    id: 109, key: 'l1-edit', icon: '🗑️', name: '写与整理',

  /* ---------- L2 文件系统 ---------- */

  // L2-1
  {
    id: 110, key: 'l2-path', icon: '🧭', name: '路径是什么',

    desc: '<code>..</code> 是上层目录，<code>~</code> 是家目录。先用 <code>cd projects</code>，再 <code>cd ..</code> 返回。',

  "l1-edit": "# 写与整理（第三课）\n\n## 讲解\n\n前两课你会\"看\"和\"走\"了，现在学\"写\"和\"整理\"。\n\n- `echo` 把一段文字打印出来。加上 `> 文件` 叫**重定向**：把本该显示在屏幕的文字写进文件（覆盖）。用 `>> 文件` 则是**追加**到文件末尾，不覆盖原有内容。\n- `cp`（copy）：复制文件或目录（目录要加 `-r`）。\n- `mv`（move）：移动文件，也可以给文件改名——同一目录下 `mv a.txt b.txt` 就是重命名。\n- `rm`（remove）：删除。删目录要加 `-r`（recursive）。**慎用**，模拟终端里删了就没了。\n\n一个好习惯：写重要东西前先 `cat` 看看目标文件现状，避免 `>` 手滑覆盖。\n\n## 动手实验\n\n1. 用 `>` 写入一句话到新文件：\n   ```\n   echo \"Linux 真好用\" > memo.txt\n   cat memo.txt\n   ```\n   预期：`Linux 真好用`\n2. 用 `>>` 追加第二行（不会覆盖第一行）：\n   ```\n   echo \"每天敲一敲\" >> memo.txt\n   cat memo.txt\n   ```\n3. 复制文件：\n   ```\n   cp memo.txt memo.bak\n   ls\n   ```\n4. 重命名（同目录 mv 即改名）：\n   ```\n   mv memo.bak memo2.txt\n   ls\n   ```\n5. 删除文件：\n   ```\n   rm memo2.txt\n   ls\n   ```\n6. 复制整个目录（带 `-r`），再删除它：\n   ```\n   mkdir src\n   echo hi > src/a.txt\n   cp -r src dst\n   ls\n   rm -r dst\n   ls\n   ```\n\n## 常见错误\n\n- **`>` 把原内容冲掉了**：`>` 是覆盖。要保留原内容用 `>>`。\n- **删目录报\"是一个目录\"**：`rm` 默认只删文件，删目录必须 `rm -r`。\n- **`cp` 目录报\"略过目录\"**：复制目录要加 `-r`，如 `cp -r 源 目标`。\n\n## 小结\n\n1. `echo 文字 > 文件` 覆盖写，`>>` 追加写。\n2. `cp` 复制、`mv` 移动/改名、`rm` 删除（目录加 `-r`）。\n3. 进阶：L2 学路径与权限，你会理解为什么有时\"没有权限\"操作文件。",
  "l1-files": "# 文件与目录（第二课）\n\n## 讲解\n\n现实里我们用文件夹装文件，Linux 里叫\"目录\"（directory）。这节课学四件事：怎么走、怎么建、怎么造、怎么看。\n\n- `cd`（change directory）：切换目录，像走进不同的房间。`cd ..` 回上一层，`cd ~` 回自己家目录，`cd projects` 走进 projects 文件夹。\n- `mkdir`（make directory）：新建一个目录，像买个新抽屉。\n- `touch`：新建一个空文件（或更新已有文件的修改时间），像放一张白纸进去。\n- `cat`（concatenate）：把文件内容打印到屏幕，像把纸上字读出来。\n\n记住目录树是分层的：`/home/guest` 是家，`projects` 是它里面的一个子目录。走之前先用 `pwd` 确认自己在哪。\n\n## 动手实验\n\n1. 确认位置并进入 projects 目录：\n   ```\n   pwd\n   cd projects\n   pwd\n   ```\n   预期：`/home/guest/projects`\n2. 新建一个目录并进去看看：\n   ```\n   mkdir notes\n   ls\n   cd notes\n   pwd\n   ```\n3. 在 notes 里新建一个空文件并查看内容（应为空）：\n   ```\n   touch idea.txt\n   cat idea.txt\n   ```\n4. 退回上一层，再回家里：\n   ```\n   cd ..\n   pwd\n   cd ~\n   pwd\n   ```\n5. 一次性建多级目录（需 `-p`，父目录不存在也能建）：\n   ```\n   mkdir -p a/b/c\n   ls -R\n   ```\n\n## 常见错误\n\n- **`cd: 没有那个文件或目录`**：目录名拼错，或还没建。先用 `ls` 看看当前目录到底有哪些名字。\n- **`cd` 后没变化**：其实可能进去了，用 `pwd` 确认，别靠感觉。\n- **`touch` 报\"没有那个文件或目录\"**：你写的路径里某级父目录不存在。先 `mkdir -p` 建好父目录。\n\n## 小结\n\n1. `cd` 走路、`mkdir` 建房、`touch` 造纸、`cat` 读字。\n2. 不确定位置就 `pwd`；不确定内容就 `ls`。\n3. 进阶：下一课学 `echo` 重定向、`cp`/`mv`/`rm`，真正开始\"编辑与整理\"文件。",
  "l1-hello": "# 你好，Linux！（第一课）\n\n## 讲解\n\n欢迎来到 **Penguin Path（企鹅之路）** ！这一课我们要跨过\"怕黑框\"这道坎。Linux 的终端（Terminal）就是一个输入框：你敲命令，它给结果。它不可怕，反而非常诚实——你输入什么，它就做什么。\n\n三个最基础的\"探路\"命令：\n\n- `help`：查看当前模拟终端支持哪些命令。忘了命令就敲 `help`。\n- `ls`（list）：列出当前目录里有什么文件和文件夹，像翻开一个抽屉看里面。\n- `pwd`（print working directory）：告诉你\"我现在在哪个目录\"，相当于抬头看路牌。\n\n我们一开始就活在 `/home/guest` 这个目录里（guest 是你的用户名）。后面所有操作都从这里出发。先别急着记命令，先学会\"看路\"。\n\n## 动手实验\n\n1. 输入 `help` 回车，看看支持哪些命令：\n   ```\n   help\n   ```\n2. 看看现在在哪个目录：\n   ```\n   pwd\n   ```\n   预期输出：`/home/guest`\n3. 看看这个目录里有什么：\n   ```\n   ls\n   ```\n   预期输出包含：`hello.txt  notes.txt  projects  script.sh  todo.txt`\n4. 用 `-l` 看更详细的信息（权限、大小、时间）：\n   ```\n   ls -l\n   ```\n   预期开头：`-rw-r--r-- 1 guest guest ... hello.txt`\n5. 组合拳：看详细列表并从中筛出含 `txt` 的名字（管道）：\n   ```\n   ls -l | grep txt\n   ```\n\n## 常见错误\n\n- **敲完没反应**：多半是没按回车。命令要回车才会执行。\n- **命令提示\"未找到命令\"**：模拟终端只支持 `help` 列出的命令。检查拼写，比如 `helo` 会报错，应敲 `help`。\n- **`ls` 看不到隐藏文件**：以 `.` 开头的文件是隐藏的，要加 `-a`：试试 `ls -a`。\n\n## 小结\n\n1. `help` 是万能求助键，`ls` 看内容，`pwd` 看位置。\n2. 终端是\"输入即执行\"，错了也不会坏，放心多敲。\n3. 进阶：下一课学 `cd` 和 `mkdir`，学会在目录之间走动和新建文件夹。",
  "l10-audit": "# 审计与文件完整性（auditd / lynis / AIDE）\n\n## 讲解\n安全加固不能只\"防外面\"，还要\"看得见里面\"。三类工具各管一段：\n- **auditd**：内核级审计，记录\"谁、在什么时间、对什么文件/系统调用做了什么\"。可监控 `/etc/passwd` 被改、某用户执行 `sudo` 等。\n- **lynis**：安全基线扫描器，逐项检查系统配置（弱密码策略、多余服务、权限问题）并给出加固建议，输出分数与告警。\n- **AIDE / Tripwire**：文件完整性校验（HIDS），对文件算哈希建基线库，之后对比发现被篡改（如 `/bin/ls` 被替换）。\n\n三者配合：lynis 找\"该改什么\"、auditd 记\"正在发生什么\"、AIDE 验\"已被改了什么\"。\n\n## 动手实验\n1. **auditd 监控关键文件与提权行为**：\n   ```bash\n   sudo dnf install -y audit\n   sudo systemctl enable --now auditd\n   # 监控 /etc/passwd 与 /etc/shadow 的写/属性变更\n   sudo auditctl -w /etc/passwd -p wa -k identity\n   sudo auditctl -w /etc/shadow -p wa -k identity\n   # 监控所有 sudo 执行\n   sudo auditctl -a always,exit -F arch=b64 -S execve -F euid=0 -k sudo_exec\n   sudo auditctl -l                 # 列出当前规则\n   # 触发后查看：ausearch -k identity | aureport -f\n   ```\n2. **lynis 安全基线扫描**：\n   ```bash\n   sudo dnf install -y lynis\n   sudo lynis audit system\n   # 重点看 [WARNING]/[SUGGESTION]，按提示加固\n   sudo lynis show warnings\n   sudo lynis show suggestions\n   ```\n3. **AIDE 建基线并检测篡改**：\n   ```bash\n   sudo dnf install -y aide\n   sudo aide --init                 # 首次建库（可能较慢）\n   sudo cp /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz\n   # 模拟篡改后检测\n   sudo touch /etc/passwd\n   sudo aide --check                # 报告哪些文件变了\n   ```\n\n## 常见错误\n- **auditd 规则重启后丢失**：`auditctl` 加的是临时规则。解决：写入 `/etc/audit/rules.d/`，然后 `augenrules --load` 或重启 auditd 持久化。\n- **lynis 报告刷屏不知看哪**：满屏 OK 不重要。解决：只看 `[WARNING]` 与 `[SUGGESTION]`，或 `lynis show warnings`。\n- **AIDE 初始化后没 copy 成 aide.db.gz**：`--check` 会报\"找不到数据库\"。解决：把 `aide.db.new.gz` 复制为 `aide.db.gz` 再 check。\n- **AIDE 校验频繁误报**：系统更新/日志轮转会改变文件。解决：把 `/var/log`、`/tmp` 等易变目录在 `/etc/aide.conf` 里排除或仅监控元数据。\n\n## 小结\n- auditd 记\"正在发生\"（内核级）、lynis 找\"该改什么\"（基线扫描）、AIDE 验\"已被改了什么\"（完整性）。\n- audit 规则要落 `rules.d/` 才持久；AIDE 改完基线要重新 `--init`。\n- 进阶：把 audit 日志转发到 SIEM（如 L9 的 Prometheus + Loki）做集中审计与告警。",
  "l10-firewall": "# 防火墙默认拒绝（iptables / nftables / firewalld）\n\n## 讲解\nLinux 防火墙内核态是 `netfilter`，用户态工具有三代：\n- **iptables**（传统，仍在大量在用）：基于表（filter/nat/mangle）+ 链（INPUT/OUTPUT/FORWARD）的 rule 列表。\n- **nftables**（新标准，RHEL 8+/内核 ≥ 3.13 推荐）：替代 iptables/ipset，语法统一、性能更好。\n- **firewalld**（RHEL/CentOS 默认管理前端）：基于\"区域(zone)+服务(service)\"，底层调用 nftables/iptables。\n\n核心原则：**默认拒绝（default drop）**——先 `DROP` 所有入站，再显式放行需要的端口（22/80/443 等）。这样任何没主动开放的端口天然不可达，攻击面最小。\n\n> 选哪个？RHEL 9 推荐 firewalld（省心）/nftables（精细）；老系统或脚本兼容用 iptables。三者不要混管同一张表。\n\n## 动手实验\n1. **firewalld（RHEL 9 默认）默认拒绝实战**：\n   ```bash\n   sudo systemctl enable --now firewalld\n   sudo firewall-cmd --set-default-zone=public\n   sudo firewall-cmd --zone=public --remove-service=dhcpv6-client --permanent\n   # 先确保 ssh 放行，避免把自己锁外面\n   sudo firewall-cmd --add-service=ssh --permanent\n   sudo firewall-cmd --add-service=http --add-service=https --permanent\n   sudo firewall-cmd --reload\n   sudo firewall-cmd --list-all\n   ```\n2. **nftables 手写默认拒绝**（想精细控制时）：\n   ```bash\n   sudo systemctl disable --now firewalld   # 与 nftables 二选一\n   sudo nft add table inet filter\n   sudo nft add chain inet filter input '{ type filter hook input priority 0; policy drop; }'\n   sudo nft add rule inet filter input ct state established,related accept\n   sudo nft add rule inet filter input iifname \"lo\" accept\n   sudo nft add rule inet filter input tcp dport {22,80,443} accept\n   sudo nft list ruleset\n   ```\n3. **iptables 经典默认拒绝**（兼容老环境）：\n   ```bash\n   sudo iptables -P INPUT DROP\n   sudo iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT\n   sudo iptables -A INPUT -i lo -j ACCEPT\n   sudo iptables -A INPUT -p tcp -m multiport --dports 22,80,443 -j ACCEPT\n   sudo iptables -L -n -v\n   # 持久化（RHEL）：service iptables save  或  iptables-save > /etc/sysconfig/iptables\n   ```\n\n## 常见错误\n- **默认 DROP 前忘了放行 SSH（22）**：一执行就被踢下线。解决：先 `-A INPUT -p tcp --dport 22 -j ACCEPT` 或 firewalld `--add-service=ssh`，再设默认策略。\n- **firewalld 只用临时规则没 `--permanent`**：`--reload` 或重启后规则丢失。解决：放行类命令加 `--permanent`，最后统一 `--reload`。\n- **同时跑 firewalld 和 nftables/iptables 手工规则**：规则互相覆盖、行为诡异。解决：选一套，禁用其余（`systemctl disable --now firewalld`）。\n- **nftables 链 policy 写错位置**：必须 `policy drop` 写在 chain 定义里，仅加 `drop` 规则不会默认拒绝。\n\n## 小结\n- 防火墙铁律：默认拒绝 + 显式放行必要端口，暴露面最小。\n- RHEL 9 优先 firewalld（按服务放行）；需精细用 nftables；老系统兼容用 iptables。\n- 进阶：用 nftables `set`/ipset 做大量 IP 封禁、用 `limit` 限连接速率防 CC。",
  "l10-sshsec": "# SSH 加固与 fail2ban 防爆破\n\n## 讲解\nSSH 是 Linux 服务器最主要的远程入口，也是攻击者首选目标。加固围绕三件事：**认证方式、暴露面、失败次数**。\n\n1. **认证方式**：禁用 root 直登、禁用密码登录、只用密钥（密钥长度 ≥ 3072 位 RSA 或 ed25519）。\n2. **暴露面**：改默认端口（仅\"降低噪声\"，不是真安全）、限制允许的用户/来源、空闲超时断开。\n3. **失败次数**：用 `fail2ban` 监控 `/var/log/secure`（或 `auth.log`）中的失败登录，达到阈值就调用 iptables/nftables 临时封 IP。\n\nfail2ban 由 `jail`（监控规则）+ `filter`（日志匹配正则）+ `action`（封禁动作）组成；`[sshd]` jail 默认监控 SSH，按 `maxretry` 与 `bantime` 执行封禁。\n\n## 动手实验\n1. 备份并加固 `sshd_config` 关键项：\n   ```bash\n   sudo cp /etc/ssh/sshd_config /etc/ssh/sshd_config.bak\n   sudo sed -i -e 's/^#\\?PermitRootLogin.*/PermitRootLogin no/' \\\n               -e 's/^#\\?PasswordAuthentication.*/PasswordAuthentication no/' \\\n               -e 's/^#\\?X11Forwarding.*/X11Forwarding no/' \\\n               -e 's/^#\\?ClientAliveInterval.*/ClientAliveInterval 300/' \\\n               -e 's/^#\\?ClientAliveCountMax.*/ClientAliveCountMax 2/' \\\n               /etc/ssh/sshd_config\n   sudo sshd -t            # 先测语法，再重启\n   sudo systemctl restart sshd\n   ```\n2. 安装并启用 fail2ban（RHEL 系需先开 EPEL）：\n   ```bash\n   sudo dnf install -y epel-release\n   sudo dnf install -y fail2ban\n   sudo systemctl enable --now fail2ban\n   ```\n3. 写 SSH jail 配置：\n   ```bash\n   sudo tee /etc/fail2ban/jail.d/sshd.local > /dev/null <<'EOF'\n   [sshd]\n   enabled = true\n   port = ssh\n   filter = sshd\n   logpath = /var/log/secure\n   maxretry = 5\n   bantime = 1h\n   findtime = 10m\n   backend = systemd\n   EOF\n   sudo systemctl restart fail2ban\n   ```\n4. 查看封禁状态与日志：\n   ```bash\n   sudo fail2ban-client status sshd\n   sudo fail2ban-client status sshd | grep -A5 \"Banned IP list\"\n   sudo journalctl -u fail2ban -n 50\n   ```\n5. 手动解封某个 IP（误封时）：\n   ```bash\n   sudo fail2ban-client set sshd unbanip 203.0.113.50\n   ```\n\n## 常见错误\n- **改完 sshd 没 `sshd -t` 就重启**：语法错会导致 sshd 起不来，远程直接断连。解决：每次改完先 `sshd -t` 再 `restart`。\n- **禁密码登录前密钥没生效**：连不上。解决：用 `ssh -i 密钥 用户@主机` 验证可登录后再关密码。\n- **fail2ban 找不到日志路径**：RHEL 9 用 `journald`，应设 `backend = systemd` 并把 `logpath` 设为 `/var/log/secure`；Debian 用 `/var/log/auth.log`。路径错则永远不封。\n- **bantime 设太短**：攻击者可循环试探。练习机可设 1h，公网可设更长或 `bantime.increment = true` 递增封禁。\n\n## 小结\n- SSH 加固 = 禁 root 直登 + 仅密钥 + 空闲超时；fail2ban 兜底封暴力破解 IP。\n- 每次改 `sshd_config` 必 `sshd -t` 再重启，避免锁死自己。\n- 进阶：用 `AllowUsers` 限制可登录账号、用 `Match Address` 做来源白名单。",
  "l10-sudo": "# sudo 精细授权与禁止 root 登录\n\n## 讲解\n`sudo`（superuser do）让普通用户以指定身份执行命令，是\"最小权限原则\"落地的核心工具。直接把用户塞进 `wheel` 组（`%wheel ALL=(ALL) ALL`）等于给了完整 root，风险大；更安全的做法是按\"需要什么就给什么\"的思路，在 `/etc/sudoers.d/` 下写细粒度规则。\n\nsudoers 规则基本语法：\n```\n用户/组  主机=(可切换身份)  可执行的命令列表\n```\n例如 `lab ALL=(ALL) NOPASSWD: /bin/systemctl restart nginx` 表示 lab 只能在重启 nginx 时用 root，且免密。\n\n另一半是\"禁止 root 直接登录\"：攻击者常先扫 root 账号爆破密码，关掉 root 的 SSH 登录（PermitRootLogin no）能挡掉一大半自动化攻击。配合\"禁止密码登录、只用密钥\"，安全性进一步提高。\n\n> 永远用 `visudo` 编辑 sudoers（它会做语法检查，写错会导致所有人都无法提权）；或把规则写到 `/etc/sudoers.d/文件名`，同样会被 `visudo -c` 校验。\n\n## 动手实验\n1. 用 `visudo -c` 检查当前配置语法是否 OK：\n   ```bash\n   sudo visudo -c\n   # /etc/sudoers: parsed OK\n   ```\n2. 为运维用户 `lab` 添加\"只能重启 nginx、查看日志\"的精细规则：\n   ```bash\n   sudo tee /etc/sudoers.d/lab-nginx > /dev/null <<'EOF'\n   lab ALL=(root) NOPASSWD: /bin/systemctl restart nginx, /bin/systemctl status nginx, /usr/bin/tail /var/log/nginx/*\n   EOF\n   sudo chmod 440 /etc/sudoers.d/lab-nginx\n   sudo visudo -c\n   ```\n3. 切换到 lab 验证权限是否生效（只能做授权内的事）：\n   ```bash\n   sudo -u lab -i\n   sudo -l            # 列出 lab 被允许执行的命令\n   sudo systemctl restart nginx\n   sudo reboot        # 应被拒绝：Sorry, user lab is not allowed to execute...\n   ```\n4. 禁止 root 通过 SSH 登录（编辑 `/etc/ssh/sshd_config`）：\n   ```bash\n   sudo sed -i 's/^#\\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config\n   sudo grep -i PermitRootLogin /etc/ssh/sshd_config\n   sudo systemctl restart sshd\n   ```\n5. 顺手关掉密码登录、只用密钥（前提：你已部署好公钥）：\n   ```bash\n   echo 'PasswordAuthentication no' | sudo tee -a /etc/ssh/sshd_config\n   sudo systemctl restart sshd\n   ```\n\n## 常见错误\n- **直接 `vim /etc/sudoers` 写错语法**：一旦语法错误，sudo 会拒绝所有提权，可能把自己锁死。解决：一律用 `visudo`，或在 `/etc/sudoers.d/` 增删文件、用 `visudo -c` 校验。\n- **规则没加 `Defaults secure_path` 导致 sudo 找不到命令**：报 `command not found`。解决：写绝对路径（如 `/bin/systemctl`），或在 sudoers 里 `Defaults secure_path=\"/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin\"`。\n- **忘了 `chmod 440` sudoers.d 文件**：sudo 会忽略权限过松（如 0644）的文件并报错。解决：`chmod 440 /etc/sudoers.d/文件名`。\n- **先禁密码登录却没部署密钥**：一重启 SSH 就再也连不上。解决：确认 `~/.ssh/authorized_keys` 已就位再改 `PasswordAuthentication no`。\n\n## 小结\n- sudoers 按\"最小权限\"写规则，放 `/etc/sudoers.d/` 下、权限 `440`、用 `visudo -c` 校验。\n- `PermitRootLogin no` + 密钥登录，是挡住自动化爆破的基本盘。\n- 进阶：用 `sudo` 审计日志（`/var/log/secure` 或 `journalctl -t sudo`）追踪谁做过什么。",
  "l11-bench": "# 基准测试（sysbench / fio / wrk）\n\n## 讲解\n调优前必须先有\"基线\"，否则不知道改了有没有用。三类基准对应三类资源：\n- **sysbench**：CPU/内存/线程/数据库（MySQL）压测。CPU 测试算素数为例，看 events/s 与延迟。\n- **fio**（Flexible IO Tester）：磁盘 IO 基准，支持顺序/随机、读/写、同步/异步、不同块大小；输出 IOPS、带宽、延迟分位（clat p95/p99）。\n- **wrk / wrk2**：HTTP 基准，看吞吐（req/s）、延迟分布、连接数；`wrk2` 能做恒定速率（Coordinated Omission 更友好）。\n\n黄金法则：**单一变量、可复现、看分布不看均值**——记录测试命令、环境、p99 延迟，对比才有意义。别在跑基准时开别的重负载进程。\n\n## 动手实验\n1. **sysbench CPU 基准**：\n   ```bash\n   sudo dnf install -y sysbench\n   sysbench cpu --cpu-max-prime=20000 --threads=4 run\n   # 看 total time / events per second\n   ```\n2. **fio 磁盘随机读/写基准**：\n   ```bash\n   sudo dnf install -y fio\n   # 随机读 4K，4 并发，30 秒\n   fio --name=randread --rw=randread --bs=4k --numjobs=4 \\\n       --size=1G --runtime=30 --time_based --filename=/tmp/fio.tmp \\\n       --ioengine=libaio --direct=1 --group_reporting\n   # 关注 IOPS、BW、clat(usec) 的 p95/p99\n   ```\n3. **wrk HTTP 基准**：\n   ```bash\n   # 先起一个本机服务，例如 python 静态页或 Nginx\n   sudo dnf install -y wrk\n   wrk -t4 -c100 -d30s http://127.0.0.1:80/\n   # 看 Requests/sec、Latency 分布（2.5%/50%/97.5%）\n   ```\n4. **wrk2 恒定速率（更准的延迟）**：\n   ```bash\n   wrk2 -t4 -c100 -d30s -R2000 http://127.0.0.1:80/\n   # -R2000 表示恒定 2000 req/s，看是否跟得上、延迟如何\n   ```\n5. **记录基线对比**（建议写进笔记）：\n   ```bash\n   echo \"env: 4C8G Rocky9; disk: nvme\" > /tmp/bench-baseline.txt\n   # 把关键输出追加进去，调优前后对比\n   ```\n\n## 常见错误\n- **基准时机器还在跑别的负载**：结果不可信。解决：停掉无关进程、`nice`/`taskset` 绑核、关掉桌面。\n- **只看均值不看 p99**：均值好看但尾延迟爆炸（用户感知卡）。解决：重点看 clat p99 / wrk 97.5% 延迟。\n- **fio 用 buffered IO 测不出真实磁盘**：没加 `--direct=1` 会走 page cache，数字虚高。解决：加 `--direct=1`。\n- **wrk 并发数乱给**：`-c` 太小压不满、`-t` 超过核数无益。解决：c ≈ 预期并发，t ≤ CPU 核数。\n\n## 小结\n- 先建基线再调优；sysbench(CPU)、fio(磁盘)、wrk(Web) 各管一段。\n- 看分布（p99）而非均值；单一变量、可复现、记录环境。\n- 进阶：`perf` 找热点、`flamegraph` 火焰图、`prometheus` 长期趋势（见 L9）。",
  "l11-cpu": "# CPU 性能观测（top / mpstat / pidstat / 负载）\n\n## 讲解\nCPU 调优遵循 **USE 方法**（Utilization 利用率、Saturation 饱和度、Errors 错误）。先看整体利用率和负载，再下钻到具体进程。核心指标：\n- **利用率**：CPU 忙的时间占比，`top` 里的 `%Cpu(s)`、`mpstat` 的 `%usr/%sys`。\n- **饱和度**：排队等待 CPU 的进程数，用 **负载（load average）** 衡量——1/5/15 分钟平均\"可运行+不可中断\"进程数。经验值：load ≈ 核数 算饱和，>核数 说明在排队。\n- **错误**：通常靠硬件计数器/内核日志，命令行少见。\n\n工具分工：`top` 看实时全局；`mpstat -P ALL` 看每个核；`pidstat -u` 看每个进程的 CPU 占用；`uptime`/`cat /proc/loadavg` 看负载趋势。\n\n> sysstat 包提供 mpstat/pidstat/iostat，RHEL 系 `dnf install -y sysstat`，Debian 系 `apt install -y sysstat`。\n\n## 动手实验\n1. **看实时全局与负载**：\n   ```bash\n   uptime                 # 看 1/5/15 分钟负载\n   top -b -n1 | head -20  # 非交互模式抓一屏\n   ```\n2. **逐个 CPU 核利用率（排查\"单核跑满\"）**：\n   ```bash\n   mpstat -P ALL 1 3       # 每核每秒采样，共 3 次\n   # %usr 用户态 / %sys 内核态 / %iowait 等；iowait 高见 l11-io\n   ```\n3. **进程级 CPU 占用（找吃 CPU 的进程）**：\n   ```bash\n   pidstat -u 1 3          # 每进程每秒采样 3 次\n   pidstat -u -p ALL 1 2   # 等价更全\n   ```\n4. **制造一个 CPU 压力并观察负载变化**（另开终端对比）：\n   ```bash\n   # 终端 A：占满 1 个核 30 秒\n   taskset -c 0 yes > /dev/null &\n   # 终端 B：观察\n   watch -n1 'uptime; mpstat -P ALL 1 1'\n   # 结束：kill %1\n   ```\n\n## 常见错误\n- **把 load average > 核数 当成一定异常**：短时尖峰正常；看 15 分钟值是否在趋势下降。容器里 load 含宿主机进程，需结合 cgroup 限额看。\n- **top 里 %Cpu 看的是全核平均**：单核瓶颈要看 `mpstat -P ALL`，否则掩盖问题。\n- **iowait 高误判为 CPU 不够**：其实是磁盘/IO 在等（见 l11-io），加 CPU 无效。\n- **mpstat/pidstat 命令找不到**：没装 sysstat。解决：`dnf/apt install sysstat`。\n\n## 小结\n- USE：利用率（%usr/%sys）、饱和度（load≈核数即饱和）、错误。\n- `top` 全局 → `mpstat -P ALL` 分核 → `pidstat -u` 分进程，逐级下钻。\n- 进阶：用 `perf top` 看热点函数、`/proc/stat` 自己算利用率。",
  "l11-io": "# 磁盘 IO 观测与调度器（iostat / iotop / 调度器）\n\n## 讲解\nIO 瓶颈的 USE：利用率（磁盘忙 %util）、饱和度（await/queue 长度）、错误（media error）。重点指标：\n- **%util**（iostat）：设备忙的时间百分比，接近 100% 说明磁盘饱和。\n- **await / r_await / w_await**：平均每次 IO 的等待+服务时间（毫秒）。await 远高于 svctm 说明在排队。\n- **aqu-sz**（avg queue）：平均队列深度，越大越饱和。\n- **iodepth / nr_requests**：队列深度，SSD/NVMe 可调大以提升并发。\n- **调度器**：`none`（NVMe 推荐）、`mq-deadline`（SATA SSD/HDD 通用）、`bfq`（桌面低延迟）。查看/切换在 `/sys/block/<dev>/queue/scheduler`。\n\n## 动手实验\n1. **看磁盘利用率与 await**：\n   ```bash\n   iostat -x 1 3           # -x 扩展指标；看 %util / await / aqu-sz\n   ```\n2. **看每个进程的 IO 占用**：\n   ```bash\n   sudo iotop -o -b -n 3   # -o 只看有 IO 的进程\n   ```\n3. **查看/切换调度器**：\n   ```bash\n   cat /sys/block/sda/queue/scheduler     # 如：[mq-deadline] none\n   echo mq-deadline | sudo tee /sys/block/sda/queue/scheduler\n   ```\n4. **调队列深度（SSD/NVMe 提升并发）**：\n   ```bash\n   cat /sys/block/sda/queue/nr_requests\n   echo 256 | sudo tee /sys/block/sda/queue/nr_requests\n   ```\n5. **制造读压力观察变化**：\n   ```bash\n   sudo dnf install -y fio\n   fio --name=randread --rw=randread --bs=4k --numjobs=4 \\\n       --size=512M --runtime=30 --time_based --filename=/tmp/testfio\n   ```\n\n## 常见错误\n- **%util 高但吞吐量低就加磁盘**：可能是随机小 IO + 高 await，先排查是否顺序化/加缓存/换 SSD。\n- **NVMe 还用 mq-deadline 不放 none**：NVMe 自带队列，用 `none` 更省开销。解决：设 `none`。\n- **iotop 报 \"Need DISABLE_TASK_DELAY_ACCT\"**：内核没开延迟统计。解决：启动加 `delayacct` 或忽略（用 `iostat -x` 替代）。\n- **调 nr_requests 不生效**：某些设备（尤其 NVMe）忽略该值；以设备文档为准。\n\n## 小结\n- IO 瓶颈看 %util（饱和）、await/aqu-sz（排队）、r/w 拆分。\n- NVMe 用 `none`、SATA 用 `mq-deadline`；SSD 可加大 nr_requests。\n- 进阶：`fio` 做基准（见 l11-bench）、`blktrace`/`bcc` 下钻到块层。",
  "l11-mem": "# 内存观测与 OOM 调优（free / vmstat / OOM）\n\n## 讲解\n内存瓶颈同样用 USE：利用率（已用/可用）、饱和度（swap 用量、是否开始回收）、错误（OOM）。关键概念：\n- **available**（free 输出）：真正\"立刻可用\"的内存，比 `free` 列更准（含可回收的 page cache）。\n- **swap**：当 available 见底，内核把不活跃页换到磁盘，swap 使用量上升 = 内存压力信号；若 si/so（vmstat）持续非零，说明在频繁换入换出，性能骤降。\n- **OOM Killer**：内存彻底耗尽时内核挑\"最该杀\"的进程回收内存。选择依据是 `oom_score`（与进程占用内存成正比），可写 `/proc/<pid>/oom_score_adj`（-1000 表示永不被杀，保护关键进程如数据库）。\n\n> 三条线：free 看总量、vmstat 看变化趋势（si/so/free 列）、`dmesg -T | grep -i oom` 看是否发生过 OOM。\n\n## 动手实验\n1. **看内存总量与可用**：\n   ```bash\n   free -h                 # -h 人类可读；重点看 available 列\n   cat /proc/meminfo | head -5\n   ```\n2. **看内存压力趋势（swap 换入换出）**：\n   ```bash\n   vmstat 1 5              # si/so 非 0 表示在换页；free 列持续下降=吃紧\n   ```\n3. **制造内存压力并观察 OOM（练习机专用，先保存工作）**：\n   ```bash\n   # 用 stress-ng 申请大内存\n   sudo dnf install -y stress-ng\n   stress-ng --vm 1 --vm-bytes 90% --vm-hang 0 &\n   vmstat 1 5\n   dmesg -T | grep -i \"out of memory\"     # 若真 OOM 会有记录\n   ```\n4. **保护关键进程不被 OOM 杀掉**：\n   ```bash\n   PID=$(pgrep -f mysqld | head -1)\n   echo -1000 | sudo tee /proc/$PID/oom_score_adj   # -1000=永不被杀\n   cat /proc/$PID/oom_score_adj\n   ```\n5. **调全局 OOM 倾向（可选）**：\n   ```bash\n   # 0=保守(宁可杀少)  1/2=更激进回收; 默认 0\n   cat /proc/sys/vm/overcommit_memory\n   ```\n\n## 常见错误\n- **只看 free 列忽略 available**：free 列小可能只是 page cache 占着，available 才反映真实可用；误判\"内存不够\"。\n- **swap 用了就慌**：偶发 swap 正常（内核回收冷页）；只有 si/so 持续非零才说明真不够。\n- **盲目调 swappiness=0**：设为 0 并不总是更快，数据库场景可设 1~10 减少换出，但不要直接禁 swap（禁了 OOM 风险更高）。\n- **oom_score_adj 写非 root**：需 root 才能改别的进程；且进程重启后失效，应写进 service 文件（`OOMScoreAdjust=`）。\n\n## 小结\n- 内存看 available（真可用）、vmstat 看 si/so（换页=压力）、dmesg 看 OOM 历史。\n- 关键进程用 `oom_score_adj=-1000` 保护；别直接关 swap。\n- 进阶：`/proc/sys/vm/swappiness`、`vmtouch` 预热缓存、`cgroup` 内存限额。",
  "l11-net": "# 网络与内核参数调优（sysctl / 多队列）\n\n## 讲解\n网络性能调优分两层：应用层（Nginx 连接数、超时）+ 内核层（TCP 栈参数、网卡队列）。内核关键参数（/proc/sys/net/）：\n- **net.core.somaxconn / net.ipv4.tcp_max_syn_backlog**：连接队列上限，高并发 Web 要调大，否则新连接被丢。\n- **net.ipv4.tcp_tw_reuse**：复用 TIME_WAIT 端口，缓解\"端口耗尽\"（注意：不要开 tcp_tw_recycle，已废弃且有 NAT 问题）。\n- **net.ipv4.tcp_rmem/wmem**：TCP 收发缓冲区间，大带宽长延迟（BDP 大）链路要调大。\n- **net.ipv4.ip_local_port_range**：本地出口端口范围，代理/NAT 场景调宽。\n- **网卡多队列 + RPS/RFS**：多核下让不同流分散到不同 CPU，避免单核软中断瓶颈；`ethtool -l` 看队列数，`/proc/interrupts` 看中断分布。\n\n> 改法：`sysctl -w 参数=值` 临时；持久写 `/etc/sysctl.d/99-tuning.conf` 后 `sysctl --system`。\n\n## 动手实验\n1. **查看与临时调整关键参数**：\n   ```bash\n   sysctl net.core.somaxconn net.ipv4.tcp_tw_reuse\n   sudo sysctl -w net.core.somaxconn=4096\n   sudo sysctl -w net.ipv4.tcp_tw_reuse=1\n   sudo sysctl -w net.ipv4.ip_local_port_range=\"1024 65535\"\n   ```\n2. **按带宽延迟积调 TCP 缓冲（示例：千兆、RTT 20ms）**：\n   ```bash\n   # BDP ≈ 带宽(bps)/8 * RTT(s) ≈ 1e9/8*0.02 ≈ 2.5MB\n   sudo sysctl -w net.ipv4.tcp_rmem=\"4096 87380 8388608\"\n   sudo sysctl -w net.ipv4.tcp_wmem=\"4096 65536 8388608\"\n   ```\n3. **持久化配置**：\n   ```bash\n   sudo tee /etc/sysctl.d/99-tuning.conf > /dev/null <<'EOF'\n   net.core.somaxconn = 4096\n   net.ipv4.tcp_max_syn_backlog = 8192\n   net.ipv4.tcp_tw_reuse = 1\n   net.ipv4.ip_local_port_range = 1024 65535\n   EOF\n   sudo sysctl --system\n   ```\n4. **网卡多队列与中断均衡**：\n   ```bash\n   ethtool -l eth0            # 看 Combined 队列数\n   ethtool -L eth0 combined 8 # 设为 8 队列（若支持）\n   cat /proc/interrupts | grep eth0   # 看中断分布\n   # 软中断均衡：sudo tuned-adm profile network-throughput（RHEL）\n   ```\n\n## 常见错误\n- **盲目开 tcp_tw_recycle**：Linux 4.12 已移除，且曾导致 NAT 后客户端连接失败。解决：只用 tcp_tw_reuse。\n- **只调应用不调内核队列**：Nginx 配了高 worker_connections，但 somaxconn 默认 128，队列溢出照样丢连接。\n- **改完没 `sysctl --system` 持久化**：重启丢失。解决：写 `/etc/sysctl.d/*.conf`。\n- **多队列数超过 CPU 核数**：没必要，反而增开销。队列数 ≈ 收包 CPU 核数即可。\n\n## 小结\n- 网络调优：内核队列（somaxconn/backlog）+ TIME_WAIT 复用 + TCP 缓冲按 BDP 调。\n- 网卡多队列把中断分散到多核，避免单核软中断瓶颈。\n- 进阶：`ss -tin` 看每连接 TCP 指标、`tuned` 性能profile、`XDP/eBPF` 加速。",
  "l12-budget": "# Error Budget 燃烧率告警与策略\n\n## 概述\nSLO 告诉我们\"目标多少\"，但**怎么在预算快烧完时及时叫停**？靠\"每日成功率 < 99.9%\"这种单阈值告警太迟钝（要烧一整天才响）。SRE 用 **Burn Rate（燃烧率）** 解决：预算消耗速度 = 实际错误率 / (1 - SLO)。\n\n- 燃烧率 = 1 ⇒ 匀速把一个月预算烧完（慢，但持续）。\n- 燃烧率 = 14.4 ⇒ 2 小时烧光整月预算（快，必须立刻响应）。\n- 核心思想：**既要在快速烧毁时立刻告警，也要避免慢速滴漏的噪声。**\n\n## 怎么做\n1. **多窗口多燃烧率告警（Google SRE 标准做法）**：对同一 SLO 同时设\"长窗口+低燃烧率\"和\"短窗口+高燃烧率\"两组，取 AND，显著降低误报。\n   ```promql\n   # 长窗口(1h)中等燃烧率\n   (\n     sum(rate(http_requests_total{code=~\"5..\"}[1h]))\n     / sum(rate(http_requests_total[1h]))\n   ) > (14.4 * (1 - 0.999))\n   # AND 短窗口(5m)高燃烧率\n   and\n   (\n     sum(rate(http_requests_total{code=~\"5..\"}[5m]))\n     / sum(rate(http_requests_total[5m]))\n   ) > (14.4 * (1 - 0.999))\n   ```\n2. **定义 Error Budget Policy（错误预算策略）**：写进文档，明确阈值动作：\n   - 预算消耗 < 100%：正常迭代，可发版。\n   - > 100% 或连续 N 天高燃烧：冻结非关键发布、成立稳定性专项。\n   - 重大事后复盘（Postmortem）必做，且无追责（blameless）。\n3. **把预算接进发布闸门**：CI/CD 在发版前读取预算剩余，预算不足时阻断或双签放行。\n\n## 常见坑\n- **只看单窗口**：1h 窗口 + 燃烧率 14.4 会在短时抖动反复误报；必须配 5m 高燃烧率窗口 AND。\n- **告警不接动作**：有燃烧率告警却无\"停发版\"策略，等于没预算。预算的价值在\"决策\"而非\"报警\"。\n- **复盘追责化**：Error Budget 前提是 blameless 文化，追责会让团队隐瞒事故、伪造指标。\n- **SLO 阈值不合理导致预算永远满/空**：需随业务阶段调参，初期可放宽到 99.0% 观察真实波动。\n\n## 小结\n- 燃烧率告警 = 用\"预算消耗速度\"替代\"是否越界\"，响应更快、误报更低。\n- 多窗口 AND 是工业级标准，不要只设单一阈值。\n- Error Budget 必须配套 Policy + 发布闸门 + blameless 复盘，否则只是数字。\n- 进阶：自动化预算看板、与 `l12-gitops` 的发布闸门联动。",
  "l12-chaos": "# 混沌工程与故障演练\n\n## 概述：什么是混沌工程\n混沌工程不是\"随机搞破坏\"，而是**在可控环境下，主动注入故障，验证系统是否如预期那样失败/恢复**，从而提前发现盲区。Netflix 的经典定义：在分布式系统上进行实验，建立对系统抵御失控条件能力的信心。\n\n五大原则（PRINCIPLES OF CHAOS）：\n1. 用稳定状态假设（如\"成功率 > 99.9%\"）衡量系统健康。\n2. 真实反映生产环境的事件类型（不是造一个玩具故障）。\n3. 在生产和类生产环境做（影子/引流也可，但越接近越可信）。\n4. 持续自动化运行（一次演练 ≠ 永久可靠）。\n5. 控制爆炸半径（最小可行实验 MVE，先小后大）。\n\n## 怎么做\n1. **手写最小实验（无需工具）**：先用手动方式验证，成本最低。\n   ```bash\n   # 在测试节点杀掉关键进程，看副本是否自动拉起\n   ssh node-7 'pkill -9 myapp'        # 模拟进程崩溃\n   # 观察：副本重建时间？请求是否短暂 5xx 飙升？\n   ```\n2. **注入网络故障（验证超时/重试）**：\n   ```bash\n   # 用 tc 模拟到依赖服务的 200ms 延迟 + 1% 丢包\n   ssh node-7 \"tc qdisc add dev eth0 root netem delay 200ms loss 1%\"\n   # 验证上游是否配置了合理超时与重试（而非雪崩）\n   ssh node-7 \"tc qdisc del dev eth0 root\"\n   ```\n3. **用 Chaos Mesh（K8s 原生）做标准化实验**：\n   ```yaml\n   # kill pod 实验\n   kubectl apply -f - <<'EOF'\n   apiVersion: chaos-mesh.org/v1alpha1\n   kind: PodChaos\n   metadata: { name: kill-api }\n   spec:\n     action: pod-kill\n     mode: one\n     selector: { labelSelectors: { app: api } }\n     scheduler: { cron: \"@every 10m\" }\n   EOF\n   ```\n4. **对照 SLO 判定**：演练期间盯着 `l12-slo` 的 SLI，若突破 SLO/预算告警，说明韧性不足，回到架构改进。\n\n## 常见坑\n- **一上来就炸生产**：必须先小范围、可回滚、有止损按钮（\"红钮\"一键停实验）。\n- **没有稳定状态假设**：只\"跑了看日志\"不算演练，必须有可量化的 SLI 阈值作判据。\n- **只在测试环境做且一次就停**：环境差异会让结论失真；要持续、靠近生产。\n- **把混沌当甩锅工具**：演练目的是发现系统弱点，不是证明某人是谁的责任。\n\n## 小结\n- 混沌工程 = 主动、可控、持续的故障注入，验证韧性。\n- 先用手动 `ssh`/`tc` 做 MVE，再上 Chaos Mesh 标准化。\n- 必须配合稳定状态假设（SLI/SLO）与一键止损。\n- 进阶：自动化演练排程、与 `l12-oncall` 的演练值班联动。",
  "l12-gitops": "# GitOps 与声明式发布闸门\n\n## 概述\nGitOps：把**集群的期望状态**以声明式文件（YAML/Helm/Kustomize）存进 Git，由控制器（如 Argo CD / Flux）**持续把实际状态向 Git 对齐**，并检测漂移、自动回滚。Git 成为\"唯一事实源\"和\"审计日志\"。\n\n相比传统 CI 推镜像到集群，GitOps 是**拉模型**：集群主动从 Git 拉取，凭据不出集群、变更可审查、回滚 = `git revert`。\n\n与 SRE 的结合点：**发布闸门**。CI 在合并前读取 Error Budget（`l12-budget`）：\n- 预算充足 ⇒ 自动合并 + 同步。\n- 预算耗尽 ⇒ 阻断非豁免发布，强制先稳系统。\n\n## 怎么做\n1. **定义期望状态入 Git**：\n   ```yaml\n   # apps/api/deploy.yaml（Argo CD 追踪此路径）\n   apiVersion: apps/v1\n   kind: Deployment\n   spec:\n     replicas: 4\n     template:\n       spec:\n         containers:\n           - name: api\n             image: registry/api:1.8.2\n   ```\n2. **Argo CD 接入并开启自动同步/自愈**：\n   ```bash\n   argocd app create api --repo <git> --path apps/api \\\n     --dest-server https://kubernetes.default.svc \\\n     --sync-policy automated --self-heal --prune\n   argocd app get api     # 观察 SYNC STATUS / HEALTH\n   ```\n3. **CI 发布闸门读取预算**（伪代码）：\n   ```bash\n   BUDGET=$(curl -s $budget_api/remaining)   # 0~1\n   if (( $(echo \"$BUDGET < 0.1\" | bc -l) )); then\n     echo \"Error Budget 不足，阻断发布\"; exit 1\n   fi\n   git tag release/$(date +%Y%m%d) && git push\n   ```\n4. **漂移检测与回滚**：人为改了集群？Argo CD 标 `OutOfSync` 并据 `--self-heal` 拉回；事故时 `git revert` 即回滚。\n\n## 常见坑\n- **Git 不是唯一真源**：有人直接 `kubectl edit` 集群，导致漂移且 Git 失准。纪律：一切变更走 PR。\n- **自动同步无审批裸奔**：生产应开 `--sync-policy` 但关键应用加 `sync-wave`/手动确认门。\n- **闸门只看构建通过**：发布闸门必须接\"业务风险（预算）\"，而非仅单元测试绿。\n- **Secret 进 Git 明文**：用 sealed-secrets / External Secrets，永不提交明文密钥。\n\n## 小结\n- GitOps = Git 为唯一真源 + 控制器拉式同步 + 漂移自愈。\n- 比\"CI 推集群\"更安全可审，回滚即 `git revert`。\n- 发布闸门接 Error Budget，让\"稳系统 vs 发版\"自动化决策。\n- 进阶：渐进式交付（Argo Rollouts 金丝雀）与 `l12-oncall` 告警联动。",
  "l12-oncall": "# On-Call 体系与无责事后复盘\n\n## 概述：On-Call 不是\"背锅\"\nOn-Call 是让系统有人负责、事故有人响应的机制，但它的可持续前提是**不把人当防火墙**。好的 On-Call = 合理的负载 + 清晰的升级路径 + 无责（blameless）复盘。\n\n配套三件套：\n- **告警分级**：P0（影响核心，立即）、P1（重大，15min）、P2（需关注，次日）、P3（ informational）。避免\"全员天天被 P0 轰炸\"导致告警疲劳。\n- **升级链（Escalation）**：一级未响应自动升级到二级/主管，防止\"没人看见\"。\n- **Postmortem（事后复盘）**：事故后 24~48h 内产出，聚焦时间线 + 根因 + 行动项，**不追责个人**。\n\n## 怎么做\n1. **设计轮值与负载保护**：\n   ```yaml\n   # PagerDuty/Alertmanager 路由示例（伪配置）\n   route:\n     receiver: primary-oncall\n     routes:\n       - match: { severity: critical }\n         receiver: primary-oncall\n         continue: true\n       - match: { severity: critical }\n         receiver: manager-escalation\n         routes: [{ repeat_interval: 15m }]   # 15min 未 ack 升级\n   ```\n2. **告警分级原则**：只对\"用户可感知且需人干预\"的事告警；可自愈的不叫人。\n3. **Postmortem 模板**（无责）：\n   ```markdown\n   ## 事故: <标题>\n   - 影响: <用户/收入/时长>\n   - 时间线: <UTC 事件 + 动作>\n   - 根因: <直接 + 深层(流程/架构)>\n   - 行动项: <Who/What/When>，须可追踪\n   - 教训: <系统而非个人>\n   ```\n4. **行动项闭环**：复盘产生的 TODO 进工单系统、设 owner 与截止日，下次复盘前回顾完成度。\n\n## 常见坑\n- **告警无分级**：所有事都 P0 ⇒ 没人看 P0。分级是 On-Call 可持续的命门。\n- **复盘变批斗**：追责会让当事人隐瞒、伪造。blameless 是文化地基。\n- **复盘无闭环**：写了 Postmortem 但行动项没人跟 ⇒ 同样事故重演。行动项必须进 tracker。\n- **On-Call 无补偿/无脱产**：长期高负载致 burnout；需轮换、备班、事后补休。\n\n## 小结\n- On-Call 可持续 = 分级告警 + 升级链 + 轮值保护 + 无责复盘。\n- 告警疲劳源于\"不该叫人的也叫人\"，分级过滤是关键。\n- Postmortem 价值在行动项闭环，而非写文档本身。\n- 进阶：SLO 驱动的告警（只对\"消耗预算的 SLI 越界\"告警）、与 `l12-gitops` 闸门联动。",
  "l12-slo": "# SLO/SLI/Error Budget 理论与实践\n\n## 概述：为什么需要 SLO\n事故无法归零，工程的目标不是\"100% 可用\"，而是\"在可接受的风险下，把可靠性投入到最有价值的地方\"。SLO（Service Level Objective，服务质量目标）就是把\"可靠\"变成**可协商、可度量**的数字契约。\n\n三个核心概念：\n- **SLI（Service Level Indicator）**：实际测量值，如成功率、延迟、吞吐。必须是可采集的真指标。\n- **SLO**：对 SLI 的目标阈值，如\"99.9% 的请求 P99 < 300ms\"。是给\"内部/用户\"的承诺，不是对外的 SLA。\n- **Error Budget（错误预算）**：`1 - SLO` 的容忍空间。99.9% 的 SLO ⇒ 每月允许 ~43 分钟不可用。预算消耗越快，越要暂停变更、优先稳定性。\n\n> 关键心智：SLO 不是性能 KPI，而是**风险预算**。它用来决定\"这周能不能发版、该不该还技术债\"。\n\n## 怎么做\n1. **选对 SLI（用户可感知的）**：\n   - 成功率：`sum(rate(http_requests_total{code!~\"5..\"}[5m])) / sum(rate(http_requests_total[5m]))`\n   - 延迟（P99）：`histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))`\n   - 新鲜度（如数据管道）：`time() - pipeline_last_success_timestamp`\n2. **定义 SLO 窗口与阈值**（28 天滚动是 Google SRE 推荐起点）：\n   ```yaml\n   # 以 Prometheus rule 表达 SLO 目标（示例）\n   - record: job:slo_success_ratio:ratio_rate5m\n     expr: |\n       sum(rate(http_requests_total{job=\"api\",code!~\"5..\"}[5m]))\n       / sum(rate(http_requests_total{job=\"api\"}[5m]))\n   ```\n3. **算 Error Budget 剩余**：\n   ```promql\n   # 过去 28 天实际成功率\n   avg_over_time(job:slo_success_ratio:ratio_rate5m[28d])\n   # 与 SLO 目标(0.999)的差，即预算消耗比率\n   1 - avg_over_time(job:slo_success_ratio:ratio_rate5m[28d]) / 0.999\n   ```\n4. **把 SLO 写进错误预算策略（Error Budget Policy）**：规定预算耗尽时的动作（停发版、冻结功能、复盘），并明确\"预算充足时可大胆迭代\"。\n\n## 常见坑\n- **SLI 选了用户无感的指标**：监控 CPU 而非\"请求成功率\"，SLO 好看系统却挂了。SLI 必须对应真实用户体验。\n- **SLO 定 100%**：等于没有预算，团队永远在救火又永远不敢动。Google 经验值多为 99.9%~99.95%。\n- **把 SLO 当 SLA 对外承诺**：SLA 带违约赔偿，需法务参与；SLO 是内部工程目标，二者阈值通常不同。\n- **窗口太短导致噪声**：用 1 天窗口会让单日抖动误触发；28 天滚动更稳。\n\n## 小结\n- SLO = 用数字管理\"可靠性风险预算\"，不是追求 100%。\n- 好 SLI 必须可测量、且对用户可感知；PromQL 是落地 SLI 的利器。\n- Error Budget 的真正价值：给\"发版 vs 稳系统\"提供客观决策依据。\n- 进阶：Burn-Rate 告警（见 `l12-budget`）、混沌演练（见 `l12-chaos`）。",
  "l2-find": "# 查找文件（第六课）\n\n## 讲解\n\n文件一多就找不到？三把\"搜索刀\"：\n\n- `find`：最强最慢，按条件在目录树里翻。基本句式 `find 起点 -name 模式`，模式支持 `*` 通配符。还能 `-type f`（只看文件）或 `-type d`（只看目录）。\n- `locate`：最快，查一个预建索引库（真实系统要 `updatedb`）。本模拟器里 `locate` 等价于 `find / -name`。\n- `which`：专门找\"命令\"装在哪里，比如 `which ls` 告诉你 `/usr/bin/ls`。\n\n一句话记忆：`find` 按名字挖地三尺，`locate` 查现成索引，`which` 找命令本尊。\n\n## 动手实验\n\n1. 在整棵树里找所有 `.txt` 文件：\n   ```\n   find / -name \"*.txt\"\n   ```\n   预期列出 `/home/guest` 下若干 `.txt` 路径。\n2. 只在当前目录找（不递归进子目录，用 `-maxdepth 1` 思路，这里用 `-type` 演示）：\n   ```\n   find . -name \"*.sh\"\n   ```\n   预期：`/home/guest/script.sh`\n3. 只找目录（不看文件）：\n   ```\n   find /home -type d\n   ```\n4. 快速定位（等价于 find /）：\n   ```\n   locate readme\n   ```\n5. 找命令 ls 装在哪：\n   ```\n   which ls\n   which cp\n   ```\n   预期：`/usr/bin/ls`、`/usr/bin/cp`\n\n## 常见错误\n\n- **`find` 模式要加引号**：`find / -name *.txt` 不加引号时 `*` 会被 shell 先展开。这里用引号包住 `\"*.txt\"` 最稳妥。\n- **`locate` 找不到刚建的文件**：真实系统里它依赖索引库，新文件要 `updatedb` 才会进库（本模拟器无此问题，但要知道）。\n- **`which` 报 no**：说明不是可执行命令，可能是你拼错或它是别名/内置命令。\n\n## 小结\n\n1. `find 路径 -name \"模式\"` 最灵活，`locate` 最快，`which` 专找命令。\n2. 通配符 `*` 表示任意多字符，记得用引号包住。\n3. 进阶：L3 进入文本处理，grep 是从\"文件内容\"里找，而 find 是从\"文件名\"里找，二者互补。",
  "l2-path": "# 路径是什么（第四课）\n\n## 讲解\n\n\"路径\"就是文件在目录树里的住址。Linux 用 `/` 把一层层目录串起来，比如 `/home/guest/hello.txt`。\n\n- **绝对路径**：从根目录 `/` 写起，写全住址。无论你在哪都指向同一个文件。例：`/home/guest/notes.txt`。\n- **相对路径**：从你当前所在目录（pwd）算起。你在 `/home/guest` 时，写 `notes.txt` 就是指当前目录下的它。\n- **`.`** 表示\"当前目录\"，**`..`** 表示\"上层目录\"。所以 `cd ..` 就是上楼。\n- **`~`** 是你的家目录（这里是 `/home/guest`），`cd ~` 永远能回家。\n\n什么时候用哪个？在脚本里、给别人指路时用绝对路径最稳；自己操作图省事用相对路径。\n\n## 动手实验\n\n1. 用绝对路径直接看文件（无论在哪都能看）：\n   ```\n   cat /home/guest/hello.txt\n   ```\n2. 用相对路径看当前目录的文件：\n   ```\n   cd ~\n   cat hello.txt\n   ```\n3. 用 `..` 从家目录走到 `/home` 再回来看：\n   ```\n   pwd\n   cd ..\n   pwd\n   cd /home/guest\n   ```\n4. 进入 projects 后，用相对路径 `..` 回到上一级：\n   ```\n   cd projects\n   cd ..\n   pwd\n   ```\n5. 用 `~` 一步回家，再用绝对路径创建嵌套目录：\n   ```\n   cd ~\n   mkdir -p work/draft\n   ls work\n   ```\n\n## 常见错误\n\n- **\"没有那个文件或目录\"但文件明明在**：你可能站错目录了。先用 `pwd` 看身高，再用 `ls` 看脚下有什么，再决定用绝对还是相对路径。\n- **把相对路径当绝对路径**：相对路径不以 `/` 开头。开头有 `/` 才是从根目录算。\n- **`~` 不展开**：在双引号里 `~` 不会被当成家目录。需要展开就别加引号，或用 `$HOME`。\n\n## 小结\n\n1. `/` 开头是绝对路径，稳；无 `/` 开头是相对路径，看当前位置。\n2. `.` 当前、`..` 上层、`~` 家目录。\n3. 进阶：下一课学 `rwx` 权限，你会明白\"路径对\"也可能\"权限不够\"打不开。",
  "l2-permission": "# 权限与 chmod（第五课）\n\n## 讲解\n\nLinux 是多用户系统，每个文件都有\"谁能看、谁能改、谁能跑\"的限制。这就是 **rwx 权限**：\n\n- **r**（read 读）= 4：能看内容\n- **w**（write 写）= 2：能改内容\n- **x**（execute 执行）= 1：能当作程序运行\n\n权限分三组人：**属主(u)**、**同组(g)**、**其他人(o)**。用 `ls -l` 看，最左一列像 `-rwxr-xr--`：第 1 位是类型，接着 9 位就是 `ugo` 各三位的 rwx。\n\n`chmod` 改权限有两种写法：\n- **数字法**：把三组权限各换算成数字相加。如 `755` = `rwxr-xr-x`（属主可读写执行，其他人只能读和执行）。常用 `755` 给脚本、`644` 给普通文件。\n- **符号法**：`chmod u+x 文件` 给属主加执行权；`chmod go-w 文件` 去掉同组和其他人的写权；`chmod a=rwx` 所有人全开。\n\n## 动手实验\n\n1. 先看 hello.txt 当前权限：\n   ```\n   ls -l hello.txt\n   ```\n   预期类似：`-rw-r--r--`（644）\n2. 用数字法让它变成\"属主可读写执行，其他只读写\"（755）：\n   ```\n   chmod 755 hello.txt\n   ls -l hello.txt\n   ```\n3. 用符号法只给属主加执行权（从 644 变 744）：\n   ```\n   chmod u+x notes.txt\n   ls -l notes.txt\n   ```\n4. 去掉\"其他人\"的所有权限：\n   ```\n   chmod o-rwx todo.txt\n   ls -l todo.txt\n   ```\n5. 把权限一次性全部打开（符号法）：\n   ```\n   chmod a=rw script.sh\n   ls -l script.sh\n   ```\n\n## 常见错误\n\n- **`chmod: 无效模式`**：数字法必须是三位八进制（如 `755`）；符号法要写成 `u+x` 这种格式，别漏掉谁（`u/g/o/a`）。\n- **脚本不能运行**：多半缺执行位 `x`。用 `chmod +x 脚本名` 加上即可（本模拟器执行与否不影响，但真实 Linux 会）。\n- **数字算错**：记住 r=4 w=2 x=1，三组独立相加。755 = 7(4+2+1) 5(4+1) 5(4+1)。\n\n## 小结\n\n1. rwx = 读/写/执行 = 4/2/1，分属主/同组/其他人三组。\n2. `chmod 755 文件`（数字法）或 `chmod u+x 文件`（符号法）。\n3. 进阶：L3 学文本处理，你会发现 grep/sed/awk 才是日常最高频的命令。",
  "l3-awk": "# awk 字段提取（第九课）\n\n## 讲解\n\n`awk` 是文本处理三剑客里最\"表格化\"的一个。它把每行按空白（或你指定的分隔符）切成若干**字段**，然后你可以挑字段、做计算、排版。\n\n基础句式：\n\n```\nawk '{print $1}' 文件\n```\n\n- `$1` 是第一列，`$2` 第二列……`$0` 是整个原始行，`NF` 是这一行有多少字段。\n- 默认按**空白**（空格/制表符）分列。用 `-F` 指定别的列分隔符，如 `-F:` 按冒号分（适合 `/etc/passwd`）。\n- `print` 后面可以组合多个字段，用空格或逗号隔开。\n\nawk 特别适合处理\"每行结构一致\"的日志、表格数据。本模拟器支持 `{print $N}`、`$0`、`NF` 及 `-F` 分隔符。\n\n## 动手实验\n\n1. 看 todo.txt 第一列（序号）：\n   ```\n   awk '{print $1}' todo.txt\n   ```\n   预期：`1.` `2.` `3.` `4.`\n2. 看 hello.txt 第一列（默认按词分列）：\n   ```\n   awk '{print $1}' hello.txt\n   ```\n3. 打印整行和字段数（NF）：\n   ```\n   awk '{print NF, $0}' notes.txt\n   ```\n4. 指定分隔符：用 `:` 切 hello.txt 的某一行体会（这里演示 -F 用法，对普通文本也成立）：\n   ```\n   echo \"name:Linux:2026\" | awk -F: '{print $2}'\n   ```\n   预期：`Linux`\n5. 组合字段，自定义输出格式：\n   ```\n   awk '{print \"第\" $1 \" 项\"}' todo.txt\n   ```\n   预期：`第1. 项` 等\n6. 管道组合：ls -l 的最后一列是文件名：\n   ```\n   ls -l | awk '{print $NF}'\n   ```\n\n## 常见错误\n\n- **字段序号从 1 开始**：`$0` 才是整行，`$1` 是第一列，没有 `$0` 之外的\"第0列\"概念。\n- **分列不对**：默认按空白分。如果你的数据用逗号/冒号分隔，必须加 `-F,` 或 `-F:` 才能正确分列。\n- **只 print 第一个匹配**：awk 默认对每一行都执行，不必循环；写错成 `print $1` 只在外层会只输出一次——确保 `{print ...}` 大括号包住动作。\n\n## 小结\n\n1. `awk '{print $1}'` 取第一列，`$0` 整行，`NF` 字段数，`-F` 指定分隔符。\n2. awk 按行处理、按列提取，适合结构化文本/日志。\n3. 进阶：三剑客 grep/sed/awk 至此集齐，L4 起进入系统管理实战。",
  "l3-grep": "# grep 文本搜索（第七课）\n\n## 讲解\n\n`find` 按\"文件名\"找，`grep` 按\"文件内容\"找——它是文本处理三剑客之首。基本句式：\n\n```\ngrep 模式 文件\n```\n\n常用选项：\n- `-i`：忽略大小写（ignore case）\n- `-n`：显示行号（显示\"第几行:内容\"）\n- `-r`：递归搜目录里所有文件\n\n\"模式\"可以是普通词，也可以是**正则**（regular expression）：\n- `^Linux` 表示行首是 Linux\n- `txt$` 表示以 txt 结尾的行\n- `.` 匹配任意一个字符，`*` 表示前面那个字符重复零次或多次\n\n本模拟器支持 `-i`、`-n`、`-r` 以及基础正则。配合管道 `|`，grep 能从任何命令的输出里筛内容，比如 `ls -l | grep txt`。\n\n## 动手实验\n\n1. 在 hello.txt 里找含 \"Linux\" 的行：\n   ```\n   grep Linux hello.txt\n   ```\n   预期：`Linux 是这套学习系统的内核代号。`\n2. 忽略大小写再找（试试小写 linux）：\n   ```\n   grep -i linux hello.txt\n   ```\n3. 显示行号：\n   ```\n   grep -n Linux hello.txt\n   ```\n   预期：`2:Linux 是这套学习系统的内核代号。`\n4. 用正则：找出以 \"Linux\" 开头的行：\n   ```\n   grep \"^Linux\" hello.txt\n   ```\n5. 管道：从 ls 输出里筛出 sh 文件：\n   ```\n   ls | grep sh\n   ```\n6. 递归在 projects 目录里找含 \"练习\" 的内容：\n   ```\n   grep -r 练习 projects\n   ```\n\n## 常见错误\n\n- **grep 报\"是一个目录\"**：你给了目录当文件。加 `-r` 让它递归搜目录，或只搜具体文件。\n- **大小写不匹配啥也搜不到**：默认区分大小写。要忽略大小写就加 `-i`。\n- **正则特殊字符被误解**：`.`、`*`、`^`、`$` 在 grep 里是元字符。想搜字面点号就加引号并用反斜杠，如 `grep \"file\\.txt\"`。\n\n## 小结\n\n1. `grep 模式 文件`，加 `-i` 忽略大小写、`-n` 行号、`-r` 递归。\n2. grep 配合 `|` 管道能从任意命令输出里筛选，威力巨大。\n3. 进阶：下一课 `sed` 不只是\"找\"，还能\"找了之后替换\"。",
  "l3-sed": "# sed 流编辑替换（第八课）\n\n## 讲解\n\n`sed`（stream editor，流编辑器）像一条流水线：文本一行行流过，你在流水线上做替换、删除等操作，最后输出结果。最常用的就是**替换**：\n\n```\nsed 's/旧/新/' 文件\n```\n\n- `s` 表示 substitute（替换）。\n- 旧/新之间用 `/` 分隔（也可用其他分隔符，如 `s#旧#新#`）。\n- 默认只替换每行**第一次**出现。要整行所有出现都换，加 `g`（global）：`sed 's/旧/新/g' 文件`。\n\n注意：`sed` 默认只把结果输出到屏幕，**不改动原文件**（本模拟器同理，只返回结果）。真实 Linux 想直接改文件要加 `-i` 选项。\n\n本课结合 `grep` 学到的\"模式\"，你可以把\"旧\"写成正则，比如 `sed 's/Linux/Penguin/g'`。\n\n## 动手实验\n\n1. 把 hello.txt 里的 \"Linux\" 换成 \"Penguin\"（只显示结果，不改原文件）：\n   ```\n   sed 's/Linux/Penguin/' hello.txt\n   ```\n   预期该行变成：`Penguin 是这套学习系统的内核代号。`\n2. 验证原文件没被改：\n   ```\n   grep Linux hello.txt\n   ```\n   预期仍能找到 `Linux`（说明 sed 默认不改源文件）。\n3. 替换所有出现（本文件 Linux 只出现一次，换多词体会 g）：\n   ```\n   echo \"aa bb aa\" | sed 's/aa/XX/g'\n   ```\n   预期：`XX bb XX`\n4. 用正则：把行首的时间戳式 `1.` 换成 `第1步`：\n   ```\n   sed 's/^\\([0-9]\\)\\./第\\1步/' todo.txt\n   ```\n   （正则括号需转义；本模拟器也支持简单写法）\n5. 管道组合：先 grep 出含 Linux 的行，再 sed 替换：\n   ```\n   grep Linux hello.txt | sed 's/Linux/★Linux★/'\n   ```\n\n## 常见错误\n\n- **sed 后原文件没变**：这是正常行为——默认输出到屏幕。想真正改文件在真实 Linux 用 `sed -i`，但动手前务必先备份。\n- **分隔符冲突**：文本里正好有 `/` 时，换用别的分隔符，如 `sed 's#/old/#/new/#'`。\n- **只换了一处**：忘了加 `g`。要\"全部替换\"必须 `s/旧/新/g`。\n\n## 小结\n\n1. `sed 's/旧/新/'` 做替换，`g` 表示整行全部替换。\n2. sed 默认不改源文件，只输出结果——安全又常用。\n3. 进阶：下一课 `awk` 专注\"按列/字段\"提取，和 grep/sed 组成文本三剑客。",
  "l4-package": "# 软件包管理（apt / yum / dnf）\n\n## 讲解\n\nLinux 上\"装软件\"一般不从官网下安装包双击，而是交给**包管理器**：它从软件源（repository）下载 `.deb`（Debian/Ubuntu）或 `.rpm`（RHEL/CentOS）包，自动解决依赖、登记到系统数据库、还能干净卸载。这样做的好处是\"一处安装、全网可复现\"，也是 DevOps 自动化的基础。\n\n两大阵营：\n- **Debian/Ubuntu 系** → `apt`（底层是 `dpkg`）。\n- **RHEL/CentOS 系** → 老版用 `yum`，CentOS 8+/Fedora 推荐 `dnf`（`dnf` 是 `yum` 的下一代，命令基本兼容）。\n\n记住一句：装之前先 `update`（刷新软件源索引），否则可能装到旧版本或找不到包。\n\n## 动手实验\n\n1. 刷新软件源索引（Debian 系 / RHEL 系）：\n   ```bash\n   sudo apt update            # Debian/Ubuntu\n   sudo dnf check-update      # RHEL/Fedora (yum 同)\n   ```\n\n2. 搜索并安装软件：\n   ```bash\n   apt search htop\n   sudo apt install -y htop\n   # RHEL 系：\n   dnf search htop\n   sudo dnf install -y htop\n   ```\n   说明：`-y` 自动回答\"是\"，脚本里常用；交互安装可去掉。\n\n3. 查看已装包的详情 / 文件列表：\n   ```bash\n   dpkg -l | grep htop        # 是否已装\n   dpkg -L htop               # 这个包装了哪些文件\n   # RHEL 系：\n   rpm -q htop\n   rpm -ql htop\n   ```\n\n4. 卸载（保留/删除配置）：\n   ```bash\n   sudo apt remove htop       # 保留配置\n   sudo apt purge htop        # 连配置文件一起删\n   # RHEL 系：\n   sudo dnf remove htop\n   ```\n\n5. 升级全部已装包（谨慎，生产先测试）：\n   ```bash\n   sudo apt upgrade -y\n   sudo dnf upgrade -y\n   ```\n\n## 常见错误\n\n- **`apt` 报 \"Unable to locate package\"**：多半是没先 `sudo apt update` 刷新索引；或包名拼错。先 update 再装。\n- **两套命令混用**：在 Ubuntu 上敲 `yum`、在 CentOS 上敲 `apt` 都会\"命令未找到\"。先确认发行版：`cat /etc/os-release`。\n- **`upgrade` 把生产环境搞崩**：无差别升级可能引入不兼容。生产机先在 staging 验证，或锁定关键包版本（`apt-mark hold`）。\n- **用 pip/npm 装系统级工具**：能用系统包管理器就用它，混用会导致依赖库版本冲突、难以审计。\n\n## 小结\n\n1. 包管理器负责下载、依赖解析、登记与卸载，是 Linux 装软件的标准入口。\n2. Debian 系用 `apt`（底层 `dpkg`），RHEL 系用 `dnf`/`yum`（底层 `rpm`）。\n3. 装前先 `update`，卸可用 `remove`（留配置）或 `purge`/`remove`（清配置）。\n\n进阶：L8 Ansible 的 `apt`/`dnf` 模块，本质就是把本课命令写成可重复执行的剧本。",
  "l4-process": "# 进程与信号\n\n## 讲解\n\n每一条运行的命令、每一个后台服务，在 Linux 里都是一个**进程（process）**，内核给它分配一个唯一编号 PID。进程不是孤立的：启动它的进程是它的\"父进程\"（PPID），一层层往上就是 init/systemd（PID 1）。理解进程树，是排查\"谁卡住了、谁占满了 CPU\"的基础。\n\n**信号（signal）**是进程间最轻量的沟通方式：你没法直接让别人的进程改代码，但可以向它\"发个信号\"。`SIGTERM(15)` 是礼貌请求退出，`SIGKILL(9)` 是内核强行杀死（不对进程做任何清理），`SIGHUP(1)` 常用于让服务重读配置。默认情况下 `kill` 发的是 `SIGTERM`——能用 15 就别用 9，给程序一个优雅收场的机会。\n\n> 本课可在交互沙盒中练习 `ps` 与管道；`top`/`kill` 等实时/写操作请在真实终端体验。\n\n## 动手实验\n\n1. 查看当前会话的进程（沙盒可练）：\n   ```bash\n   ps\n   ```\n   预期：列出当前 shell 及其子进程，含 PID、TTY、CMD 三列。\n\n2. 以\"全格式\"查看所有进程：\n   ```bash\n   ps -ef\n   ```\n   预期：多出 UID、PPID 列，`-e` 表示所有进程、`-f` 表示完整格式。\n\n3. 用管道过滤出 bash 相关进程（沙盒可练）：\n   ```bash\n   ps | grep bash\n   ```\n   预期：只显示命令行里包含 `bash` 的行，管道把左边输出喂给右边 `grep`。\n\n4. 实时观察（真实终端）：\n   ```bash\n   top\n   ```\n   说明：进入后按 `P` 按 CPU 排序、`M` 按内存排序、`q` 退出。\n\n5. 优雅结束一个进程（真实终端）：\n   ```bash\n   kill 1234          # 发 SIGTERM(15)\n   kill -9 1234       # 仍不死才用 SIGKILL\n   ```\n   说明：先 15 后 9，是运维的礼貌与底线。\n\n## 常见错误\n\n- **`kill` 提示 \"No such process\"**：PID 已经结束，或你不是该进程 owner/root。先 `ps` 确认 PID 还活着。\n- **`kill -9` 当成首选**：SIGKILL 不给进程清理机会，可能造成数据未落盘、锁文件残留。务必先试默认 15。\n- **分不清 PID 和 PPID**：想杀的\"父服务\"其实是 PPID，杀错子进程会被父进程立刻重启。看清 `ps -ef` 的父子列。\n- **`top` 里乱按以为卡死**：其实在跑，按 `q` 即可退出；若误按了 `k` 会进入杀进程流程，按 `Esc` 取消。\n\n## 小结\n\n1. 进程有 PID/PPID，形成进程树；`ps` 看快照，`top` 看实时。\n2. 信号是控制进程的\"按钮\"：默认 `SIGTERM(15)` 礼貌，`SIGKILL(9)` 最后手段。\n3. 管道 `|` 能把 `ps` 的输出交给 `grep` 过滤，是日常排查的标配组合。\n\n进阶：下一课 `systemd` 会告诉你，现代 Linux 里这些进程大多由 `systemctl` 统一管理，而不是直接手敲 `kill`。",
  "l4-service": "# systemd 与服务管理\n\n## 讲解\n\n现代 Linux 发行版（Ubuntu 16.04+、CentOS 7+、Debian 8+）都用 **systemd** 作为第一个进程（PID 1），它身兼数职：开机启动、服务监管、日志收集、定时任务（timer）、甚至是挂载管理。对我们而言，最常用的就是它管的\"**单元（unit）**\"——尤其是 `.service` 类型的服务单元。\n\n过去用 `service nginx start` 或 `chkconfig` 的 SysV 时代已经过去，统一入口是 `systemctl`。它管三件事：**启动/停止（start/stop）**、**开机自启（enable/disable）**、**看状态（status）**。而服务产生的日志，不再散落在 `/var/log` 各文件，而是由 `journald` 统一收进二进制日志，用 `journalctl` 查询——这正是和上一课\"进程\"衔接的地方：每个服务背后都是一个被 systemd 盯着的进程。\n\n## 动手实验\n\n1. 查看某服务状态：\n   ```bash\n   systemctl status ssh\n   ```\n   预期：显示 `Active: active (running)`、主进程 PID、最近几行日志。`q` 退出。\n\n2. 启动 / 停止 / 重启：\n   ```bash\n   sudo systemctl start nginx\n   sudo systemctl stop nginx\n   sudo systemctl restart nginx\n   ```\n   说明：restart 常用于改完配置后生效；`reload` 则不停服务只重读配置（支持的服务才有效）。\n\n3. 设置开机自启：\n   ```bash\n   sudo systemctl enable nginx\n   sudo systemctl is-enabled nginx\n   ```\n   预期：`is-enabled` 返回 `enabled` 表示开机启动已开。\n\n4. 查询日志（journald）：\n   ```bash\n   journalctl -u nginx -n 50 --no-pager\n   journalctl -u nginx -f          # 实时跟踪，类似 tail -f\n   ```\n   说明：`-u` 指定单元、`-n 50` 看最近 50 行、`-f` 跟随。\n\n5. 列出所有运行中的服务：\n   ```bash\n   systemctl list-units --type=service --state=running\n   ```\n\n## 常见错误\n\n- **`systemctl` 报 \"System has not been booted with systemd\"**：你可能在 Docker 容器或 WSL1 里，那里没有 systemd。容器里通常直接跑命令，或改用 `service`/手动启动。\n- **enable 了却没启动**：`enable` 只管\"开机自启\"，不立即运行；要立刻生效还需再 `start` 一次。\n- **改了配置 restart 没生效**：有些程序必须 `reload` 而非 `restart`；或配置写错导致启动失败，用 `journalctl -u 服务名 -n 50` 看报错。\n- **`journalctl` 翻页卡住**：它默认用 `less`，按 `q` 退出；加 `--no-pager` 可一次性输出。\n\n## 小结\n\n1. systemd 是 PID 1，用 `systemctl` 统一管理 `.service` 服务的启停与自启。\n2. 三板斧：`start/stop/restart` 控制运行，`enable/disable` 控制开机，`status` 看状态。\n3. 日志统一进 journald，用 `journalctl -u 服务名` 排查问题，比翻散落日志文件省心。\n\n进阶：L7 服务的 Nginx/数据库，本质就是写好 `.service` 并被 systemd 接管；到时你会自己写 unit 文件。",
  "l4-user": "# 用户与组管理\n\n## 讲解\n\nLinux 从设计上就是**多用户**操作系统：一台机器上可以有多个账号同时工作，彼此的文件互相隔离。这一切的\"户口登记簿\"就是两个文本文件——`/etc/passwd`（账号信息）和 `/etc/shadow`（密码哈希，仅 root 可读）。与之配合的是\"组\"（`/etc/group`），用来把多个用户归到同一权限集合里，比如让 `dev` 组的成员都能读某个项目目录。\n\n真正的权限判断发生在进程访问文件时：内核看\"当前进程所属的用户/组\"是否匹配文件的 owner/group 与 rwx 位。所以\"管理用户\"的本质，就是维护好这几张表，并理解\"我是谁、我属于哪些组、我能碰什么\"。\n\n> 注意：本课的 `useradd`/`passwd` 等命令会真正修改系统账户，请在虚拟机/容器里练习，不要在生产机器乱跑。\n\n## 动手实验\n\n1. 查看当前用户与所属组：\n   ```bash\n   whoami\n   id\n   groups\n   ```\n   预期：`id` 会打印 `uid=1000(你的名) gid=1000(你的名) groups=...`，`groups` 列出你隶属的全部组。\n\n2. 新建一个用户（需 root）：\n   ```bash\n   sudo useradd -m -s /bin/bash alice\n   ```\n   说明：`-m` 同时创建家目录 `/home/alice`，`-s /bin/bash` 指定登录 shell。\n\n3. 为该用户设置密码：\n   ```bash\n   sudo passwd alice\n   ```\n   系统会交互式要求输入两次密码（屏幕上不回显）。\n\n4. 新建组并把用户加进去：\n   ```bash\n   sudo groupadd dev\n   sudo usermod -aG dev alice\n   ```\n   关键：`-aG` 的 `-a`（append）必须有，否则会**覆盖**该用户原有的组关系。\n\n5. 验证与清理：\n   ```bash\n   id alice\n   getent group dev\n   sudo userdel -r alice\n   ```\n   预期：`id alice` 应出现 `groups=...(dev)`；`userdel -r` 会连家目录一起删掉。\n\n## 常见错误\n\n- **`useradd` 后无法登录/没有家目录**：很多发行版默认不加 `-m`，家目录不会自动建。务必加上 `-m`；若想统一默认行为，改 `/etc/login.defs` 的 `CREATE_HOME`。\n- **`usermod -G` 把用户踢出其他组**：漏写 `-a` 会直接覆盖附属组列表。记住口诀：\"**加组必带 -a**\"。\n- **`passwd` 提示鉴定令牌操作错误**：普通用户改别人密码需要 root；忘记 `sudo` 就会失败。\n- **UID 冲突**：手动指定 `-u` 时若与已有账号重复，会导致文件归属混乱，务必先 `getent passwd <uid>` 查重。\n\n## 小结\n\n1. 用户信息在 `/etc/passwd`、密码在 `/etc/shadow`、组在 `/etc/group`，都是纯文本表。\n2. `useradd -m` 建人、`passwd` 设密、`usermod -aG` 加组，三者是日常三板斧。\n3. \"组\"是权限批量分配的单位，理解 owner/group/other 与 rwx 的关系就理解了 Linux 权限根基。\n\n进阶：下一课看进程时，你会用 `ps -o user= -p <pid>` 反查\"某个进程到底是谁跑的\"，正好衔接本课的用户视角。",
  "l5-cond": "# 条件判断、循环与 case\n\n## 讲解\n\n会赋值还不够，脚本要\"懂事\"——这就靠流程控制。Bash 的判断核心是 `test` 命令，写作 `[ 条件 ]`（注意**括号内侧必须有空格**）。常见判断：`-f` 文件存在、`-d` 目录、`-z` 字符串为空、`=` 相等、`-gt` 大于等。\n\n三大结构：\n- **`if ... elif ... else ... fi`**：二选一/多选一。\n- **`for ... in ...; do ... done`**：遍历列表。\n- **`while` / `case`**：循环与多分支匹配（case 像简化版 switch，用 `*` 兜底）。\n\n判断的退出码是灵魂：命令**成功返回 0，失败返回非 0**；`if` 就是看这条命令的退出码。记住这点，你能写出 `if grep -q foo file; then ...` 这种\"无输出也好用\"的判断。\n\n## 动手实验\n\n1. 文件判断：\n   ```bash\n   if [ -f \"$HOME/.bashrc\" ]; then\n     echo \"bashrc 存在\"\n   else\n     echo \"没有 bashrc\"\n   fi\n   ```\n\n2. 字符串与数字比较：\n   ```bash\n   n=5\n   if [ \"$n\" -gt 3 ]; then echo \"大于3\"; fi\n   name=\"bob\"\n   if [ \"$name\" = \"bob\" ]; then echo \"是 bob\"; fi\n   ```\n\n3. for 循环批量处理：\n   ```bash\n   for f in *.txt; do\n     echo \"处理: $f\"\n   done\n   ```\n\n4. while 读文件每行：\n   ```bash\n   while read -r line; do\n     echo \"行: $line\"\n   done < list.txt\n   ```\n\n5. case 多分支：\n   ```bash\n   case \"$1\" in\n     start) echo \"启动\" ;;\n     stop)  echo \"停止\" ;;\n     *)     echo \"用法: $0 start|stop\" ;;\n   esac\n   ```\n\n## 常见错误\n\n- **`[` 内侧漏空格**：`[ -f x]` 会报语法错，必须 `[ -f x ]`。`[` 本质是个命令，参数间要空格。\n- **字符串比较用 `-eq`**：`-eq` 是数字比较，字符串相等用 `=`（或 `==`）。混用会报 \"integer expression expected\"。\n- **变量为空时 `[ $x = a ]` 裂开**：变量为空会退化成 `[ = a ]` 语法错误。永远写成 `[ \"$x\" = a ]`（加双引号）。\n- **for 循环吞掉带空格的文件名**：`for f in $(ls)` 遇空格会拆词；优先用 `for f in *` 或 `while read` 逐行读。\n\n## 小结\n\n1. 判断用 `[ 条件 ]`，括号内侧必须留空格；退出码 0=真 非0=假。\n2. 数字用 `-gt/-eq`，字符串用 `=`，文件用 `-f/-d/-z`；变量务必双引号包裹。\n3. `for` 遍历、`while` 读行、`case` 分支，三者覆盖绝大多数脚本逻辑。\n\n进阶：下一课把它们封进函数，并用 `return` 返回状态码，脚本就能像搭积木一样复用。",
  "l5-debug": "# 调试与稳健性（set / trap）\n\n## 讲解\n\n写得出脚本只是第一步，**写得稳**才算工程。Bash 默认很\"宽容\"：某条命令失败它也继续往下跑，结果在脚本末尾才爆出一堆连锁错误，极难定位。解决办法是脚本开头加 **`set -euo pipefail`** 这个\"安全三连\"：\n\n- `-e`：任意命令非零退出就立刻中止脚本。\n- `-u`：引用未定义变量直接报错（避免 `$name` 为空时静默出错）。\n- `-o pipefail`：管道中任一段失败，整条管道视为失败（默认只看最后一段）。\n\n再加 `-x` 可以打印每条执行命令，调试时一目了然。`trap` 则是\"捕获信号/退出\"的钩子：常用于脚本异常退出时清理临时文件、恢复状态，类似其他语言的 `finally`。\n\n## 动手实验\n\n1. 开启追踪与严格模式：\n   ```bash\n   set -eux\n   name=\"penguin\"\n   echo \"hello $name\"\n   false            # 这条会触发 -e，脚本立即中止\n   echo \"看不到我\"   # 不会执行\n   ```\n   说明：`-x` 会先把要执行的命令打印出来，便于跟流程。\n\n2. 只开严格模式（日常推荐）：\n   ```bash\n   set -euo pipefail\n   echo \"严格模式运行中\"\n   ```\n\n3. trap 做清理（类似 finally）：\n   ```bash\n   tmp=$(mktemp -d)\n   trap 'rm -rf \"$tmp\"; echo \"已清理临时目录\"' EXIT\n   echo \"工作中... (临时目录: $tmp)\"\n   # 脚本结束（无论正常还是出错）都会执行 trap\n   ```\n\n4. 捕获 Ctrl-C：\n   ```bash\n   trap 'echo \"收到中断, 退出\"; exit 1' INT\n   sleep 10\n   ```\n\n## 常见错误\n\n- **只写 `set -e` 没写 `pipefail`**：`cat nofile | grep x` 里 `cat` 失败但 `grep` 成功，整条却\"看起来正常\"。务必 `set -euo pipefail` 一起用。\n- **`-e` 下把\"预期会失败\"的命令当致命**：如 `grep` 没匹配到会返回 1。可写成 `grep x file || true` 显式允许失败，或用 `if grep ...; then`。\n- **trap 在变量展开时才绑定，坑在引号**：`trap \"rm -rf $tmp\"` 会在定义时立刻展开 `$tmp`；想运行时展开要用单引号 `trap 'rm -rf \"$tmp\"' EXIT`。\n- **`-u` 下 `$1` 未传直接崩**：脚本依赖参数时，先用 `[ $# -ge 1 ] || { echo \"用法...\"; exit 1; }` 友好地检查。\n\n## 小结\n\n1. 脚本开头 `set -euo pipefail`：出错即停、禁未定义变量、管道任一段失败即失败。\n2. `set -x` 打印执行轨迹，是定位\"卡在哪\"的利器。\n3. `trap '...' EXIT/INT` 做清理与中断处理，相当于 `finally`，让脚本更稳健。\n\n进阶：L6 网络脚本里你会把这些和 `ssh`/`curl` 结合，写成\"失败自动回滚\"的部署小工具。",
  "l5-func": "# 函数、参数与返回值\n\n## 讲解\n\n函数让脚本从\"流水账\"变成\"可复用模块\"。Bash 函数定义极简：`func_name() { ... }` 或 `function func_name { ... }`。函数内部**复用位置参数那一套**：`$1 $2 $@` 指的是\"调用函数时传的参\"，而不是脚本的参数——这点容易和脚本顶层搞混。\n\n返回值有两个层面，务必分清：\n- **`return N`**：只能返回 0~255 的整数，用作\"退出码/状态\"，靠 `$?` 读取。它**不是**用来\"返回字符串结果\"的。\n- 想\"吐出\"数据，靠 `echo` 打印、调用处用 `$(函数名)` 捕获，例如 `result=$(my_func)`。\n\n这套约定（`return` 表状态、`echo` 表数据）是写清晰脚本的关键。\n\n## 动手实验\n\n1. 定义并调用函数：\n   ```bash\n   greet() {\n     echo \"你好, $1\"\n   }\n   greet \"Alice\"\n   ```\n   预期：输出 `你好, Alice`。`$1` 是调用时传入的 \"Alice\"。\n\n2. return 返回状态（用 `$?` 读）：\n   ```bash\n   is_even() {\n     [ $(( $1 % 2 )) -eq 0 ] && return 0 || return 1\n   }\n   is_even 4\n   echo \"退出码: $?\"      # 0\n   is_even 3\n   echo \"退出码: $?\"      # 1\n   ```\n\n3. echo 返回数据（用 `$()` 捕获）：\n   ```bash\n   add() {\n     echo $(( $1 + $2 ))\n   }\n   sum=$(add 3 5)\n   echo \"3+5=$sum\"        # 3+5=8\n   ```\n\n4. 函数内用 `local` 声明局部变量（避免污染全局）：\n   ```bash\n   calc() {\n     local tmp=$1\n     tmp=$(( tmp * 2 ))\n     echo $tmp\n   }\n   ```\n\n## 常见错误\n\n- **想用 `return` 返回字符串**：`return \"ok\"` 会报错（return 只接受数字）。返回文本请用 `echo`，调用处 `$(...)` 接住。\n- **函数内外 `$1` 混淆**：函数里的 `$1` 是函数参数，不是脚本参数。若需脚本参数，进函数前先存到命名变量或 `$@` 透传。\n- **忘了 `local` 导致变量泄露**：函数里直接 `x=1` 会改全局 `x`，多个函数互相干扰。局部变量务必 `local x=1`。\n- **`$?` 被提前覆盖**：`echo \"退出码: $?\"` 之前的 `echo` 本身会改写 `$?`。要保留状态，先 `ret=$?` 存起来再打印。\n\n## 小结\n\n1. 函数用 `name() { ... }`，内部 `$1 $@` 指函数自己的参数。\n2. `return N` 表状态（0~255，用 `$?` 读）；要返回数据用 `echo`，调用处 `$(...)` 捕获。\n3. `local` 让变量不出函数，避免全局污染——写多函数脚本的纪律。\n\n进阶：下一课把函数、变量组织进\"输入/输出\"流水线，学会重定向与管道，脚本就能处理真实数据流。",
  "l5-io": "# 重定向、管道与 here-doc\n\n## 讲解\n\nLinux 哲学：一切皆文件，程序默认有三个\"流\"——**标准输入 stdin(0)**、**标准输出 stdout(1)**、**标准错误 stderr(2)**。默认它们都连着终端。\n\n- **重定向 `>` / `>>`**：把 stdout 从屏幕\"引流\"到文件。`>` 覆盖、`>>` 追加。\n- **输入重定向 `<`**：让程序从文件读，而不是从键盘读（如 `sort < list.txt`）。\n- **管道 `|`**：把\"左边程序的 stdout\"接成\"右边程序的 stdin\"，是 Linux 最强大的组合拳。\n- **here-doc `<<`**：把一段文本直接当作某命令的 stdin，常用来生成配置文件或写脚本。\n\n聚焦一个事实：**管道 `|` 串起的是数据流，不是命令本身**。你可以用 `ps | grep` 过滤、`cat x | sort | uniq` 去重，无限搭积木。\n\n> 本课 `echo`/`cat`/`grep`/`|`/`>` 均可在沙盒中实操，请多试几组组合。\n\n## 动手实验\n\n1. 输出重定向（沙盒可练）：\n   ```bash\n   echo \"hello penguin\" > note.txt\n   echo \"second line\" >> note.txt\n   cat note.txt\n   ```\n   预期：`cat` 显示两行；`>` 覆盖、`>>` 追加。\n\n2. 管道过滤（沙盒可练）：\n   ```bash\n   ps | grep bash\n   ```\n   预期：只留下命令行含 `bash` 的行。\n\n3. 管道串联去重：\n   ```bash\n   printf \"a\\nb\\na\\nc\\n\" | sort | uniq\n   ```\n   预期：输出 `a b c` 三行去重结果。\n\n4. 分离错误流：\n   ```bash\n   ls /no/such 2>err.log      # 仅把错误写进 err.log\n   ls / 2>&1 | grep bin        # 把 stderr 合并进 stdout 再过滤\n   ```\n   说明：`2>` 重定向错误，`2>&1` 把 2 合并到 1。\n\n5. here-doc 生成文件：\n   ```bash\n   cat > hello.sh <<'EOF'\n   #!/bin/bash\n   echo \"由 here-doc 生成\"\n   EOF\n   cat hello.sh\n   ```\n   说明：引号 `'EOF'` 阻止内部 `$变量` 被展开，最安全。\n\n## 常见错误\n\n- **`>` 误用清空了文件**：`command > file` 会先**清空** file 再写。想追加务必 `>>`；`> file` 单独用也能清空文件（陷阱）。\n- **管道只传 stdout，错误丢了**：`grep` 在管道右边看不到左边的 stderr。要一起过滤用 `2>&1 |`。\n- **here-doc 结束符缩进/拼写错**：终止的 `EOF` 必须顶格且一字不差；用了 `<<-` 才能容忍前导 Tab。\n- **`echo $var > file` 变量未展开**：若变量在单引号 heredoc/字符串里则不会展开。需要展开就别加引号或用双引号。\n\n## 小结\n\n1. 三流：stdin(0)/stdout(1)/stderr(2)；`>` 覆盖、`>>` 追加、`<` 输入重定向。\n2. 管道 `|` 把左 stdout 接成右 stdin，是组合命令的核心。\n3. here-doc `<<` 就地喂文本；`2>&1` 合并错误流，排查时极有用。\n\n进阶：下一课把 `set -eux`、管道符行为、`trap` 组合进脚本，让它在出错时自动止损、优雅退出。",
